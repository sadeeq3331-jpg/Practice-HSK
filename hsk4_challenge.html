<body class="light">
<div class="container">
  <h1>🎯 HSK 4 Daily Challenge</h1>
  <div class="streak" id="streakDisplay">🔥 Streak: 0 days</div>
  <div id="challengeArea"></div>
  <a href="hsk4_hub.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Hub</a>
</div>
<script>
  const wordBank = window.HSK4_WORDS;
  if (!wordBank || wordBank.length === 0) alert('words_hsk4.js not loaded!');
  else {
    let currentWord = null, currentOptions = [], streak = parseInt(localStorage.getItem('hsk4_challenge_streak') || '0');
    let lastChallengeDate = localStorage.getItem('hsk4_challenge_last') || '';
    function updateStreakDisplay() { document.getElementById('streakDisplay').innerHTML = `🔥 Streak: ${streak} days`; }
    function getRandomWord() { return wordBank[Math.floor(Math.random() * wordBank.length)]; }
    function generateOptions(correctMeaning) {
      let opts = [correctMeaning];
      while (opts.length < 4) {
        const rand = wordBank[Math.floor(Math.random() * wordBank.length)];
        if (!opts.includes(rand.meaning)) opts.push(rand.meaning);
      }
      return opts.sort(() => Math.random() - 0.5);
    }
    function loadNewChallenge() { currentWord = getRandomWord(); currentOptions = generateOptions(currentWord.meaning); renderChallenge(); }
    function renderChallenge() {
      const area = document.getElementById('challengeArea');
      area.innerHTML = `<div class="word-card"><div class="chinese">${currentWord.word}</div><div class="options" id="optionsContainer"></div><div class="feedback" id="feedbackMsg"></div><button id="nextChallengeBtn" class="next-btn" style="display:none;">Next Challenge</button></div>`;
      const optsDiv = document.getElementById('optionsContainer');
      currentOptions.forEach(opt => {
        const btn = document.createElement('div'); btn.className = 'option-btn'; btn.innerText = opt;
        btn.addEventListener('click', () => checkAnswer(opt, btn));
        optsDiv.appendChild(btn);
      });
      document.getElementById('nextChallengeBtn').addEventListener('click', () => { document.getElementById('feedbackMsg').innerHTML = ''; loadNewChallenge(); });
    }
    function checkAnswer(selected, btnElement) {
      const feedback = document.getElementById('feedbackMsg');
      const allOptions = document.querySelectorAll('.option-btn');
      if (selected === currentWord.meaning) {
        feedback.innerHTML = '✅ Correct! +1 streak'; feedback.style.color = '#38a169';
        const today = new Date().toDateString();
        if (lastChallengeDate !== today) { streak++; localStorage.setItem('hsk4_challenge_streak', streak); lastChallengeDate = today; localStorage.setItem('hsk4_challenge_last', lastChallengeDate); updateStreakDisplay(); }
        else feedback.innerHTML = '✅ Correct! (You already earned your streak today)';
        allOptions.forEach(btn => btn.style.pointerEvents = 'none');
        document.getElementById('nextChallengeBtn').style.display = 'block';
      } else {
        feedback.innerHTML = `❌ Wrong. The correct meaning is: ${currentWord.meaning}`; feedback.style.color = '#e53e3e';
        allOptions.forEach(btn => { if (btn.innerText === currentWord.meaning) btn.style.background = 'var(--accent)'; btn.style.pointerEvents = 'none'; });
        document.getElementById('nextChallengeBtn').style.display = 'block';
      }
    }
    updateStreakDisplay(); loadNewChallenge();
  }
  // Dark mode
  const darkBtn = document.createElement('button');
  darkBtn.innerHTML = '<i class="fas fa-moon"></i> Dark';
  darkBtn.style.position = 'fixed'; darkBtn.style.bottom = '20px'; darkBtn.style.right = '20px';
  darkBtn.style.background = 'var(--accent)'; darkBtn.style.color = 'white'; darkBtn.style.border = 'none'; darkBtn.style.borderRadius = '30px'; darkBtn.style.padding = '0.4rem 1rem'; darkBtn.style.cursor = 'pointer';
  darkBtn.onclick = () => {
    const isDark = document.body.classList.contains('dark');
    if (isDark) { document.body.classList.remove('dark'); document.body.classList.add('light'); localStorage.setItem('hsk4_challenge_theme', 'light'); }
    else { document.body.classList.remove('light'); document.body.classList.add('dark'); localStorage.setItem('hsk4_challenge_theme', 'dark'); }
  };
  document.body.appendChild(darkBtn);
  const savedTheme = localStorage.getItem('hsk4_challenge_theme');
  if (savedTheme === 'dark') { document.body.classList.add('dark'); document.body.classList.remove('light'); }
  else { document.body.classList.add('light'); document.body.classList.remove('dark'); }
</script>
</body>
