      readingAnswers.forEach((ans, idx) => {
        if (ans !== -1) {
          const radio = document.querySelector(`input[name="r${idx}"][value="${ans}"]`);
          if (radio) radio.checked = true;
        }
      });
      document.querySelectorAll('input[type="radio"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
          const idx = parseInt(e.target.name.substring(1));
          const val = parseInt(e.target.value);
          readingAnswers[idx] = val;
        });
      });
      nextBtn.classList.add('hidden');
      submitBtn.classList.remove('hidden');
    }
  }

  function startListeningTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (currentSection === 'listening' && listeningTimer > 0) {
        listeningTimer--;
        document.getElementById('timer').innerText = `Listening Section: ${Math.floor(listeningTimer/60)}:${(listeningTimer%60).toString().padStart(2,'0')}`;
        if (listeningTimer <= 0) {
          clearInterval(timerInterval);
          alert("Listening section time's up! Moving to reading section.");
          nextSection();
        }
      } else if (currentSection === 'reading' && readingTimer > 0) {
        readingTimer--;
        document.getElementById('timer').innerText = `Reading Section: ${Math.floor(readingTimer/60)}:${(readingTimer%60).toString().padStart(2,'0')}`;
        if (readingTimer <= 0) {
          clearInterval(timerInterval);
          alert("Reading section time's up! Submitting exam.");
          submitExam();
        }
      }
    }, 1000);
  }

  function nextSection() {
    clearInterval(timerInterval);
    currentSection = 'reading';
    render();
    startListeningTimer();
  }

  function submitExam() {
    clearInterval(timerInterval);
    let totalCorrect = 0;
    for (let i=0; i<listeningQuestions.length; i++) {
      if (listeningAnswers[i] === listeningQuestions[i].correct) totalCorrect++;
    }
    for (let i=0; i<readingQuestions.length; i++) {
      if (readingAnswers[i] === readingQuestions[i].correct) totalCorrect++;
    }
    const totalQuestions = listeningQuestions.length + readingQuestions.length;
    const percent = Math.round((totalCorrect / totalQuestions) * 100);
    const passed = percent >= 60;
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = `<strong>Your score: ${totalCorrect}/${totalQuestions} (${percent}%)</strong><br>${passed ? '🎉 Congratulations! You passed HSK 3!' : '😢 Keep practicing! You can retake the exam.'}`;
    const best = localStorage.getItem('hsk3_exam_best') || 0;
    if (percent > best) localStorage.setItem('hsk3_exam_best', percent);
    resultDiv.innerHTML += `<br>🏆 Best score: ${best}%`;
  }

  document.getElementById('nextSectionBtn').addEventListener('click', nextSection);
  document.getElementById('submitBtn').addEventListener('click', submitExam);
  document.getElementById('resetBtn').addEventListener('click', () => {
    listeningAnswers.fill(-1);
    readingAnswers.fill(-1);
    listeningTimer = 35 * 60;
    readingTimer = 30 * 60;
    currentSection = 'listening';
    render();
    startListeningTimer();
    document.getElementById('result').innerHTML = '';
  });

  // Dark mode toggle
  const darkBtn = document.createElement('button');
  darkBtn.innerHTML = '<i class="fas fa-moon"></i> Dark';
  darkBtn.style.position = 'fixed'; darkBtn.style.bottom = '20px'; darkBtn.style.right = '20px';
  darkBtn.style.background = 'var(--accent)'; darkBtn.style.color = 'white'; darkBtn.style.border = 'none'; darkBtn.style.borderRadius = '30px'; darkBtn.style.padding = '0.4rem 1rem'; darkBtn.style.cursor = 'pointer';
  darkBtn.onclick = () => {
    const isDark = document.body.classList.contains('dark');
    if (isDark) { document.body.classList.remove('dark'); document.body.classList.add('light'); localStorage.setItem('hsk3_exam_theme', 'light'); }
    else { document.body.classList.remove('light'); document.body.classList.add('dark'); localStorage.setItem('hsk3_exam_theme', 'dark'); }
  };
  document.body.appendChild(darkBtn);
  const savedTheme = localStorage.getItem('hsk3_exam_theme');
  if (savedTheme === 'dark') { document.body.classList.add('dark'); document.body.classList.remove('light'); }
  else { document.body.classList.add('light'); document.body.classList.remove('dark'); }

  render();
  startListeningTimer();
</script>
</body>
</html>
