    { type: "part2", image: "🎂", word: "生日", sentence: "今天是我的生日。" }
  ];

  // 扁平化题目
  const flatListening = [];
  listeningQuestions.forEach(q => {
    if (q.type === 'part1' || q.type === 'part2' || q.type === 'part4') flatListening.push(q);
    else if (q.type === 'part3') q.questions.forEach(sq => flatListening.push({ ...sq, type: 'part3', dialogue: q.dialogue }));
  });
  const flatReading = [];
  readingQuestions.forEach(q => {
    if (q.type === 'part1' || q.type === 'part2') flatReading.push(q);
    else if (q.type === 'part3') q.questions.forEach(sq => flatReading.push({ ...sq, type: 'part3', passage: q.passage }));
  });

  let examState = {
    section: 'listening', currentQuestionIndex: 0,
    answers: new Array(flatListening.length + flatReading.length + writingQuestions.length).fill(null),
    listeningTimer: 35*60, readingTimer: 30*60, writingTimer: 15*60,
    timerInterval: null, paused: false
  };

  function getCurrentQuestions() {
    if (examState.section === 'listening') return flatListening;
    if (examState.section === 'reading') return flatReading;
    return writingQuestions;
  }
  function getGlobalIndex() {
    let off = 0;
    if (examState.section === 'reading') off = flatListening.length;
    else if (examState.section === 'writing') off = flatListening.length + flatReading.length;
    return off + examState.currentQuestionIndex;
  }
  function formatTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
  function speak(text) { if(!text) return; try { speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang='zh-CN'; u.rate=0.9; speechSynthesis.speak(u); } catch(e){} }

  function render() {
    const qs = getCurrentQuestions(), idx = examState.currentQuestionIndex, q = qs[idx];
    const gIdx = getGlobalIndex(), selected = examState.answers[gIdx];
    let html = '';
    if (examState.section === 'listening') {
      const isBool = (q.type === 'part1' || q.type === 'part4');
      html = `<div class="question"><div><strong>${idx+1}.</strong> <button id="playAudioBtn" class="control-btn"><i class="fas fa-play"></i> 播放音频</button></div>`;
      if (isBool) html += `<div>${q.statement}</div><div class="options"><div class="option"><label><input type="radio" name="q" value="true" ${selected===true?'checked':''}> ✓ 正确</label></div><div class="option"><label><input type="radio" name="q" value="false" ${selected===false?'checked':''}> ✗ 错误</label></div></div>`;
      else html += `<div>${q.q||q.question}</div><div class="options">${q.options.map((o,i)=>`<div class="option"><label><input type="radio" name="q" value="${i}" ${selected===i?'checked':''}> ${o}</label></div>`).join('')}</div>`;
      html += `</div>`;
    } else if (examState.section === 'reading') {
      if (q.type === 'part1') html = `<div class="question"><div><strong>${idx+1}.</strong> ${q.passage}</div><div class="options">${q.options.map((o,i)=>`<div class="option"><label><input type="radio" name="q" value="${i}" ${selected===i?'checked':''}> ${o}</label></div>`).join('')}</div></div>`;
      else if (q.type === 'part2') html = `<div class="question"><div><strong>${idx+1}.</strong> 排列顺序</div><div>${q.sentences.map((s,i)=>`<div>${String.fromCharCode(65+i)}. ${s}</div>`).join('')}</div><div class="options">${['A B C','A C B','B A C','B C A','C A B','C B A'].map((o,i)=>`<div class="option"><label><input type="radio" name="q" value="${i}" ${selected===i?'checked':''}> ${o}</label></div>`).join('')}</div></div>`;
      else html = `<div class="question"><div><strong>${idx+1}.</strong> ${q.passage}</div><div>${q.q}</div><div class="options">${q.options.map((o,i)=>`<div class="option"><label><input type="radio" name="q" value="${i}" ${selected===i?'checked':''}> ${o}</label></div>`).join('')}</div></div>`;
    } else if (examState.section === 'writing') {
      if (q.type === 'part1') {
        const shuffled = [...q.words].sort(()=>Math.random()-0.5);
        html = `<div class="question"><div><strong>${idx+1}.</strong> 完成句子</div><div class="sentence-builder" id="wordTiles">${shuffled.map(w=>`<span class="word-tile" data-word="${w}">${w}</span>`).join('')}</div><div class="sentence-preview" id="sentencePreview">${selected||'点击词语排序...'}</div><button id="clearBtn" class="control-btn">清空</button><button id="checkBtn" class="control-btn">检查</button><div id="fb" style="margin-top:0.5rem;"></div></div>`;
      } else {
        html = `<div class="question"><div><strong>${idx+1}.</strong> <span style="font-size:2rem;">${q.image}</span> ${q.word}</div><div>请用所给词语写一个句子：</div><textarea id="essayInput" style="width:100%; padding:0.5rem; border-radius:1rem; border:1px solid var(--border-light);" rows="2">${selected||''}</textarea><button id="saveBtn" class="control-btn">保存</button></div>`;
      }
    }
    document.getElementById('questionContainer').innerHTML = html;
    document.getElementById('progressInfo').innerText = `第 ${idx+1} / ${qs.length} 题`;
    document.getElementById('sectionHeader').innerText = examState.section==='listening'?`🎧 听力 (${idx+1}/${qs.length})`:examState.section==='reading'?`📖 阅读 (${idx+1}/${qs.length})`:`✍️ 书写 (${idx+1}/${qs.length})`;
    renderNavBar();

    if (examState.section==='listening') {
      document.getElementById('playAudioBtn')?.addEventListener('click', ()=>speak(q.type==='part1'||q.type==='part4'?q.sentence:q.dialogue));
      setTimeout(()=>document.getElementById('playAudioBtn')?.click(), 300);
    }
    document.querySelectorAll('input[name="q"]').forEach(r=>r.addEventListener('change', e=>{
      let v = e.target.value; v = (v==='true')?true:(v==='false'?false:parseInt(v)); examState.answers[gIdx]=v; renderNavBar();
    }));
    if (examState.section==='writing' && q.type==='part1') {
      let selectedWords = [];
      document.querySelectorAll('.word-tile').forEach(t=>t.addEventListener('click', ()=>{ selectedWords.push(t.dataset.word); t.classList.add('selected'); t.style.pointerEvents='none'; document.getElementById('sentencePreview').innerText=selectedWords.join(''); }));
      document.getElementById('clearBtn').addEventListener('click', ()=>{ selectedWords=[]; document.querySelectorAll('.word-tile').forEach(t=>{ t.classList.remove('selected'); t.style.pointerEvents='auto'; }); document.getElementById('sentencePreview').innerText='点击词语排序...'; });
      document.getElementById('checkBtn').addEventListener('click', ()=>{ const s=selectedWords.join(''), fb=document.getElementById('fb'); fb.innerHTML = s===q.correct?'✅ 正确！':`❌ 参考答案：${q.correct}`; examState.answers[gIdx]=s; renderNavBar(); });
    }
    if (examState.section==='writing' && q.type==='part2') {
      const ta = document.getElementById('essayInput');
      ta.addEventListener('change', ()=> { examState.answers[gIdx]=ta.value; renderNavBar(); });
      document.getElementById('saveBtn').addEventListener('click', ()=> { examState.answers[gIdx]=ta.value; renderNavBar(); });
    }
  }

  function renderNavBar() {
    const nav = document.getElementById('navBar'), qs = getCurrentQuestions();
    let h = ''; for(let i=0;i<qs.length;i++){ const g = getGlobalIndex() - examState.currentQuestionIndex + i; h+=`<button class="nav-btn ${examState.answers[g]!==null?'answered':''} ${i===examState.currentQuestionIndex?'current':''}" data-index="${i}">${i+1}</button>`; }
    nav.innerHTML = h;
    nav.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click', ()=>{ examState.currentQuestionIndex=parseInt(b.dataset.index); render(); }));
  }

  function nextQuestion() {
    const qs = getCurrentQuestions();
    if (examState.currentQuestionIndex < qs.length-1) { examState.currentQuestionIndex++; render(); }
    else {
      if (examState.section==='listening') { examState.section='reading'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startReadingTimer(); render(); }
      else if (examState.section==='reading') { examState.section='writing'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startWritingTimer(); render(); }
      else finishExam();
    }
  }

  function startListeningTimer() { clearInterval(examState.timerInterval); examState.timerInterval = setInterval(() => { if(examState.paused) return; if(examState.section==='listening' && examState.listeningTimer>0) { examState.listeningTimer--; document.getElementById('timer').innerText=`听力部分: ${formatTime(examState.listeningTimer)}`; if(examState.listeningTimer<=0) { examState.section='reading'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startReadingTimer(); render(); } } }, 1000); }
  function startReadingTimer() { clearInterval(examState.timerInterval); examState.timerInterval = setInterval(() => { if(examState.paused) return; if(examState.section==='reading' && examState.readingTimer>0) { examState.readingTimer--; document.getElementById('timer').innerText=`阅读部分: ${formatTime(examState.readingTimer)}`; if(examState.readingTimer<=0) { examState.section='writing'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startWritingTimer(); render(); } } }, 1000); }
  function startWritingTimer() { clearInterval(examState.timerInterval); examState.timerInterval = setInterval(() => { if(examState.paused) return; if(examState.section==='writing' && examState.writingTimer>0) { examState.writingTimer--; document.getElementById('timer').innerText=`书写部分: ${formatTime(examState.writingTimer)}`; if(examState.writingTimer<=0) finishExam(); } }, 1000); }

  function calculateScore() {
    let lc=0, rc=0, wc=0;
    for(let i=0;i<flatListening.length;i++) if(examState.answers[i]===flatListening[i].correct) lc++;
    for(let i=0;i<flatReading.length;i++) if(examState.answers[flatListening.length+i]===flatReading[i].correct) rc++;
    for(let i=0;i<writingQuestions.filter(q=>q.type==='part1').length;i++) if(examState.answers[flatListening.length+flatReading.length+i]===writingQuestions.filter(q=>q.type==='part1')[i].correct) wc++;
    const ls=Math.round(lc/flatListening.length*100), rs=Math.round(rc/flatReading.length*100), ws=Math.round(wc/writingQuestions.filter(q=>q.type==='part1').length*100);
    return {ls,rs,ws,total:ls+rs+ws,passed:ls+rs+ws>=180};
  }

  function finishExam() {
    clearInterval(examState.timerInterval);
    const s = calculateScore();
    document.getElementById('examArea').classList.add('hidden');
    document.getElementById('resultArea').classList.remove('hidden');
    document.getElementById('resultArea').innerHTML = `<div style="text-align:center;"><h2>考试完成</h2><div style="display:flex; justify-content:center; gap:2rem;"><div>听力<br><strong>${s.ls}/100</strong></div><div>阅读<br><strong>${s.rs}/100</strong></div><div>书写<br><strong>${s.ws}/100</strong></div></div><p style="font-size:2rem;"><strong>总分: ${s.total}/300</strong></p><p style="font-size:1.5rem; color:${s.passed?'green':'red'};">${s.passed?'🎉 恭喜！通过HSK 3！':'😢 继续努力！'}</p><button id="restartBtn" class="control-btn">重新开始</button></div>`;
    document.getElementById('restartBtn').addEventListener('click', ()=>location.reload());
  }

  document.getElementById('startBtn').addEventListener('click', ()=>{ document.getElementById('startScreen').classList.add('hidden'); document.getElementById('examArea').classList.remove('hidden'); startListeningTimer(); render(); });
  document.getElementById('prevBtn').addEventListener('click', ()=>{ if(examState.currentQuestionIndex>0) { examState.currentQuestionIndex--; render(); } });
  document.getElementById('nextBtn').addEventListener('click', nextQuestion);
  document.getElementById('pauseBtn').addEventListener('click', function(){ examState.paused=!examState.paused; this.innerHTML=examState.paused?'<i class="fas fa-play"></i> 继续':'<i class="fas fa-pause"></i> 暂停'; });

  const darkBtn = document.createElement('button'); darkBtn.innerHTML='<i class="fas fa-moon"></i>'; darkBtn.style.cssText='position:fixed; bottom:20px; right:20px; background:var(--accent); color:white; border:none; border-radius:50%; width:50px; height:50px; cursor:pointer;'; darkBtn.onclick=()=>{ const is=document.body.classList.contains('dark'); if(is){ document.body.classList.remove('dark'); document.body.classList.add('light'); } else { document.body.classList.remove('light'); document.body.classList.add('dark'); } }; document.body.appendChild(darkBtn);
</script>
</body>
</html>
