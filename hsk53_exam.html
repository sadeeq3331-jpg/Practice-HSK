<script>
  (function(){
    // ==================== 听力部分 (45题·第三套) ====================
    const listeningQuestions = [
      { type: "part1", dialogue: "女：你怎么又迟到了？男：别提了，路上遇到交通事故，堵了半个小时。", question: "男的为什么迟到？", options: ["A. 起晚了", "B. 堵车", "C. 车坏了", "D. 忘带东西"], correct: 1 },
      { type: "part1", dialogue: "男：你觉得这件衬衫怎么样？女：颜色挺好的，不过有点儿贵，要不再看看别的？", question: "女的是什么意思？", options: ["A. 很喜欢", "B. 觉得太贵", "C. 颜色不好", "D. 想买下来"], correct: 1 },
      { type: "part1", dialogue: "女：你周末有什么计划？男：本来想在家休息，可是老板突然让我加班。", question: "男的周末要做什么？", options: ["A. 在家休息", "B. 去旅游", "C. 加班", "D. 看电影"], correct: 2 },
      { type: "part1", dialogue: "男：你最近瘦了不少啊。女：是啊，我每天都去健身房锻炼两个小时。", question: "女的为什么瘦了？", options: ["A. 吃得少", "B. 工作忙", "C. 坚持锻炼", "D. 生病了"], correct: 2 },
      { type: "part1", dialogue: "女：你平时喜欢做什么运动？男：我最喜欢打篮球，每个周末都和朋友一起打。", question: "男的喜欢什么运动？", options: ["A. 踢足球", "B. 打篮球", "C. 游泳", "D. 跑步"], correct: 1 },
      { type: "part1", dialogue: "男：你今天怎么没开车？女：车送去保养了，所以坐地铁来的。", question: "女的为什么没开车？", options: ["A. 车坏了", "B. 车在保养", "C. 想锻炼身体", "D. 限号"], correct: 1 },
      { type: "part1", dialogue: "女：你喝咖啡加糖吗？男：不了，我喜欢喝苦一点的。", question: "男的喜欢什么样的咖啡？", options: ["A. 加糖的", "B. 加奶的", "C. 苦一点的", "D. 冰的"], correct: 2 },
      { type: "part1", dialogue: "男：你觉得新来的经理怎么样？女：挺好的，虽然年轻，但很有能力。", question: "女的觉得新经理怎么样？", options: ["A. 太年轻", "B. 没能力", "C. 有能力", "D. 不好相处"], correct: 2 },
      { type: "part1", dialogue: "女：你看天气预报了吗？明天天气怎么样？男：看了，说明天会下雨，记得带伞。", question: "明天天气怎么样？", options: ["A. 晴天", "B. 阴天", "C. 下雨", "D. 下雪"], correct: 2 },
      { type: "part1", dialogue: "男：你打算什么时候去留学？女：明年秋天吧，现在还在准备材料。", question: "女的什么时候去留学？", options: ["A. 今年", "B. 明年秋天", "C. 后年", "D. 还没决定"], correct: 1 },
      { type: "part1", dialogue: "女：这道题我不会做，你能教教我吗？男：当然可以，你哪儿不明白？", question: "男的是什么态度？", options: ["A. 不愿意帮忙", "B. 很乐意帮忙", "C. 不耐烦", "D. 自己也不会"], correct: 1 },
      { type: "part1", dialogue: "男：你昨天怎么没来参加聚会？女：我临时有事，实在走不开。", question: "女的为什么没去聚会？", options: ["A. 忘了", "B. 不想去", "C. 临时有事", "D. 身体不舒服"], correct: 2 },
      { type: "part1", dialogue: "女：你觉得这两条裙子哪条更好看？男：我觉得红色的那条更适合你。", question: "男的觉得哪条裙子好看？", options: ["A. 红色的", "B. 蓝色的", "C. 两条都好看", "D. 两条都不好看"], correct: 0 },
      { type: "part1", dialogue: "男：听说你搬家了？女：对，现在住的地方离公司近多了，每天可以多睡半小时。", question: "女的为什么搬家？", options: ["A. 房子太小", "B. 离公司近", "C. 房租便宜", "D. 环境好"], correct: 1 },
      { type: "part1", dialogue: "女：你儿子上几年级了？男：今年刚上初中，学习比以前忙多了。", question: "男的儿子现在几年级？", options: ["A. 小学", "B. 初中", "C. 高中", "D. 大学"], correct: 1 },
      { type: "part1", dialogue: "男：你怎么又买这么多东西？女：商场打折，不买觉得亏了。", question: "女的为什么买这么多东西？", options: ["A. 需要", "B. 喜欢", "C. 商场打折", "D. 朋友推荐"], correct: 2 },
      { type: "part1", dialogue: "女：你觉得这个工作怎么样？男：工资虽然不高，但能学到很多东西，我觉得值得。", question: "男的觉得工作怎么样？", options: ["A. 工资太低不值得", "B. 能学东西值得", "C. 太累了", "D. 没前途"], correct: 1 },
      { type: "part1", dialogue: "男：你每天几点睡觉？女：我习惯早睡早起，一般十点就睡了。", question: "女的几点睡觉？", options: ["A. 八点", "B. 九点", "C. 十点", "D. 十一点"], correct: 2 },
      { type: "part1", dialogue: "女：你跟你哥哥长得真像。男：是啊，我们是双胞胎，不过性格完全不一样。", question: "男的和哥哥是什么关系？", options: ["A. 双胞胎", "B. 普通兄弟", "C. 同学", "D. 朋友"], correct: 0 },
      { type: "part1", dialogue: "男：你的感冒好点了吗？女：好多了，谢谢关心。", question: "女的现在怎么样了？", options: ["A. 更严重了", "B. 完全好了", "C. 好多了", "D. 没变化"], correct: 2 },
      { type: "part2", dialogue: "女：小张，你这次去上海出差感觉怎么样？男：挺好的，谈成了两个大客户。不过那边的饮食我有点儿吃不惯，太甜了。女：是啊，上海菜确实偏甜。你哪天回来的？男：昨天下午刚回来，今天就来上班了。", questions: [{ q: "男的觉得上海菜怎么样？", options: ["A. 太辣了", "B. 太咸了", "C. 太甜了", "D. 太油了"], correct: 2 }] },
      { type: "part2", dialogue: "男：妈，我想跟您商量个事儿。我想买一辆摩托车。女：摩托车？那多危险啊，我不放心。男：我会小心的，而且骑摩托车上班可以避开堵车，能省不少时间。女：那也不行，你还是坐地铁吧。", questions: [{ q: "妈妈为什么不同意买摩托车？", options: ["A. 太贵了", "B. 太危险", "C. 噪音大", "D. 没必要"], correct: 1 }] },
      { type: "part2", dialogue: "女：你看过《我不是药神》吗？男：看过，太感人了，看得我眼泪都出来了。女：我也是，特别是最后那一段，完全忍不住。这部电影反映的社会问题也很深刻。", questions: [{ q: "他们在谈论什么？", options: ["A. 一本书", "B. 一部电影", "C. 一个新闻", "D. 一部电视剧"], correct: 1 },{ q: "男的看电影时怎么了？", options: ["A. 笑了", "B. 睡着了", "C. 哭了", "D. 没感觉"], correct: 2 }] },
      { type: "part2", dialogue: "男：请问，去火车站怎么走？女：你坐地铁二号线，在火车站下车就行了。男：大概要多久？女：从这里出发的话，大概二十分钟。", questions: [{ q: "男的要去哪儿？", options: ["A. 机场", "B. 火车站", "C. 汽车站", "D. 地铁站"], correct: 1 },{ q: "坐地铁大概要多久？", options: ["A. 十分钟", "B. 二十分钟", "C. 半小时", "D. 四十分钟"], correct: 1 }] },
      { type: "part2", dialogue: "女：大夫，我最近总是失眠，躺在床上翻来覆去睡不着。男：这种情况多长时间了？女：大概有半个月了。男：你最近是不是压力比较大？我给你开点安神的药，另外睡前可以喝杯热牛奶，泡泡脚。", questions: [{ q: "女的怎么了？", options: ["A. 头疼", "B. 胃疼", "C. 失眠", "D. 牙疼"], correct: 2 },{ q: "医生给了什么建议？", options: ["A. 多运动", "B. 睡前喝牛奶", "C. 少喝水", "D. 早点儿睡"], correct: 1 }] },
      { type: "part2", dialogue: "随着人们生活水平的提高，旅游已经成为很多人休闲度假的首选。无论是国内游还是出国游，人们都希望通过旅游放松身心、开阔眼界。不过，旅游时也要注意安全，提前做好攻略。", questions: [{ q: "这段话主要谈什么？", options: ["A. 旅游的好处", "B. 旅游注意事项", "C. 旅游的方式", "D. 旅游目的地"], correct: 0 }] },
      { type: "part2", dialogue: "失败是成功之母。每个人在成功的路上都会经历失败，重要的是要从失败中吸取教训，而不是被失败打倒。只要不放弃，总有一天会成功。", questions: [{ q: "这段话主要想告诉我们什么？", options: ["A. 失败很可怕", "B. 不要害怕失败", "C. 成功很容易", "D. 失败后要放弃"], correct: 1 }] },
      { type: "part2", dialogue: "中秋节是中国传统节日，在农历八月十五。这一天人们会和家人团聚，一起吃月饼、赏月。圆圆的月亮象征着团圆和美满。", questions: [{ q: "中秋节是哪一天？", options: ["A. 农历正月十五", "B. 农历五月初五", "C. 农历八月十五", "D. 农历九月初九"], correct: 2 },{ q: "圆月象征什么？", options: ["A. 幸福", "B. 团圆", "C. 健康", "D. 财富"], correct: 1 }] },
      { type: "part2", dialogue: "各位游客，大家好。欢迎来到故宫博物院。我是你们的导游，今天将由我带大家参观。请大家跟紧队伍，不要走散了，保管好自己的随身物品。", questions: [{ q: "说话人最可能是谁？", options: ["A. 老师", "B. 游客", "C. 导游", "D. 工作人员"], correct: 2 }] },
      { type: "part2", dialogue: "小李最近迷上了跑步，每天早上五点就起床去公园跑五公里。他说，跑完步出一身汗，整个人都精神了，工作效率也提高了。", questions: [{ q: "小李最近有什么爱好？", options: ["A. 游泳", "B. 跑步", "C. 打球", "D. 健身"], correct: 1 }] },
      { type: "part2", dialogue: "女：你怎么看起来这么累？男：别提了，昨晚邻居家吵架，吵到半夜，我一晚上没睡好。女：难怪你眼睛这么红。", questions: [{ q: "男的为什么没睡好？", options: ["A. 工作太晚", "B. 邻居吵架", "C. 失眠", "D. 玩游戏"], correct: 1 }] },
      { type: "part2", dialogue: "男：你觉得这两个方案哪个更好？女：我觉得第一个方案更有创意，但第二个方案更容易实施。", questions: [{ q: "女的觉得第二个方案怎么样？", options: ["A. 有创意", "B. 容易实施", "C. 成本低", "D. 效果好"], correct: 1 }] },
      { type: "part2", dialogue: "女：你平时喜欢看什么类型的电影？男：我比较喜欢看动作片和科幻片，不太喜欢爱情片。", questions: [{ q: "男的不喜欢什么类型的电影？", options: ["A. 动作片", "B. 科幻片", "C. 爱情片", "D. 喜剧片"], correct: 2 }] },
      { type: "part2", dialogue: "男：听说你要换工作了？女：对，现在的工作没什么发展空间，我想换个更有挑战性的。", questions: [{ q: "女的为什么想换工作？", options: ["A. 工资太低", "B. 离家太远", "C. 没发展空间", "D. 同事不好"], correct: 2 }] },
      { type: "part2", dialogue: "女：你怎么又抽烟了？不是说要戒烟吗？男：我也知道抽烟不好，可是戒了好几次都没成功。", questions: [{ q: "关于男的，可以知道什么？", options: ["A. 戒烟成功了", "B. 不想戒烟", "C. 戒烟没成功", "D. 刚开始抽烟"], correct: 2 }] },
      { type: "part2", dialogue: "男：你觉得这件衣服我穿着好看吗？女：颜色挺适合你的，不过好像有点大，要不要试试小一号的？", questions: [{ q: "女的觉得衣服怎么样？", options: ["A. 颜色不好", "B. 太大了", "C. 太小了", "D. 很完美"], correct: 1 }] },

      questionContainer.innerHTML = html;
      progressInfo.innerText = `第 ${idx+1} / ${qs.length} 题`;
      sectionHeader.innerText = examState.section==='listening'?`🎧 听力 (${idx+1}/${qs.length})`:examState.section==='reading'?`📖 阅读 (${idx+1}/${qs.length})`:examState.section==='writing'?`✍️ 书写 (${idx+1}/${qs.length})`:`📝 答题卡填写`;
      renderNavBar();
      if (examState.section === 'listening') { const playBtn = document.getElementById('playAudioBtn'); if(playBtn) { playBtn.addEventListener('click', ()=>{ speak(q.dialogue, ()=>{ setTimeout(()=>{ speak(q.q||q.question); }, 500); }); }); setTimeout(()=> playBtn.click(), 300); } }
      document.querySelectorAll('input[name="q"]').forEach(r=>r.addEventListener('change', e=>{ let v = parseInt(e.target.value); examState.answers[gIdx] = v; renderNavBar(); }));
      if (examState.section==='writing' && q.type==='part1') { let selectedWords = []; document.querySelectorAll('.word-tile').forEach(t=>t.addEventListener('click', ()=>{ selectedWords.push(t.dataset.word); t.classList.add('selected'); t.style.pointerEvents='none'; document.getElementById('sentencePreview').innerText = selectedWords.join(''); })); document.getElementById('clearBtn').addEventListener('click', ()=>{ selectedWords=[]; document.querySelectorAll('.word-tile').forEach(t=>{ t.classList.remove('selected'); t.style.pointerEvents='auto'; }); document.getElementById('sentencePreview').innerText='点击词语排序...'; }); document.getElementById('checkBtn').addEventListener('click', ()=>{ const s = selectedWords.join(''), fb = document.getElementById('fb'); fb.innerHTML = s===q.correct? '✅ 正确！' : `❌ 参考答案：${q.correct}`; examState.answers[gIdx] = s; renderNavBar(); }); }
      if (examState.section==='writing' && q.type==='part2') { const ta = document.getElementById('essayInput'); ta.addEventListener('input', ()=>{ document.getElementById('wordCount').innerText = ta.value.length + ' 字'; }); document.getElementById('saveBtn').addEventListener('click', ()=>{ examState.answers[gIdx]=ta.value; renderNavBar(); }); }
      document.getElementById('continueToReadingBtn')?.addEventListener('click', ()=>{ examState.section='reading'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startReadingTimer(); render(); });
    }

    function renderNavBar() { const qs = getCurrentQuestions(); let h = ''; for(let i=0; i<qs.length; i++) { const g = getGlobalIndex() - examState.currentQuestionIndex + i; h += `<button class="nav-btn ${examState.answers[g]!==null?'answered':''} ${i===examState.currentQuestionIndex?'current':''}" data-index="${i}">${i+1}</button>`; } navBar.innerHTML = h; navBar.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click', ()=>{ examState.currentQuestionIndex = parseInt(b.dataset.index); render(); })); }
    function nextQuestion() { const qs = getCurrentQuestions(); if (examState.currentQuestionIndex < qs.length-1) { examState.currentQuestionIndex++; render(); } else { if (examState.section==='listening') { examState.section='answerSheet'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startAnswerSheetTimer(); render(); } else if (examState.section==='reading') { examState.section='writing'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startWritingTimer(); render(); } else if (examState.section==='writing') finishExam(); } }
    function startListeningTimer() { clearInterval(examState.timerInterval); examState.timerInterval = setInterval(() => { if (examState.paused) return; if (examState.section==='listening' && examState.listeningTimer>0) { examState.listeningTimer--; timerEl.innerText = `听力部分: ${formatTime(examState.listeningTimer)}`; if (examState.listeningTimer<=0) { examState.section='answerSheet'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startAnswerSheetTimer(); render(); } } }, 1000); }
    function startAnswerSheetTimer() { clearInterval(examState.timerInterval); examState.timerInterval = setInterval(() => { if (examState.paused) return; if (examState.section==='answerSheet' && examState.answerSheetTimer>0) { examState.answerSheetTimer--; timerEl.innerText = `答题卡: ${formatTime(examState.answerSheetTimer)}`; const disp = document.getElementById('answerSheetTimerDisplay'); if (disp) disp.innerText = `剩余时间: ${formatTime(examState.answerSheetTimer)}`; if (examState.answerSheetTimer<=0) { examState.section='reading'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startReadingTimer(); render(); } } }, 1000); }
    function startReadingTimer() { clearInterval(examState.timerInterval); examState.timerInterval = setInterval(() => { if (examState.paused) return; if (examState.section==='reading' && examState.readingTimer>0) { examState.readingTimer--; timerEl.innerText = `阅读部分: ${formatTime(examState.readingTimer)}`; if (examState.readingTimer<=0) { examState.section='writing'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startWritingTimer(); render(); } } }, 1000); }
    function startWritingTimer() { clearInterval(examState.timerInterval); examState.timerInterval = setInterval(() => { if (examState.paused) return; if (examState.section==='writing' && examState.writingTimer>0) { examState.writingTimer--; timerEl.innerText = `书写部分: ${formatTime(examState.writingTimer)}`; if (examState.writingTimer<=0) finishExam(); } }, 1000); }
    function calculateScore() { let lc=0, rc=0, wc=0; for(let i=0; i<flatListening.length; i++) if(examState.answers[i]===flatListening[i].correct) lc++; for(let i=0; i<flatReading.length; i++) if(examState.answers[flatListening.length+i]===flatReading[i].correct) rc++; const wq = writingQuestions.filter(q=>q.type==='part1'); for(let i=0; i<wq.length; i++) if(examState.answers[flatListening.length+flatReading.length+i]===wq[i].correct) wc++; const ls=Math.round(lc/flatListening.length*100), rs=Math.round(rc/flatReading.length*100), ws=Math.round(wc/wq.length*100); return { ls, rs, ws, total: ls+rs+ws, passed: ls+rs+ws>=180 }; }
    function finishExam() { clearInterval(examState.timerInterval); const s = calculateScore(); examArea.classList.add('hidden'); resultArea.classList.remove('hidden'); resultArea.innerHTML = `<div style="text-align:center;"><h2>考试完成</h2><div style="display:flex; justify-content:center; gap:2rem; margin:1rem 0;"><div>听力<br><strong>${s.ls}/100</strong></div><div>阅读<br><strong>${s.rs}/100</strong></div><div>书写<br><strong>${s.ws}/100</strong></div></div><p style="font-size:2rem;"><strong>总分: ${s.total}/300</strong></p><p style="font-size:1.5rem; color:${s.passed?'green':'red'};">${s.passed?'🎉 恭喜！通过HSK 5！':'😢 继续努力！'}</p><button id="restartBtn" class="control-btn">重新开始</button></div>`; document.getElementById('restartBtn').addEventListener('click', ()=>location.reload()); }

    startBtn.addEventListener('click', ()=>{ startScreen.classList.add('hidden'); examArea.classList.remove('hidden'); examState.started = true; startListeningTimer(); render(); });
    prevBtn.addEventListener('click', ()=>{ if(examState.currentQuestionIndex>0) { examState.currentQuestionIndex--; render(); } });
    nextBtn.addEventListener('click', nextQuestion);
    pauseBtn.addEventListener('click', function(){ examState.paused = !examState.paused; this.innerHTML = examState.paused ? '<i class="fas fa-play"></i> 继续' : '<i class="fas fa-pause"></i> 暂停'; });
    const darkBtn = document.createElement('button'); darkBtn.innerHTML='<i class="fas fa-moon"></i>'; darkBtn.style.cssText='position:fixed; bottom:20px; right:20px; background:var(--accent); color:white; border:none; border-radius:50%; width:50px; height:50px; cursor:pointer;'; darkBtn.onclick = ()=>{ const is = document.body.classList.contains('dark'); if(is) { document.body.classList.remove('dark'); document.body.classList.add('light'); } else { document.body.classList.remove('light'); document.body.classList.add('dark'); } }; document.body.appendChild(darkBtn);
  })();
</script>
</body>
</html>
