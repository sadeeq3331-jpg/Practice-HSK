<script>
 // ---------------------- Robust Speech Module (PC + mobile, with fallback) ----------------------
(function() {
  // Use a free public TTS API as fallback (no key needed)
  const TTS_API = 'https://api.streamelements.com/kappa/talk?text=';

  let chineseVoice = null;
  let voicesLoaded = false;
  let useBrowserSpeech = true;

  function loadVoices() {
    if (!window.speechSynthesis) {
      useBrowserSpeech = false;
      return;
    }
    const voices = window.speechSynthesis.getVoices();
    if (voices.length) {
      // Try to find a Chinese voice (zh-CN)
      chineseVoice = voices.find(v => v.lang === 'zh-CN' || v.lang === 'zh' || v.lang.startsWith('zh'));
      voicesLoaded = true;
      console.log("✅ Voices loaded, Chinese voice:", chineseVoice ? chineseVoice.name : "none");
      if (!chineseVoice) useBrowserSpeech = false;
    } else {
      // No voices yet, schedule another attempt
      setTimeout(() => loadVoices(), 200);
    }
  }

  // Try to load voices immediately (if already available)
  if (window.speechSynthesis) {
    if (window.speechSynthesis.getVoices().length) {
      loadVoices();
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
  } else {
    useBrowserSpeech = false;
  }

  // Warm up the speech engine on page load (helps iOS)
  setTimeout(() => {
    if (useBrowserSpeech && window.speechSynthesis) {
      try {
        const dummy = new SpeechSynthesisUtterance(' ');
        dummy.volume = 0;
        window.speechSynthesis.speak(dummy);
        window.speechSynthesis.cancel();
      } catch(e) {}
    }
  }, 1000);

  function speakViaBrowser(text) {
    return new Promise((resolve, reject) => {
      if (!window.speechSynthesis) {
        reject('No speech synthesis');
        return;
      }
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-CN';
      utterance.rate = 0.85;   // moderate speed
      utterance.pitch = 1;
      if (chineseVoice) utterance.voice = chineseVoice;
      utterance.onend = resolve;
      utterance.onerror = reject;
      window.speechSynthesis.cancel(); // stop previous
      window.speechSynthesis.speak(utterance);
    });
  }

  function speakViaAPI(text) {
    const url = TTS_API + encodeURIComponent(text);
    const audio = new Audio(url);
    audio.play().catch(err => console.warn('API TTS failed:', err));
  }

  window.speakText = function(text) {
    if (!text) return;
    if (useBrowserSpeech && window.speechSynthesis) {
      // If voices not loaded yet, wait a bit
      if (!voicesLoaded) {
        setTimeout(() => window.speakText(text), 300);
        return;
      }
      speakViaBrowser(text).catch(() => {
        // fallback to API
        speakViaAPI(text);
      });
    } else {
      speakViaAPI(text);
    }
  };
})();
  // ---------------------- MAIN APP LOGIC ----------------------
  const wordList = window.HSK4_WORDS || [];
  if (wordList.length === 0) {
    alert('Error: words.js not loaded. Please ensure it exists.');
  }

  // State
  let currentFilter = 'all';
  let currentLetter = null;
  let filteredWords = [...wordList];
  let currentPage = 1;
  const pageSize = 20;
  let favorites = new Set(JSON.parse(localStorage.getItem('hsk4_favorites') || '[]'));
  let studiedWords = new Set(JSON.parse(localStorage.getItem('hsk4_studied') || '[]'));

  // DOM elements
  const grid = document.getElementById('vocabGrid');
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const shownSpan = document.getElementById('shownCount');
  const totalSpan = document.getElementById('totalCount');
  const paginationDiv = document.getElementById('paginationContainer');
  const bottomPrev = document.getElementById('prevPageBottom');
  const bottomNext = document.getElementById('nextPageBottom');
  const pageInfoSpan = document.getElementById('pageInfo');
  const categoryBtns = document.querySelectorAll('.cat-btn');
  const favCountSpan = document.getElementById('favCount');
  const studiedCountSpan = document.getElementById('studiedCount');
  const totalWordsStatSpan = document.getElementById('totalWordsStat');
  const masteryPercentSpan = document.getElementById('masteryPercent');
  const statsPanel = document.getElementById('statsPanel');
  const toggleStatsBtn = document.getElementById('toggleStatsBtn');
  const exportFavBtn = document.getElementById('exportFavBtn');
  const importFavBtn = document.getElementById('importFavBtn');
  const importFavFile = document.getElementById('importFavFile');
  const resetProgressBtn = document.getElementById('resetProgressBtn');
  const darkModeToggle = document.getElementById('darkModeToggle');
  const letterFilterDiv = document.getElementById('letterFilter');

  // Buddy elements
  const buddyBubble = document.getElementById('buddyBubble');
  const buddyAvatar = document.getElementById('buddyAvatar');
  const closeBuddy = document.getElementById('closeBuddy');
  const newBuddyWord = document.getElementById('newBuddyWord');
  const speakBuddyWord = document.getElementById('speakBuddyWord');
  const buddyWordDisplay = document.getElementById('buddyWordDisplay');
  const quizPanelElem = document.getElementById('quizPanel');
  const typingPanelElem = document.getElementById('typingPanel');
  const typingInputElem = document.getElementById('typingInput');
  const submitTyping = document.getElementById('submitTyping');
  const typingFeedbackMsg = document.getElementById('typingFeedbackMsg');
  const tabs = document.querySelectorAll('.buddy-tab');

  let currentMode = 'quiz';
  let currentBuddyWord = null;
  let buddyVisible = false;

  // Helper: update stats display
  function updateStats() {
    favCountSpan.innerText = favorites.size;
    const studied = studiedWords.size;
    studiedCountSpan.innerText = studied;
    totalWordsStatSpan.innerText = wordList.length;
    const percent = wordList.length ? Math.round((studied / wordList.length) * 100) : 0;
    masteryPercentSpan.innerText = percent;
  }

  // Mark word as studied when it appears on current page
  function markWordsStudied(words) {
    let changed = false;
    words.forEach(w => {
      if (!studiedWords.has(w.word)) {
        studiedWords.add(w.word);
        changed = true;
      }
    });
    if (changed) {
      localStorage.setItem('hsk4_studied', JSON.stringify([...studiedWords]));
      updateStats();
    }
  }

  // Initialize app
  function initApp() {
    if (wordList.length === 0) return;
    totalSpan.innerText = wordList.length;
    buildLetterFilter();
    applyFilter();
    render();
    updateStats();

    const savedTheme = localStorage.getItem('hsk4_theme');
    if (savedTheme === 'dark') {
      document.body.classList.remove('light');
      document.body.classList.add('dark');
      darkModeToggle.innerHTML = '<i class="fas fa-sun"></i> Light Mode';
    } else {
      document.body.classList.add('light');
      darkModeToggle.innerHTML = '<i class="fas fa-moon"></i> Dark Mode';
    }
  }

  // Build letter filter buttons
  function buildLetterFilter() {
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    letterFilterDiv.innerHTML = '<button class="letter-btn all-letters" data-letter="">All</button>';
    letters.forEach(l => {
      const btn = document.createElement('button');
      btn.className = 'letter-btn';
      btn.textContent = l;
      btn.dataset.letter = l.toLowerCase();
      btn.addEventListener('click', () => {
        document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLetter = l.toLowerCase();
        applyFilter();
        render();
      });
      letterFilterDiv.appendChild(btn);
    });
    const allBtn = document.querySelector('.letter-btn.all-letters');
    if (allBtn) {
      allBtn.addEventListener('click', () => {
        document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
        allBtn.classList.add('active');
        currentLetter = null;
        applyFilter();
        render();
      });
      allBtn.classList.add('active');
    }
  }

  // Filtering logic
  function applyFilter() {
    const searchTerm = searchInput.value.trim().toLowerCase();
    let base = wordList;

    if (currentFilter === 'favorites') {
      base = wordList.filter(w => favorites.has(w.word));
    } else if (currentFilter !== 'all') {
      const [start, end] = getRangeIndices(currentFilter);
      base = wordList.slice(start, end);
    }

    if (currentLetter) {
      base = base.filter(w => {
        const pinyinFirst = w.pinyin.trim().toLowerCase().charAt(0);
        return pinyinFirst === currentLetter;
      });
    }

    if (searchTerm) {
      filteredWords = base.filter(w =>
        w.word.includes(searchTerm) ||
        w.pinyin.toLowerCase().includes(searchTerm) ||
        w.meaning.toLowerCase().includes(searchTerm)
      );
    } else {
      filteredWords = [...base];
    }
    currentPage = 1;
  }

  function getRangeIndices(range) {
    switch(range) {
      case '1-150': return [0, 150];
      case '151-300': return [150, 300];
      case '301-600': return [300, 600];
      case '601-1200': return [600, 1200];
      default: return [0, wordList.length];
    }
  }

  function saveFavorites() {
    localStorage.setItem('hsk4_favorites', JSON.stringify([...favorites]));
    updateStats();
  }

  function toggleFavorite(word) {
    if (favorites.has(word)) favorites.delete(word);
    else favorites.add(word);
    saveFavorites();
    if (currentFilter === 'favorites') {
      applyFilter();
      render();
    } else {
      render();
    }
  }

  function render() {
    const start = (currentPage-1)*pageSize;
    const pageWords = filteredWords.slice(start, start+pageSize);
    if (pageWords.length === 0) {
      grid.innerHTML = '<div class="empty-state" style="text-align:center;padding:2rem;">✨ No words found</div>';
    } else {
      let html = '';
      pageWords.forEach(item => {
        const isFav = favorites.has(item.word);
        const exampleHtml = item.example ? `
          <div class="example-container">
            <span class="example-text">📌 ${item.example}</span>
            <button class="example-speaker" data-example="${item.example}"><i class="fas fa-volume-up"></i></button>
          </div>
        ` : '';
        html += `
          <div class="vocab-card">
            <div class="word-header">
              <span class="chinese-word">${item.word}</span>
              <div>
                <button class="favorite-btn ${isFav ? 'active' : ''}" data-word="${item.word}"><i class="${isFav ? 'fas' : 'far'} fa-heart"></i></button>
                <button class="speaker-btn" data-word="${item.word}"><i class="fas fa-volume-up"></i></button>
              </div>
            </div>
            <div class="pinyin">${item.pinyin}</div>
            <div class="meaning">${item.meaning}</div>
            ${exampleHtml}
          </div>
        `;
      });
      grid.innerHTML = html;
      markWordsStudied(pageWords);
    }

    // attach event listeners using global speakText
    document.querySelectorAll('.speaker-btn').forEach(btn => {
      btn.addEventListener('click', () => window.speakText(btn.dataset.word));
    });
    document.querySelectorAll('.example-speaker').forEach(btn => {
      btn.addEventListener('click', () => window.speakText(btn.dataset.example));
    });
    document.querySelectorAll('.favorite-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const word = btn.dataset.word;
        toggleFavorite(word);
        const icon = btn.querySelector('i');
        if (favorites.has(word)) {
          icon.classList.remove('far');
          icon.classList.add('fas');
          btn.classList.add('active');
        } else {
          icon.classList.remove('fas');
          icon.classList.add('far');
          btn.classList.remove('active');
        }
      });
    });

    shownSpan.innerText = filteredWords.length;
    renderPagination();
  }

  function renderPagination() {
    const totalPages = Math.ceil(filteredWords.length / pageSize);
    if (totalPages <= 1) {
      paginationDiv.innerHTML = '';
      bottomPrev.disabled = true;
      bottomNext.disabled = true;
      pageInfoSpan.innerText = `Page 1 / 1`;
    } else {
      // Top pagination
      let btns = '';
      btns += `<button class="page-btn" id="prevPageTop" ${currentPage===1?'disabled':''}><i class="fas fa-chevron-left"></i></button>`;
      for (let i=1; i<=totalPages; i++) {
        btns += `<button class="page-btn ${i===currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
      }
      btns += `<button class="page-btn" id="nextPageTop" ${currentPage===totalPages?'disabled':''}><i class="fas fa-chevron-right"></i></button>`;
      paginationDiv.innerHTML = btns;
      document.querySelectorAll('.page-btn[data-page]').forEach(btn => {
        btn.addEventListener('click', () => {
          currentPage = parseInt(btn.dataset.page);
          render();
        });
      });
      document.getElementById('prevPageTop')?.addEventListener('click', () => {
        if (currentPage > 1) { currentPage--; render(); }
      });
      document.getElementById('nextPageTop')?.addEventListener('click', () => {
        if (currentPage < totalPages) { currentPage++; render(); }
      });

      // Bottom pagination
      bottomPrev.disabled = (currentPage === 1);
      bottomNext.disabled = (currentPage === totalPages);
      pageInfoSpan.innerText = `Page ${currentPage} / ${totalPages}`;
    }
  }

  // Category & search & letter changes
  categoryBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      categoryBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.cat;
      applyFilter();
      render();
    });
  });
  function handleSearch() { applyFilter(); render(); }
  searchBtn.addEventListener('click', handleSearch);
  searchInput.addEventListener('keyup', e => e.key === 'Enter' && handleSearch());

  // Bottom pagination buttons
  bottomPrev.addEventListener('click', () => {
    if (currentPage > 1) {
      currentPage--;
      render();
    }
  });
  bottomNext.addEventListener('click', () => {
    const totalPages = Math.ceil(filteredWords.length / pageSize);
    if (currentPage < totalPages) {
      currentPage++;
      render();
    }
  });

  // Stats panel toggle
  toggleStatsBtn.addEventListener('click', () => {
    statsPanel.classList.toggle('hidden');
    localStorage.setItem('hsk4_stats_visible', (!statsPanel.classList.contains('hidden')).toString());
  });
  if (localStorage.getItem('hsk4_stats_visible') === 'true') {
    statsPanel.classList.remove('hidden');
  } else {
    statsPanel.classList.add('hidden');
  }

  // Dark mode toggle
  darkModeToggle.addEventListener('click', () => {
    const isDark = document.body.classList.contains('dark');
    if (isDark) {
      document.body.classList.remove('dark');
      document.body.classList.add('light');
      localStorage.setItem('hsk4_theme', 'light');
      darkModeToggle.innerHTML = '<i class="fas fa-moon"></i> Dark Mode';
    } else {
      document.body.classList.remove('light');
      document.body.classList.add('dark');
      localStorage.setItem('hsk4_theme', 'dark');
      darkModeToggle.innerHTML = '<i class="fas fa-sun"></i> Light Mode';
    }
  });

  // Export favorites
  exportFavBtn.addEventListener('click', () => {
    const data = JSON.stringify([...favorites], null, 2);
    const blob = new Blob([data], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'hsk4_favorites.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  // Import favorites
  importFavBtn.addEventListener('click', () => {
    importFavFile.click();
  });
  importFavFile.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (Array.isArray(imported)) {
          favorites = new Set(imported);
          saveFavorites();
          if (currentFilter === 'favorites') {
            applyFilter();
            render();
          } else {
            render();
          }
          updateStats();
          alert('Favorites imported successfully!');
        } else {
          alert('Invalid file format, expected JSON array');
        }
      } catch (err) {
        alert('Failed to parse file');
      }
      importFavFile.value = '';
    };
    reader.readAsText(file);
  });

  // Reset progress
  resetProgressBtn.addEventListener('click', () => {
    if (confirm('Reset progress will clear all studied records. Continue?')) {
      studiedWords.clear();
      localStorage.setItem('hsk4_studied', JSON.stringify([]));
      updateStats();
      alert('Progress reset');
    }
  });

  // ---------------------- Buddy Logic ----------------------
  function getRandomWordFromFiltered() {
    if (filteredWords.length === 0) return null;
    return filteredWords[Math.floor(Math.random() * filteredWords.length)];
  }

  function updateBuddyWord(wordObj) {
    currentBuddyWord = wordObj;
    if (!wordObj) {
      buddyWordDisplay.innerText = '?';
      return;
    }
    buddyWordDisplay.innerText = wordObj.word;
    if (currentMode === 'quiz') generateQuiz(wordObj);
  }

  function generateQuiz(wordObj) {
    if (!wordObj) return;
    const correct = wordObj.meaning;
    let options = [correct];
    while (options.length < 4) {
      const rand = wordList[Math.floor(Math.random() * wordList.length)];
      if (!options.includes(rand.meaning) && rand.meaning !== correct) options.push(rand.meaning);
    }
    options = options.sort(() => Math.random() - 0.5);
    quizPanelElem.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('div');
      btn.className = 'quiz-opt';
      btn.innerText = opt;
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.quiz-opt').forEach(el => el.style.pointerEvents = 'none');
        if (opt === correct) btn.classList.add('correct');
        else {
          btn.classList.add('wrong');
          document.querySelectorAll('.quiz-opt').forEach(el => {
            if (el.innerText === correct) el.classList.add('correct');
          });
        }
      });
      quizPanelElem.appendChild(btn);
    });
  }

  function showTypingPanel() {
    typingPanelElem.style.display = 'flex';
    quizPanelElem.style.display = 'none';
  }

  function showQuizPanel() {
    typingPanelElem.style.display = 'none';
    quizPanelElem.style.display = 'flex';
  }

  function switchMode(mode) {
    currentMode = mode;
    if (mode === 'quiz') {
      showQuizPanel();
      if (currentBuddyWord) generateQuiz(currentBuddyWord);
    } else {
      showTypingPanel();
    }
  }

  function handleNewWord() {
    const newWordObj = getRandomWordFromFiltered();
    if (newWordObj) {
      updateBuddyWord(newWordObj);
      if (currentMode === 'typing') {
        typingInputElem.value = '';
        typingFeedbackMsg.innerHTML = '';
      }
    } else {
      buddyWordDisplay.innerText = 'No words';
    }
  }

  function handleTypingSubmit() {
    if (!currentBuddyWord) return;
    const userAns = typingInputElem.value.trim().toLowerCase();
    const correct = currentBuddyWord.meaning.toLowerCase();
    if (userAns === correct) {
      typingFeedbackMsg.innerHTML = '<span style="color:#38a169;">✓ Correct!</span>';
    } else {
      typingFeedbackMsg.innerHTML = `<span style="color:#e53e3e;">✗ Wrong. Correct: ${currentBuddyWord.meaning}</span>`;
    }
  }

  // Buddy toggle: click avatar toggles bubble
  buddyAvatar.addEventListener('click', () => {
    if (buddyVisible) {
      buddyBubble.classList.add('hidden');
      buddyVisible = false;
    } else {
      buddyBubble.classList.remove('hidden');
      buddyVisible = true;
      if (!currentBuddyWord) handleNewWord();
    }
  });
  closeBuddy.addEventListener('click', () => {
    buddyBubble.classList.add('hidden');
    buddyVisible = false;
  });
  newBuddyWord.addEventListener('click', handleNewWord);
  speakBuddyWord.addEventListener('click', () => {
    if (currentBuddyWord) window.speakText(currentBuddyWord.word);
  });
  submitTyping.addEventListener('click', handleTypingSubmit);
  typingInputElem.addEventListener('keyup', e => { if (e.key === 'Enter') handleTypingSubmit(); });

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const mode = tab.dataset.mode;
      switchMode(mode);
    });
  });

  // Initialize everything
  initApp();
</script>
</body>
</html>
