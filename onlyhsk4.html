<body>
<div class="app-container">
  <div class="header">
    <div class="title-section">
      <h1>📚 HSK4 · 词汇大师</h1>
      <div class="badge"><i class="fas fa-mobile-alt"></i> 移动/桌面 | 1200词</div>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 搜词语、拼音或英文">
      <button id="searchBtn">搜索</button>
    </div>
  </div>

  <div class="categories" id="categoryTabs">
    <button class="cat-btn active" data-cat="all">全部 (1200)</button>
    <button class="cat-btn" data-cat="1-150">1–150</button>
    <button class="cat-btn" data-cat="151-300">151–300</button>
    <button class="cat-btn" data-cat="301-600">301–600</button>
    <button class="cat-btn" data-cat="601-1200">601–1200</button>
    <button class="cat-btn" data-cat="favorites"><i class="fas fa-heart"></i> 收藏</button>
  </div>

  <div class="stats-bar">
    <div class="word-counter">📄 显示 <span id="shownCount">0</span> / <span id="totalCount">1200</span> 词</div>
    <div class="pagination-controls" id="paginationContainer"></div>
  </div>

  <div id="vocabGrid" class="card-grid"></div>

  <div class="footer-note">
    <span><i class="fas fa-heart"></i> 收藏</span>
    <span><i class="fas fa-volume-up"></i> 点击发音</span>
    <span><i class="fas fa-robot"></i> 智能助手</span>
  </div>
</div>

<!-- Unified Floating Buddy -->
<div class="buddy-container" id="buddyContainer">
  <div class="buddy-bubble hidden" id="buddyBubble">
    <div class="buddy-header">
      <span><i class="fas fa-robot"></i> 学习助手</span>
      <button class="buddy-close" id="closeBuddy"><i class="fas fa-times"></i></button>
    </div>
    <div class="buddy-tabs">
      <button class="buddy-tab active" data-mode="quiz">📝 选择题</button>
      <button class="buddy-tab" data-mode="typing">⌨️ 打字练习</button>
    </div>
    <div id="buddyWordDisplay" class="buddy-word">?</div>
    <div class="buddy-controls">
      <button id="speakBuddyWord"><i class="fas fa-volume-up"></i> 发音</button>
      <button id="newBuddyWord"><i class="fas fa-random"></i> 换词</button>
    </div>
    <div id="quizPanel" class="quiz-options"></div>
    <div id="typingPanel" class="typing-area" style="display:none;">
      <input type="text" id="typingInput" class="typing-input" placeholder="输入英文意思...">
      <button id="submitTyping" class="buddy-tab" style="background:#1b6b85; color:white;">提交</button>
      <div id="typingFeedbackMsg" class="typing-feedback"></div>
    </div>
  </div>
  <div class="buddy-avatar" id="buddyAvatar">
    <span>AI助手</span>
    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231b6b85'/%3E%3Ccircle cx='35' cy='40' r='5' fill='white'/%3E%3Ccircle cx='65' cy='40' r='5' fill='white'/%3E%3Cpath d='M35 65 Q50 80 65 65' stroke='white' stroke-width='4' fill='none' stroke-linecap='round'/%3E%3C/svg%3E" alt="buddy">
  </div>
</div>

<script>
  // --------------------------------------------------------------
  // HSK4 WORD LIST (fallback if external not loaded)
  // --------------------------------------------------------------
  const wordList = window.HSK4_WORDS || [];
  if (wordList.length === 0) {
    console.warn("words.js not loaded, using inline demo list (minimal). You should provide words.js");
    // Minimal demo list (you can embed full 1200 here if needed)
    // For brevity, we only show a placeholder. In real implementation, you'd embed all.
    // We'll rely on words.js being present.
  }
  // --------------------------------------------------------------
  // App state
  let currentFilter = 'all';
  let filteredWords = [...wordList];
  let currentPage = 1;
  const pageSize = 20;
  let favorites = new Set(JSON.parse(localStorage.getItem('hsk4_favorites') || '[]'));

  // DOM elements
  const grid = document.getElementById('vocabGrid');
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const shownSpan = document.getElementById('shownCount');
  const totalSpan = document.getElementById('totalCount');
  const paginationDiv = document.getElementById('paginationContainer');
  const categoryBtns = document.querySelectorAll('.cat-btn');

  // Buddy elements
  const buddyBubble = document.getElementById('buddyBubble');
  const buddyAvatar = document.getElementById('buddyAvatar');
  const closeBuddy = document.getElementById('closeBuddy');
  const newBuddyWord = document.getElementById('newBuddyWord');
  const speakBuddyWord = document.getElementById('speakBuddyWord');
  const buddyWordDisplay = document.getElementById('buddyWordDisplay');
  const quizPanel = document.getElementById('quizPanel');
  const typingPanel = document.getElementById('typingPanel');
  const typingInput = document.getElementById('typingInput');
  const submitTyping = document.getElementById('submitTyping');
  const typingFeedbackMsg = document.getElementById('typingFeedbackMsg');
  const tabs = document.querySelectorAll('.buddy-tab');

  let currentMode = 'quiz'; // 'quiz' or 'typing'
  let currentBuddyWord = null;
  let currentQuizWordObj = null;
  let buddyVisible = false;

  // Helper: speech (works on mobile after user interaction)
  function speakText(text) {
    if (!text) return;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    window.speechSynthesis.cancel(); // stop any ongoing
    window.speechSynthesis.speak(utterance);
  }

  // Initialize from wordList
  function initApp() {
    if (wordList.length === 0) {
      totalSpan.innerText = '0';
      return;
    }
    totalSpan.innerText = wordList.length;
    applyFilter();
    render();
  }

  // Filtering logic
  function applyFilter() {
    const searchTerm = searchInput.value.trim().toLowerCase();
    let base = wordList;
    if (currentFilter === 'favorites') {
      base = wordList.filter(w => favorites.has(w.word));
    } else if (currentFilter !== 'all') {
      const [start, end] = getRangeIndices(currentFilter);
      base = wordList.slice(start, end);
    }
    if (searchTerm) {
      filteredWords = base.filter(w =>
        w.word.includes(searchTerm) ||
        w.pinyin.toLowerCase().includes(searchTerm) ||
        w.meaning.toLowerCase().includes(searchTerm)
      );
    } else {
      filteredWords = [...base];
    }
    currentPage = 1;
  }

  function getRangeIndices(range) {
    switch(range) {
      case '1-150': return [0, 150];
      case '151-300': return [150, 300];
      case '301-600': return [300, 600];
      case '601-1200': return [600, 1200];
      default: return [0, wordList.length];
    }
  }

  function saveFavorites() {
    localStorage.setItem('hsk4_favorites', JSON.stringify([...favorites]));
  }

  function toggleFavorite(word) {
    if (favorites.has(word)) favorites.delete(word);
    else favorites.add(word);
    saveFavorites();
    if (currentFilter === 'favorites') {
      applyFilter();
      render();
    } else {
      render(); // update heart icons
    }
  }

  function render() {
    const start = (currentPage-1)*pageSize;
    const pageWords = filteredWords.slice(start, start+pageSize);
    if (pageWords.length === 0) {
      grid.innerHTML = '<div class="empty-state" style="text-align:center;padding:2rem;">✨ 暂无词汇</div>';
    } else {
      let html = '';
      pageWords.forEach(item => {
        const isFav = favorites.has(item.word);
        const exampleHtml = item.example ? `
          <div class="example-container">
            <span class="example-text">📌 ${item.example}</span>
            <button class="example-speaker" data-example="${item.example}"><i class="fas fa-volume-up"></i></button>
          </div>
        ` : '';
        html += `
          <div class="vocab-card">
            <div class="word-header">
              <span class="chinese-word">${item.word}</span>
              <div>
                <button class="favorite-btn ${isFav ? 'active' : ''}" data-word="${item.word}"><i class="${isFav ? 'fas' : 'far'} fa-heart"></i></button>
                <button class="speaker-btn" data-word="${item.word}"><i class="fas fa-volume-up"></i></button>
              </div>
            </div>
            <div class="pinyin">${item.pinyin}</div>
            <div class="meaning">${item.meaning}</div>
            ${exampleHtml}
          </div>
        `;
      });
      grid.innerHTML = html;
    }

    // attach event listeners
    document.querySelectorAll('.speaker-btn').forEach(btn => {
      btn.addEventListener('click', () => speakText(btn.dataset.word));
    });
    document.querySelectorAll('.example-speaker').forEach(btn => {
      btn.addEventListener('click', () => speakText(btn.dataset.example));
    });
    document.querySelectorAll('.favorite-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const word = btn.dataset.word;
        toggleFavorite(word);
        const icon = btn.querySelector('i');
        if (favorites.has(word)) {
          icon.classList.remove('far');
          icon.classList.add('fas');
          btn.classList.add('active');
        } else {
          icon.classList.remove('fas');
          icon.classList.add('far');
          btn.classList.remove('active');
        }
      });
    });

    shownSpan.innerText = filteredWords.length;
    renderPagination();
  }

  function renderPagination() {
    const totalPages = Math.ceil(filteredWords.length / pageSize);
    if (totalPages <= 1) { paginationDiv.innerHTML = ''; return; }
    let btns = '';
    btns += `<button class="page-btn" id="prevPage" ${currentPage===1?'disabled':''}><i class="fas fa-chevron-left"></i></button>`;
    for (let i=1; i<=totalPages; i++) {
      btns += `<button class="page-btn ${i===currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
    }
    btns += `<button class="page-btn" id="nextPage" ${currentPage===totalPages?'disabled':''}><i class="fas fa-chevron-right"></i></button>`;
    paginationDiv.innerHTML = btns;
    document.querySelectorAll('.page-btn[data-page]').forEach(btn => {
      btn.addEventListener('click', () => {
        currentPage = parseInt(btn.dataset.page);
        render();
      });
    });
    document.getElementById('prevPage')?.addEventListener('click', () => {
      if (currentPage > 1) { currentPage--; render(); }
    });
    document.getElementById('nextPage')?.addEventListener('click', () => {
      if (currentPage < Math.ceil(filteredWords.length / pageSize)) { currentPage++; render(); }
    });
  }

  // Category & search
  categoryBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      categoryBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.cat;
      applyFilter();
      render();
    });
  });
  function handleSearch() { applyFilter(); render(); }
  searchBtn.addEventListener('click', handleSearch);
  searchInput.addEventListener('keyup', e => e.key === 'Enter' && handleSearch());

  // ---------------------- Buddy Logic ----------------------
  function getRandomWordFromFiltered() {
    if (filteredWords.length === 0) return null;
    return filteredWords[Math.floor(Math.random() * filteredWords.length)];
  }

  function updateBuddyWord(wordObj) {
    currentBuddyWord = wordObj;
    if (!wordObj) {
      buddyWordDisplay.innerText = '?';
      return;
    }
    buddyWordDisplay.innerText = wordObj.word;
    if (currentMode === 'quiz') generateQuiz(wordObj);
    // typing panel resets when switched
  }

  function generateQuiz(wordObj) {
    if (!wordObj) return;
    const correct = wordObj.meaning;
    let options = [correct];
    while (options.length < 4) {
      const rand = wordList[Math.floor(Math.random() * wordList.length)];
      if (!options.includes(rand.meaning) && rand.meaning !== correct) options.push(rand.meaning);
    }
    options = options.sort(() => Math.random() - 0.5);
    quizPanel.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('div');
      btn.className = 'quiz-opt';
      btn.innerText = opt;
      btn.addEventListener('click', (e) => {
        // disable all options after selection
        document.querySelectorAll('.quiz-opt').forEach(el => el.style.pointerEvents = 'none');
        if (opt === correct) btn.classList.add('correct');
        else {
          btn.classList.add('wrong');
          // highlight correct
          document.querySelectorAll('.quiz-opt').forEach(el => {
            if (el.innerText === correct) el.classList.add('correct');
          });
        }
        // optionally auto-refresh after 2 sec? We'll let user click "换词"
      });
      quizPanel.appendChild(btn);
    });
  }

  function showTypingPanel(wordObj) {
    if (!wordObj) return;
    typingInput.value = '';
    typingFeedbackMsg.innerHTML = '';
    typingPanel.style.display = 'flex';
    quizPanel.style.display = 'none';
  }

  function showQuizPanel() {
    typingPanel.style.display = 'none';
    quizPanel.style.display = 'flex';
  }

  function switchMode(mode) {
    currentMode = mode;
    if (mode === 'quiz') {
      showQuizPanel();
      if (currentBuddyWord) generateQuiz(currentBuddyWord);
    } else {
      showTypingPanel(currentBuddyWord);
    }
  }

  function handleNewWord() {
    const newWordObj = getRandomWordFromFiltered();
    if (newWordObj) {
      updateBuddyWord(newWordObj);
      if (currentMode === 'typing') {
        typingInput.value = '';
        typingFeedbackMsg.innerHTML = '';
      }
    } else {
      buddyWordDisplay.innerText = '暂无词汇';
    }
  }

  function handleTypingSubmit() {
    if (!currentBuddyWord) return;
    const userAns = typingInput.value.trim().toLowerCase();
    const correct = currentBuddyWord.meaning.toLowerCase();
    if (userAns === correct) {
      typingFeedbackMsg.innerHTML = '<span style="color:#38a169;">✓ 正确！</span>';
    } else {
      typingFeedbackMsg.innerHTML = `<span style="color:#e53e3e;">✗ 错误，正确答案: ${currentBuddyWord.meaning}</span>`;
    }
  }

  // Buddy UI visibility
  function showBuddy() {
    buddyBubble.classList.remove('hidden');
    buddyVisible = true;
    if (!currentBuddyWord) handleNewWord();
  }
  function hideBuddy() {
    buddyBubble.classList.add('hidden');
    buddyVisible = false;
  }
  buddyAvatar.addEventListener('click', (e) => {
    if (buddyVisible) hideBuddy();
    else showBuddy();
  });
  closeBuddy.addEventListener('click', hideBuddy);
  newBuddyWord.addEventListener('click', handleNewWord);
  speakBuddyWord.addEventListener('click', () => {
    if (currentBuddyWord) speakText(currentBuddyWord.word);
  });
  submitTyping.addEventListener('click', handleTypingSubmit);
  typingInput.addEventListener('keyup', e => { if (e.key === 'Enter') handleTypingSubmit(); });

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const mode = tab.dataset.mode;
      switchMode(mode);
    });
  });

  // Draggable buddy
  let dragActive = false, startX, startY, startLeft, startTop;
  const buddyContainer = document.getElementById('buddyContainer');
  buddyAvatar.addEventListener('mousedown', startDrag);
  buddyAvatar.addEventListener('touchstart', startDrag, {passive: false});
  function startDrag(e) {
    e.preventDefault();
    dragActive = true;
    const rect = buddyContainer.getBoundingClientRect();
    const clientX = e.clientX ?? e.touches[0].clientX;
    const clientY = e.clientY ?? e.touches[0].clientY;
    startX = clientX - rect.left;
    startY = clientY - rect.top;
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('touchmove', onDrag, {passive: false});
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);
  }
  function onDrag(e) {
    if (!dragActive) return;
    e.preventDefault();
    const clientX = e.clientX ?? e.touches[0].clientX;
    const clientY = e.clientY ?? e.touches[0].clientY;
    let left = clientX - startX;
    let top = clientY - startY;
    left = Math.min(Math.max(left, 0), window.innerWidth - buddyContainer.offsetWidth);
    top = Math.min(Math.max(top, 0), window.innerHeight - buddyContainer.offsetHeight);
    buddyContainer.style.position = 'fixed';
    buddyContainer.style.left = left + 'px';
    buddyContainer.style.top = top + 'px';
    buddyContainer.style.right = 'auto';
    buddyContainer.style.bottom = 'auto';
  }
  function stopDrag() {
    dragActive = false;
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('touchmove', onDrag);
    document.removeEventListener('mouseup', stopDrag);
    document.removeEventListener('touchend', stopDrag);
  }

  // Ensure speech synthesis is allowed (first interaction)
  // We'll rely on button clicks to trigger speech, which is fine.

  initApp();
</script>
</body>
</html>
