      { type: "part2", dialogue: "男：听说你搬家了？新家怎么样？女：挺好的，虽然离公司远了一点儿，但是环境特别好，也很安静。", question: "新家有什么优点？", options: ["A. 离公司近", "B. 环境好", "C. 房租便宜", "D. 交通方便"], correct: 1 },
      { type: "part2", dialogue: "女：你每天晚上几点睡？男：我习惯晚睡，一般十二点以后才睡，早上七点起。", question: "男的几点睡觉？", options: ["A. 十点", "B. 十一点", "C. 十二点以后", "D. 七点"], correct: 2 },

      { type: "part2", dialogue: "女：你跟你弟弟长得不太像啊。男：对，他像我爸，我像我妈。", question: "男的像谁？", options: ["A. 爸爸", "B. 妈妈", "C. 弟弟", "D. 都不像"], correct: 1 },
      { type: "part2", dialogue: "男：你的感冒好点了吗？女：好多了，谢谢。不过还是有点咳嗽。", question: "女的现在怎么样了？", options: ["A. 完全好了", "B. 更严重了", "C. 好多了但还有点咳嗽", "D. 没变化"], correct: 2 },

      { type: "part3", dialogue: "女：你好，请问这件衣服可以试穿吗？男：当然可以，试衣间在那边。女：谢谢。我穿M号应该可以吧？男：您稍等，我帮您拿一件M号的。", questions: [{ q: "这段对话最可能发生在哪儿？", options: ["A. 餐厅", "B. 服装店", "C. 图书馆", "D. 办公室"], correct: 1 }] },
      { type: "part3", dialogue: "男：妈，我想跟您商量个事儿。我想养一只狗。女：养狗？那可不行，养狗太麻烦了，每天要遛，还要给它洗澡、看病。男：这些我都可以负责，您就答应我吧。", questions: [{ q: "妈妈为什么不同意养狗？", options: ["A. 怕狗", "B. 觉得麻烦", "C. 对狗过敏", "D. 家里太小"], correct: 1 }] },
      { type: "part3", dialogue: "女：你看过《你好，李焕英》吗？男：看过，太感人了，看到最后我哭得不行。女：我也是，特别是最后那一段，完全忍不住。", questions: [{ q: "他们在谈论什么？", options: ["A. 一本书", "B. 一部电影", "C. 一个人", "D. 一个地方"], correct: 1 },{ q: "男的看电影时怎么了？", options: ["A. 笑了", "B. 睡着了", "C. 哭了", "D. 没感觉"], correct: 2 }] },
      { type: "part3", dialogue: "男：请问，附近有银行吗？女：有，你沿着这条路一直走，走到头右转，就能看到一家中国银行。男：远吗？女：不远，走个五六分钟就到了。", questions: [{ q: "男的要去哪儿？", options: ["A. 超市", "B. 银行", "C. 医院", "D. 邮局"], correct: 1 },{ q: "大概要走多久？", options: ["A. 两三分钟", "B. 五六分钟", "C. 十来分钟", "D. 不知道"], correct: 1 }] },
      { type: "part3", dialogue: "女：大夫，我最近总是失眠，晚上躺在床上翻来覆去睡不着。男：这种情况多久了？女：大概有两个星期了。男：你最近是不是工作压力比较大？我给你开点安神的药，另外睡前可以喝杯热牛奶，泡泡脚，放松一下。", questions: [{ q: "女的怎么了？", options: ["A. 牙疼", "B. 胃疼", "C. 失眠", "D. 头疼"], correct: 2 },{ q: "医生给了什么建议？", options: ["A. 多运动", "B. 睡前喝牛奶泡脚", "C. 吃药就行", "D. 别想太多"], correct: 1 }] },
      { type: "part3", dialogue: "随着人们环保意识的提高，越来越多的人选择绿色出行，比如骑自行车、坐公交或者地铁。这样不仅可以减少空气污染，还能缓解交通拥堵。", questions: [{ q: "这段话主要谈什么？", options: ["A. 空气污染", "B. 交通拥堵", "C. 绿色出行", "D. 环保意识"], correct: 2 }] },
      { type: "part3", dialogue: "失败是成功之母，每个人在成功的路上都会经历失败。重要的是，我们要从失败中吸取教训，而不是被失败打倒。只要坚持下去，总有一天会成功的。", questions: [{ q: "这段话主要想告诉我们什么？", options: ["A. 失败很可怕", "B. 不要害怕失败", "C. 成功很容易", "D. 要避免失败"], correct: 1 }] },
      { type: "part3", dialogue: "春节是中国人最重要的传统节日。每到春节，人们都会回家和亲人团聚，一起吃年夜饭、看春晚、放鞭炮。晚辈还会收到长辈给的压岁钱。", questions: [{ q: "春节人们不会做什么？", options: ["A. 吃年夜饭", "B. 看春晚", "C. 收压岁钱", "D. 吃月饼"], correct: 3 },{ q: "压岁钱是谁给谁的？", options: ["A. 长辈给晚辈", "B. 晚辈给长辈", "C. 朋友互送", "D. 公司发的"], correct: 0 }] },

      // 第二部分：排列顺序 (10题)
      { type: "part2", sentences: ["A. 我这才发现忘带钥匙了", "B. 到了家门口", "C. 我一摸口袋"], correctOrder: [1,2,0] },
      { type: "part2", sentences: ["A. 他不但不领情", "B. 我本来是出于好意帮他", "C. 反而还说我多事"], correctOrder: [1,0,2] },
      { type: "part2", sentences: ["A. 才能找到一份好工作", "B. 只有掌握了真本事", "C. 学习也是一样的道理"], correctOrder: [2,1,0] },
      { type: "part2", sentences: ["A. 只要天气好", "B. 我们每个周末都会去郊外走走", "C. 呼吸一下新鲜空气"], correctOrder: [0,1,2] },
      { type: "part2", sentences: ["A. 哪怕所有人都离开我", "B. 我也会坚持下去", "C. 因为这是我的梦想"], correctOrder: [0,1,2] },
      { type: "part2", sentences: ["A. 由于事先没有沟通好", "B. 造成了很大的误会", "C. 双方都很不高兴"], correctOrder: [0,1,2] },
      { type: "part2", sentences: ["A. 尽管他已经道过歉了", "B. 但我心里还是不舒服", "C. 总觉得他不够真诚"], correctOrder: [0,1,2] },
      { type: "part2", sentences: ["A. 就决定买下来", "B. 他一眼就看中了那件大衣", "C. 试穿了一下觉得很合适"], correctOrder: [1,2,0] },
      { type: "part2", sentences: ["A. 再决定要不要去", "B. 我建议你先了解一下这个公司", "C. 毕竟换工作不是小事"], correctOrder: [1,0,2] },
      { type: "part2", sentences: ["A. 是因为他付出了很多努力", "B. 他之所以能成功", "C. 没有人能随随便便成功"], correctOrder: [1,0,2] },
      
      // 第三部分：阅读理解 (20题)
      { type: "part3", passage: "我每天早上都要喝一杯茶，不喝的话一整天都觉得没精神。朋友说我喝茶上瘾了，我觉得也是。", questions: [{ q: "关于说话人，可以知道什么？", options: ["A. 不喜欢茶", "B. 习惯喝茶", "C. 睡眠不好", "D. 身体不好"], correct: 1 }] },
      { type: "part3", passage: "现在很多人喜欢在网上买东西，因为可以货比三家，而且不满意还可以退货，非常方便。", questions: [{ q: "网上买东西有什么好处？", options: ["A. 质量好", "B. 可以退货", "C. 有赠品", "D. 能试穿"], correct: 1 }] },
      { type: "part3", passage: "他从小就喜欢画画，梦想着有一天能成为一名画家。虽然这条路很难走，但他从来没有想过要放弃。", questions: [{ q: "他的梦想是什么？", options: ["A. 当老师", "B. 当医生", "C. 当画家", "D. 当歌手"], correct: 2 }] },
      { type: "part3", passage: "我昨天去商场买了一双鞋，原价六百多，打完折才三百块，我觉得太划算了。", questions: [{ q: "鞋打完折多少钱？", options: ["A. 六百多", "B. 三百块", "C. 九百块", "D. 不知道"], correct: 1 }] },
      { type: "part3", passage: "很多人觉得，成功就是赚很多钱。但我觉得，做自己喜欢的事情，并且把它做好，也是一种成功。", questions: [{ q: "说话人认为什么是成功？", options: ["A. 赚很多钱", "B. 出名", "C. 做喜欢的事并做好", "D. 有权力"], correct: 2 }] },
      { type: "part3", passage: "我的电脑昨天突然死机了，怎么重启都没用。我试了各种办法都不行，看来只能拿去修了。", questions: [{ q: "电脑怎么了？", options: ["A. 被偷了", "B. 死机了", "C. 摔坏了", "D. 进水了"], correct: 1 }] },
      { type: "part3", passage: "现在很多年轻人都喜欢点外卖，因为方便快捷，不用自己做饭。但外卖吃多了对身体不好，还是自己在家做饭更健康。", questions: [{ q: "说话人对外卖是什么态度？", options: ["A. 应该多吃", "B. 偶尔吃可以", "C. 完全不能吃", "D. 无所谓"], correct: 1 }] },
      { type: "part3", passage: "她是我的高中同学，我们认识已经十几年了。虽然现在我们不在一个城市，但经常打电话聊天。", questions: [{ q: "他们是什么关系？", options: ["A. 同事", "B. 邻居", "C. 高中同学", "D. 亲戚"], correct: 2 }] },
      { type: "part3", passage: "活动时间改了，从原来的上午九点改到了下午两点。地点也变了，从操场改到了体育馆。", questions: [{ q: "活动现在几点开始？", options: ["A. 九点", "B. 十点", "C. 下午两点", "D. 下午三点"], correct: 2 },{ q: "活动改到了哪里？", options: ["A. 操场", "B. 体育馆", "C. 教室", "D. 礼堂"], correct: 1 }] },
      { type: "part3", passage: "我家楼下新开了一家咖啡馆，环境很好，咖啡也很香。以后和朋友见面就有好去处了。", questions: [{ q: "这家咖啡馆怎么样？", options: ["A. 环境差", "B. 咖啡不好喝", "C. 环境好咖啡香", "D. 很远"], correct: 2 }] }
    ];

    const flatReading = [];
    readingQuestions.forEach(q => {
      if (q.type === 'part1') flatReading.push(q);
      else if (q.type === 'part2') flatReading.push(q);
      else if (q.type === 'part3') q.questions.forEach(sq => flatReading.push({ ...sq, type: 'part3', passage: q.passage }));
    });

    // ==================== 书写部分 (15题·第五套全新) ====================
    const writingQuestions = [
      { type: "part1", words: ["我", "把", "房间", "收拾", "了", "干净"], correct: "我把房间收拾干净了" },
      { type: "part1", words: ["他", "比我", "大", "三岁"], correct: "他比我大三岁" },
      { type: "part1", words: ["你", "最好", "再", "一下", "考虑"], correct: "你最好再考虑一下" },
      { type: "part1", words: ["这个", "问题", "并", "复杂", "不"], correct: "这个问题并不复杂" },
      { type: "part1", words: ["我", "上海", "去过", "两次", "了"], correct: "我去过上海两次了" },
      { type: "part1", words: ["只要", "坚持", "就", "能", "成功", "你"], correct: "只要你坚持就能成功" },
      { type: "part1", words: ["无论", "多远", "他", "每天", "都", "会", "来"], correct: "无论多远他每天都会来" },
      { type: "part1", words: ["她", "不仅", "善良", "而且", "热心", "很"], correct: "她不仅善良而且很热心" },
      { type: "part1", words: ["我", "希望", "你", "能", "来", "参加", "聚会", "我的"], correct: "我希望你能来参加我的聚会" },
      { type: "part1", words: ["虽然", "很忙", "但是", "我", "很", "充实", "每天"], correct: "每天虽然很忙，但是我很充实" },
      { type: "part2", image: "💻", word: "电脑", sentence: "我昨天买了一台新电脑。" },
      { type: "part2", image: "🍜", word: "面条", sentence: "他晚饭吃了一碗面条。" },
      { type: "part2", image: "🏀", word: "打篮球", sentence: "周末我经常和朋友一起打篮球。" },
      { type: "part2", image: "📞", word: "打电话", sentence: "他正在给妈妈打电话。" },
      { type: "part2", image: "☀️", word: "晴天", sentence: "今天是个大晴天，适合出去玩。" }
    ];

    // ==================== 考试状态 ====================
    let examState = {
      section: 'listening', currentQuestionIndex: 0,
      answers: new Array(flatListening.length + flatReading.length + writingQuestions.length).fill(null),
      listeningTimer: 30*60, answerSheetTimer: 5*60, readingTimer: 40*60, writingTimer: 25*60,
      timerInterval: null, paused: false, started: false
    };

    const startScreen = document.getElementById('startScreen'), examArea = document.getElementById('examArea'), resultArea = document.getElementById('resultArea');
    const timerEl = document.getElementById('timer'), sectionHeader = document.getElementById('sectionHeader'), questionContainer = document.getElementById('questionContainer');
    const progressInfo = document.getElementById('progressInfo'), navBar = document.getElementById('navBar');
    const startBtn = document.getElementById('startBtn'), prevBtn = document.getElementById('prevBtn'), nextBtn = document.getElementById('nextBtn'), pauseBtn = document.getElementById('pauseBtn');

    function getCurrentQuestions() {
      if (examState.section === 'listening') return flatListening;
      if (examState.section === 'reading') return flatReading;
      return writingQuestions;
    }

    function getGlobalIndex() {
      let offset = 0;
      if (examState.section === 'reading') offset = flatListening.length;
      else if (examState.section === 'writing') offset = flatListening.length + flatReading.length;
      return offset + examState.currentQuestionIndex;
    }

    function formatTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }

    function speak(text, callback) {
      if (!text) return;
      try { speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang='zh-CN'; u.rate=0.9; u.onend=callback||null; speechSynthesis.speak(u); } catch(e) {}
    }

    function render() {
      const qs = getCurrentQuestions(), idx = examState.currentQuestionIndex, q = qs[idx];
      const gIdx = getGlobalIndex(), selected = examState.answers[gIdx];
      let html = '';

      if (examState.section === 'answerSheet') {
        html = `<div class="question" style="text-align:center; padding:2rem;"><i class="fas fa-clock" style="font-size:3rem; color:var(--accent);"></i><h2>⏱️ 正在填写答题卡</h2><p>听力部分已结束，您有5分钟时间将答案填涂到答题卡上。</p><p style="margin:1rem 0; font-size:1.5rem;" id="answerSheetTimerDisplay">剩余时间: 05:00</p><button id="continueToReadingBtn" class="control-btn">继续进入阅读部分</button></div>`;
      } else if (examState.section === 'listening') {
        html = `<div class="question"><div><strong>${idx+1}.</strong> <button id="playAudioBtn" class="control-btn"><i class="fas fa-play"></i> 播放音频</button></div>`;
        if (q.type === 'part1') html += `<div>${q.statement}</div><div class="options"><div class="option"><label><input type="radio" name="q" value="true" ${selected===true?'checked':''}> ✓ 正确</label></div><div class="option"><label><input type="radio" name="q" value="false" ${selected===false?'checked':''}> ✗ 错误</label></div></div>`;
        else html += `<div>${q.q||q.question}</div><div class="options">${q.options.map((o,i)=>`<div class="option"><label><input type="radio" name="q" value="${i}" ${selected===i?'checked':''}> ${o}</label></div>`).join('')}</div>`;
        html += `</div>`;
      } else if (examState.section === 'reading') {
        if (q.type === 'part1') {
          html = `<div class="question"><div><strong>${idx+1}.</strong> 选词填空</div><div style="margin:1rem 0; font-size:1.1rem;">${q.sentence}</div><div class="options">${q.options.map((o,i)=>`<div class="option"><label><input type="radio" name="q" value="${i}" ${selected===i?'checked':''}> ${o}</label></div>`).join('')}</div></div>`;
        } else if (q.type === 'part2') {
          html = `<div class="question"><div><strong>${idx+1}.</strong> 排列顺序</div><div>${q.sentences.map((s,i)=>`<div>${String.fromCharCode(65+i)}. ${s}</div>`).join('')}</div><div class="options">${['A B C','A C B','B A C','B C A','C A B','C B A'].map((o,i)=>`<div class="option"><label><input type="radio" name="q" value="${i}" ${selected===i?'checked':''}> ${o}</label></div>`).join('')}</div></div>`;
        } else {
          html = `<div class="question"><div><strong>${idx+1}.</strong> 阅读理解</div><div>${q.passage}</div><div style="margin-top:1rem;">${q.q}</div><div class="options">${q.options.map((o,i)=>`<div class="option"><label><input type="radio" name="q" value="${i}" ${selected===i?'checked':''}> ${o}</label></div>`).join('')}</div></div>`;
        }
      } else if (examState.section === 'writing') {
        if (q.type === 'part1') {
          const shuffled = [...q.words].sort(()=>Math.random()-0.5);
          html = `<div class="question"><div><strong>${idx+1}.</strong> 完成句子</div><div class="sentence-builder" id="wordTiles">${shuffled.map(w=>`<span class="word-tile" data-word="${w}">${w}</span>`).join('')}</div><div class="sentence-preview" id="sentencePreview">${selected||'点击词语排序...'}</div><button id="clearBtn" class="control-btn">清空</button><button id="checkBtn" class="control-btn">检查</button><div id="fb" style="margin-top:0.5rem;"></div></div>`;
        } else {
          html = `<div class="question"><div><strong>${idx+1}.</strong> <span style="font-size:2rem;">${q.image}</span> ${q.word}</div><div>请用所给词语写一个句子：</div><textarea id="essayInput" style="width:100%; padding:0.5rem; border-radius:1rem; border:1px solid var(--border-light);" rows="2">${selected||''}</textarea><button id="saveBtn" class="control-btn">保存</button></div>`;
        }
      }

      questionContainer.innerHTML = html;
      progressInfo.innerText = `第 ${idx+1} / ${qs.length} 题`;
      sectionHeader.innerText = examState.section==='listening'?`🎧 听力 (${idx+1}/${qs.length})`: examState.section==='reading'?`📖 阅读 (${idx+1}/${qs.length})`: examState.section==='writing'?`✍️ 书写 (${idx+1}/${qs.length})`:`📝 答题卡填写`;
      renderNavBar();

      if (examState.section === 'listening') {
        const playBtn = document.getElementById('playAudioBtn');
        if (playBtn) {
          playBtn.addEventListener('click', ()=>{
            if (q.type === 'part1') speak(q.sentence);
            else {
              speak(q.dialogue, ()=>{
                setTimeout(()=>{ speak(q.q||q.question); }, 500);
              });
            }
          });
          setTimeout(()=> playBtn.click(), 300);
        }
      }
      document.querySelectorAll('input[name="q"]').forEach(r=>r.addEventListener('change', e=>{
        let v = e.target.value; v = (v==='true')? true : (v==='false'? false : parseInt(v));
        examState.answers[gIdx] = v; renderNavBar();
      }));

      if (examState.section==='writing' && q.type==='part1') {
        let selectedWords = [];
        document.querySelectorAll('.word-tile').forEach(t=>t.addEventListener('click', ()=>{
          selectedWords.push(t.dataset.word); t.classList.add('selected'); t.style.pointerEvents='none';
          document.getElementById('sentencePreview').innerText = selectedWords.join('');
        }));
        document.getElementById('clearBtn').addEventListener('click', ()=>{
          selectedWords=[]; document.querySelectorAll('.word-tile').forEach(t=>{ t.classList.remove('selected'); t.style.pointerEvents='auto'; });
          document.getElementById('sentencePreview').innerText='点击词语排序...';
        });
        document.getElementById('checkBtn').addEventListener('click', ()=>{
          const s = selectedWords.join(''), fb = document.getElementById('fb');
          fb.innerHTML = s===q.correct? '✅ 正确！' : `❌ 参考答案：${q.correct}`;
          examState.answers[gIdx] = s; renderNavBar();
        });
      }
      if (examState.section==='writing' && q.type==='part2') {
        const ta = document.getElementById('essayInput');
        ta.addEventListener('change', ()=> { examState.answers[gIdx]=ta.value; renderNavBar(); });
        document.getElementById('saveBtn').addEventListener('click', ()=> { examState.answers[gIdx]=ta.value; renderNavBar(); });
      }

      document.getElementById('continueToReadingBtn')?.addEventListener('click', ()=>{
        examState.section='reading'; examState.currentQuestionIndex=0;
        clearInterval(examState.timerInterval); startReadingTimer(); render();
      });
    }

    function renderNavBar() {
      const qs = getCurrentQuestions();
      let h = ''; 
      for(let i=0; i<qs.length; i++) {
        const g = getGlobalIndex() - examState.currentQuestionIndex + i;
        h += `<button class="nav-btn ${examState.answers[g]!==null?'answered':''} ${i===examState.currentQuestionIndex?'current':''}" data-index="${i}">${i+1}</button>`;
      }
      navBar.innerHTML = h;
      navBar.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click', ()=>{
        examState.currentQuestionIndex = parseInt(b.dataset.index); render();
      }));
    }

    function nextQuestion() {
      const qs = getCurrentQuestions();
      if (examState.currentQuestionIndex < qs.length-1) { examState.currentQuestionIndex++; render(); }
      else {
        if (examState.section==='listening') { examState.section='answerSheet'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startAnswerSheetTimer(); render(); }
        else if (examState.section==='reading') { examState.section='writing'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startWritingTimer(); render(); }
        else if (examState.section==='writing') finishExam();
      }
    }

    function startListeningTimer() {
      clearInterval(examState.timerInterval);
      examState.timerInterval = setInterval(() => {
        if (examState.paused) return;
        if (examState.section==='listening' && examState.listeningTimer>0) {
          examState.listeningTimer--;
          timerEl.innerText = `听力部分: ${formatTime(examState.listeningTimer)}`;
          if (examState.listeningTimer<=0) {
            examState.section='answerSheet'; examState.currentQuestionIndex=0;
            clearInterval(examState.timerInterval); startAnswerSheetTimer(); render();
          }
        }
      }, 1000);
    }
    function startAnswerSheetTimer() {
      clearInterval(examState.timerInterval);
      examState.timerInterval = setInterval(() => {
        if (examState.paused) return;
        if (examState.section==='answerSheet' && examState.answerSheetTimer>0) {
          examState.answerSheetTimer--;
          timerEl.innerText = `答题卡: ${formatTime(examState.answerSheetTimer)}`;
          const disp = document.getElementById('answerSheetTimerDisplay'); if (disp) disp.innerText = `剩余时间: ${formatTime(examState.answerSheetTimer)}`;
          if (examState.answerSheetTimer<=0) {
            examState.section='reading'; examState.currentQuestionIndex=0;
            clearInterval(examState.timerInterval); startReadingTimer(); render();
          }
        }
      }, 1000);
    }
    function startReadingTimer() {
      clearInterval(examState.timerInterval);
      examState.timerInterval = setInterval(() => {
        if (examState.paused) return;
        if (examState.section==='reading' && examState.readingTimer>0) {
          examState.readingTimer--;
          timerEl.innerText = `阅读部分: ${formatTime(examState.readingTimer)}`;
          if (examState.readingTimer<=0) {
            examState.section='writing'; examState.currentQuestionIndex=0;
            clearInterval(examState.timerInterval); startWritingTimer(); render();
          }
        }
      }, 1000);
    }
    function startWritingTimer() {
      clearInterval(examState.timerInterval);
      examState.timerInterval = setInterval(() => {
        if (examState.paused) return;
        if (examState.section==='writing' && examState.writingTimer>0) {
          examState.writingTimer--;
          timerEl.innerText = `书写部分: ${formatTime(examState.writingTimer)}`;
          if (examState.writingTimer<=0) finishExam();
        }
      }, 1000);
    }

    function calculateScore() {
      let lc=0, rc=0, wc=0;
      for(let i=0; i<flatListening.length; i++) if(examState.answers[i]===flatListening[i].correct) lc++;
      for(let i=0; i<flatReading.length; i++) if(examState.answers[flatListening.length+i]===flatReading[i].correct) rc++;
      const writingPart1 = writingQuestions.filter(q=>q.type==='part1');
      for(let i=0; i<writingPart1.length; i++) if(examState.answers[flatListening.length+flatReading.length+i]===writingPart1[i].correct) wc++;
      const ls = Math.round(lc/flatListening.length*100), rs = Math.round(rc/flatReading.length*100), ws = Math.round(wc/writingPart1.length*100);
      return { ls, rs, ws, total: ls+rs+ws, passed: ls+rs+ws>=180 };
    }

    function finishExam() {
      clearInterval(examState.timerInterval);
      const s = calculateScore();
      examArea.classList.add('hidden'); resultArea.classList.remove('hidden');
      resultArea.innerHTML = `<div style="text-align:center;"><h2>考试完成</h2><div style="display:flex; justify-content:center; gap:2rem; margin:1rem 0;"><div>听力<br><strong>${s.ls}/100</strong></div><div>阅读<br><strong>${s.rs}/100</strong></div><div>书写<br><strong>${s.ws}/100</strong></div></div><p style="font-size:2rem;"><strong>总分: ${s.total}/300</strong></p><p style="font-size:1.5rem; color:${s.passed?'green':'red'};">${s.passed?'🎉 恭喜！通过HSK 4！':'😢 继续努力！'}</p><button id="restartBtn" class="control-btn">重新开始</button></div>`;
      document.getElementById('restartBtn').addEventListener('click', ()=>location.reload());
    }

    startBtn.addEventListener('click', ()=>{
      startScreen.classList.add('hidden'); examArea.classList.remove('hidden');
      examState.started = true; startListeningTimer(); render();
    });
    prevBtn.addEventListener('click', ()=>{ if(examState.currentQuestionIndex>0) { examState.currentQuestionIndex--; render(); } });
    nextBtn.addEventListener('click', nextQuestion);
    pauseBtn.addEventListener('click', function(){
      examState.paused = !examState.paused;
      this.innerHTML = examState.paused ? '<i class="fas fa-play"></i> 继续' : '<i class="fas fa-pause"></i> 暂停';
    });

    const darkBtn = document.createElement('button'); darkBtn.innerHTML='<i class="fas fa-moon"></i>';
    darkBtn.style.cssText='position:fixed; bottom:20px; right:20px; background:var(--accent); color:white; border:none; border-radius:50%; width:50px; height:50px; cursor:pointer;';
    darkBtn.onclick = ()=>{
      const is = document.body.classList.contains('dark');
      if(is) { document.body.classList.remove('dark'); document.body.classList.add('light'); }
      else { document.body.classList.remove('light'); document.body.classList.add('dark'); }
    };
    document.body.appendChild(darkBtn);
  })();
</script>
</body>
</html>
