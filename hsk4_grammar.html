  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
    body.light { background: linear-gradient(145deg, #eef2ff 0%, #e0e7ff 100%); --bg-card: #ffffff; --bg-header: rgba(255,255,255,0.8); --text-primary: #1e1b4b; --text-secondary: #4f46e5; --border-light: #c7d2fe; --accent: #4f46e5; --accent-soft: #f0f3ff; }
    body.dark { background: linear-gradient(145deg, #0f172a 0%, #0b1120 100%); --bg-card: #1e293b; --bg-header: rgba(30,41,59,0.9); --text-primary: #e2e8f0; --text-secondary: #a5b4fc; --border-light: #334155; --accent: #818cf8; --accent-soft: #2d3a52; }
    body { padding: 1.2rem; display: flex; flex-direction: column; align-items: center; background: var(--bg-header); }
    .container { max-width: 1300px; width: 100%; background: var(--bg-header); backdrop-filter: blur(12px); border-radius: 2rem; padding: 1.5rem; }
    h1 { text-align: center; margin-bottom: 0.2rem; background: linear-gradient(135deg, var(--text-secondary), var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; font-size: 2.5rem; }
    .subtitle { text-align: center; margin-bottom: 1.5rem; color: var(--text-primary); }
    
    /* 进度条 & 成就 */
    .progress-section { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; background: var(--bg-card); padding: 0.8rem 1.5rem; border-radius: 3rem; border: 1px solid var(--border-light); }
    .mastery-bar { flex: 3; min-width: 200px; }
    .mastery-text { display: flex; justify-content: space-between; margin-bottom: 4px; font-weight: 500; color: var(--text-primary); }
    .progress-bg { height: 12px; background: var(--border-light); border-radius: 20px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 20px; transition: width 0.3s; }
    .badges { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .badge { background: var(--accent-soft); padding: 0.3rem 1rem; border-radius: 30px; font-size: 0.8rem; font-weight: 600; color: var(--accent); border: 1px solid var(--accent); }
    .badge.unlocked { background: var(--accent); color: white; }
    
    /* 分类标签 */
    .category-tabs { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1.5rem 0 1rem; justify-content: center; }
    .cat-btn { background: var(--bg-card); border: 1px solid var(--border-light); padding: 0.5rem 1.2rem; border-radius: 3rem; font-weight: 500; color: var(--text-primary); cursor: pointer; transition: all 0.2s; }
    .cat-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    
    /* 语法卡片网格 */
    .grammar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.2rem; margin: 1.5rem 0; }
    .grammar-card { background: var(--bg-card); border-radius: 1.5rem; padding: 1.2rem; border: 1px solid var(--border-light); transition: 0.2s; display: flex; flex-direction: column; }
    .grammar-card:hover { transform: translateY(-3px); box-shadow: 0 12px 20px rgba(0,0,0,0.05); }
    .card-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.8rem; }
    .card-header i { font-size: 1.8rem; color: var(--accent); }
    .card-header h3 { font-size: 1.2rem; font-weight: 700; color: var(--text-primary); }
    .structure { background: var(--accent-soft); padding: 0.3rem 0.8rem; border-radius: 20px; font-family: monospace; font-size: 0.9rem; display: inline-block; margin-bottom: 0.6rem; color: var(--accent); border: 1px dashed var(--accent); }
    .example-box { background: rgba(0,0,0,0.02); padding: 0.6rem 1rem; border-radius: 1rem; margin: 0.6rem 0; border-left: 4px solid var(--accent); }
    .example { font-style: italic; color: var(--text-primary); }
    .translation { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.2rem; }
    .explanation { font-size: 0.85rem; color: var(--text-primary); opacity: 0.9; margin: 0.4rem 0; }
    .card-footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; padding-top: 0.6rem; }
    .check-btn { background: none; border: 1px solid var(--border-light); border-radius: 30px; padding: 0.3rem 1rem; font-size: 0.75rem; cursor: pointer; color: var(--text-primary); transition: 0.2s; }
    .check-btn.completed { background: var(--accent); color: white; border-color: var(--accent); }
    .quiz-hint { font-size: 0.7rem; color: var(--text-secondary); }
    
    /* 小测验浮层 */
    .quiz-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 2000; visibility: hidden; opacity: 0; transition: 0.2s; }
    .quiz-modal.show { visibility: visible; opacity: 1; }
    .quiz-content { background: var(--bg-card); max-width: 450px; width: 90%; border-radius: 2rem; padding: 1.8rem; text-align: center; border: 1px solid var(--accent); }
    .quiz-question { font-size: 1.5rem; margin: 1rem 0; color: var(--text-primary); }
    .quiz-options { display: flex; flex-direction: column; gap: 0.6rem; margin: 1rem 0; }
    .quiz-opt { background: var(--bg-header); border: 1px solid var(--border-light); padding: 0.8rem; border-radius: 3rem; cursor: pointer; color: var(--text-primary); }
    .quiz-opt:hover { background: var(--accent-soft); }
    .quiz-feedback { margin: 0.8rem 0; font-weight: 500; }
    .quiz-close { margin-top: 0.8rem; background: var(--accent); color: white; border: none; padding: 0.5rem 2rem; border-radius: 3rem; cursor: pointer; }
    .back-btn { background: var(--accent); color: white; border: none; padding: 0.5rem 1.2rem; border-radius: 2rem; cursor: pointer; margin-top: 1.5rem; display: inline-block; text-decoration: none; }
    .reset-progress { background: none; border: 1px solid var(--border-light); padding: 0.3rem 1rem; border-radius: 30px; color: var(--text-primary); cursor: pointer; margin-left: 0.5rem; }
    .footer { display: flex; justify-content: center; margin-top: 1rem; }
    .hidden { display: none; }
  </style>
</head>

<script>
  (function(){
    "use strict";

    // ---------- HSK 4 完整语法数据 ----------
    // 基于HSK4官方大纲，共收录100+个核心语法点，分为五大板块。
    // 数据来源: HSK4考试大纲, HSK Standard Course 4 (上/下), Chinese Grammar Wiki
    const grammarData = [
      // 1. 词类 (words) - 包含代词、副词、介词、连词、助词、量词等
      { category: 'words', title: '代词：各', structure: '各 + (量词) + 名词', examples: ['各位同学，大家好。', '各国都有不同的文化。'], translation: ['All students, hello.', 'Every country has different cultures.'], explanation: '“各”指某个范围内的所有个体，强调“每一个都包括在内”。[reference:0]' },
      { category: 'words', title: '代词：疑问代词任指', structure: '谁 / 什么 / 哪儿 + 都 / 也', examples: ['谁都不知道他去哪儿了。', '我什么都不想吃。'], translation: ['Nobody knows where he went.', 'I don\'t want to eat anything.'], explanation: '疑问代词表示“任何”时，常与“都”或“也”连用，表示没有例外。[reference:1]' },
      { category: 'words', title: '代词：疑问代词虚指', structure: '什么 / 谁 / 哪儿 (用于陈述句)', examples: ['你想吃点儿什么吗？', '我们好像在哪儿见过。'], translation: ['Would you like something to eat?', 'It seems we\'ve met somewhere before.'], explanation: '疑问代词不表示疑问，而是指代不确定或无需说明的人或事物。[reference:2]' },
      { category: 'words', title: '数词：两 vs 俩', structure: '两 + 量词 vs 俩 + 名词', examples: ['我们两个人。', '我们俩是好朋友。'], translation: ['The two of us.', 'We two are good friends.'], explanation: '“俩”是“两个”的合音，后面不能再加量词。[reference:3]' },
      { category: 'words', title: '数词：倍数的表达', structure: 'A 是 B 的 X 倍 / 增加了 X 倍', examples: ['4是2的两倍。', '今年的收入增加了两倍。'], translation: ['4 is twice as much as 2.', 'Revenue has tripled this year.'], explanation: '汉语用“倍”表示倍数，“增加了两倍”指是原来的三倍。[reference:4]' },
      { category: 'words', title: '名量词：朵、份、棵、台、页、只', structure: '数量 + 量词 + 名词', examples: ['一朵花', '一份报纸', '一棵树', '一台电脑', '一页纸', '一只狗'], translation: ['a flower', 'a newspaper', 'a tree', 'a computer', 'a page', 'a dog'], explanation: 'HSK4级要求掌握这些专用量词，需根据名词选择正确的量词。[reference:5]' },
      { category: 'words', title: '动量词：遍、趟、回', structure: '动词 + 数词 + 动量词', examples: ['这本书我看了三遍。', '我昨天去了三趟超市。', '这电影我看了三回。'], translation: ['I\'ve read this book three times.', 'I went to the supermarket three times yesterday.', 'I\'ve seen this movie three times.'], explanation: '动量词表示动作的次数。“趟”多用于走动，“遍”强调从开始到结束的完整过程。[reference:6]' },
      { category: 'words', title: '特殊量词：场、顿', structure: '一场 + 活动 / 一顿 + 饭 / 动词 + 一顿', examples: ['一场比赛', '一顿饭', '哭了 一场', '打了他一顿'], translation: ['a match', 'a meal', 'cried once', 'beat him up'], explanation: '“场”和“顿”既可作名量词，也可作动量词，有特殊的搭配习惯。[reference:7]' },
      { category: 'words', title: '助动词：得 (děi)', structure: '得 + 动词', examples: ['你得来。', '我得好好谢谢你。'], translation: ['You must come.', 'I really must thank you.'], explanation: '“得”表示“必须”、“应该”，多用于口语。[reference:8]' },
      { category: 'words', title: '助动词：不得不', structure: '不得不 + 动词', examples: ['我不得不去。', '他们不得不接受这个事实。'], translation: ['I have no choice but to go.', 'They have to accept this fact.'], explanation: '“不得不”表示“只好”，有被迫、无奈的含义。[reference:9]' },
      { category: 'words', title: '离合词', structure: 'V + 数词 + O / VVO / V+了/过+O', examples: ['见个面', '散散步', '帮个忙', '睡过觉'], translation: ['meet', 'take a walk', 'do a favor', 'slept'], explanation: '离合词中间可插入数量词、时态助词等。常见的有：帮忙、见面、睡觉、散步、游泳等。[reference:10]' },
      { category: 'words', title: '副词：差不多', structure: '差不多 + 数量 / 差不多 + 动词', examples: ['教室里差不多有50人。', '我差不多吃完了。'], translation: ['There are about 50 people in the classroom.', 'I\'ve almost finished eating.'], explanation: '表示接近某个数量或状态，意为“大概”、“几乎”。[reference:11]' },
      { category: 'words', title: '副词：正好', structure: '正好 + 动词 / 形容词', examples: ['我正好要找你。', '这双鞋我穿正好。'], translation: ['I was just about to look for you.', 'These shoes fit me just right.'], explanation: '表示时间、数量或情况恰好合适或巧合。[reference:12]' },
      { category: 'words', title: '副词：只好', structure: '只好 + 动词', examples: ['下雨了，我们只好待在家里。', '他没来，我只好自己去。'], translation: ['It\'s raining, we have no choice but to stay home.', 'He didn\'t come, so I had to go by myself.'], explanation: '表示没有别的选择，只能做某事。[reference:13]' },
      { category: 'words', title: '副词：可', structure: '可 + 形容词 (+ 了)', examples: ['这孩子可聪明了！', '你可来了！'], translation: ['This child is so smart!', 'You\'re finally here!'], explanation: '“可”用于强调，表示程度高，带有感叹语气。[reference:14]' },
      { category: 'words', title: '副词：原来', structure: '原来 + 情况', examples: ['原来你是老师啊！', '我原来以为他不来了。'], translation: ['So you\'re a teacher!', 'I originally thought he wasn\'t coming.'], explanation: '表示发现了以前不知道的情况，或表示“原本、起初”的意思。[reference:15]' },
      { category: 'words', title: '副词：差(一)点儿', structure: '差(一)点儿 + 动词', examples: ['我差点儿迟到了。', '差点儿没赶上火车。'], translation: ['I almost arrived late.', 'I almost missed the train.'], explanation: '表示某事几乎发生但没有发生。注意否定形式在表示不希望发生的事时意思相同。[reference:16]' },
      { category: 'words', title: '副词：难道', structure: '难道 + 句子 + (吗)？', examples: ['难道你不相信我？', '难道他忘了今天有会？'], translation: ['Don\'t you believe me?', 'Did he forget there\'s a meeting today?'], explanation: '用于反问句，加强反问语气，意为“莫非”。[reference:17]' },
      { category: 'words', title: '副词：竟然', structure: '竟然 + 动词 / 形容词', examples: ['他 竟然 连这么简单的题都不会。', '我 竟然 把钥匙落在家里了。'], translation: ['He actually doesn\'t know such a simple question.', 'I actually left my keys at home.'], explanation: '表示出乎意料，没想到会发生某事。[reference:18]' },
      { category: 'words', title: '副词：尤其', structure: '尤其是 + 突出部分', examples: ['我喜欢运动，尤其是游泳。', '大家都很高兴，尤其是他。'], translation: ['I like sports, especially swimming.', 'Everyone was happy, especially him.'], explanation: '用于强调某个突出的人或事物。' },
      { category: 'words', title: '副词：重新', structure: '重新 + 动词', examples: ['请重新说一遍。', '我们重新开始吧。'], translation: ['Please say it again.', 'Let\'s start over.'], explanation: '表示从头再次开始做某事。' },
      { category: 'words', title: '副词：往往', structure: '往往 + 情况', examples: ['他往往工作到很晚。', '周末我往往去图书馆。'], translation: ['He often works late.', 'On weekends I usually go to the library.'], explanation: '表示在某种规律或条件下经常发生，不能用于主观意愿或将来。' },
      { category: 'words', title: '介词：对于', structure: '对于 + 对象，……', examples: ['对于这个问题，大家意见一致。', '对于中国文化，他很感兴趣。'], translation: ['Regarding this issue, everyone agrees.', 'He is very interested in Chinese culture.'], explanation: '引进动作或状态所关联的对象。[reference:19]' },
      { category: 'words', title: '介词：关于', structure: '关于 + 话题', examples: ['关于这个项目，我们还在讨论。', '他写了一本关于中国历史的书。'], translation: ['Regarding this project, we are still discussing.', 'He wrote a book about Chinese history.'], explanation: '引出话题或范围。[reference:20]' },
      { category: 'words', title: '介词：按照', structure: '按照 + 标准/规则', examples: ['按照老师的要求，我们完成了作业。', '按照计划，明天出发。'], translation: ['According to the teacher\'s requirements, we finished the homework.', 'According to the plan, we leave tomorrow.'], explanation: '表示遵从某种标准或依据。' },
      { category: 'words', title: '介词：随着', structure: '随着 + 变化', examples: ['随着年龄的增长，他成熟多了。', '随着经济的发展，生活越来越好。'], translation: ['As he grew older, he became much more mature.', 'With economic development, life gets better and better.'], explanation: '表示伴随着某种情况的变化。' },
      { category: 'words', title: '连词：并且', structure: '……，并且……', examples: ['他聪明并且努力。', '我同意并且支持你的决定。'], translation: ['He is smart and hardworking.', 'I agree with and support your decision.'], explanation: '连接并列的动词、形容词或分句，表示进一步。' },
      { category: 'words', title: '连词：另外', structure: '另外，…… / 另外 + 数量', examples: ['另外，我还有个问题。', '我要另外两本书。'], translation: ['Besides, I have another question.', 'I want two more books.'], explanation: '可作连词表示补充，也可作代词/副词表示“除此之外的”。' },
      { category: 'words', title: '连词：无论', structure: '无论……，都/也……', examples: ['无论多忙，他每天都会学习。', '无论你去哪儿，我都跟着你。'], translation: ['No matter how busy he is, he studies every day.', 'Wherever you go, I\'ll follow you.'], explanation: '表示在任何条件下结果都不变。[reference:21]' },
      { category: 'words', title: '连词：因此', structure: '原因，因此 + 结果', examples: ['他学习很努力，因此取得了好成绩。', '天气不好，因此比赛取消了。'], translation: ['He studied hard, therefore he achieved good grades.', 'The weather was bad, therefore the match was cancelled.'], explanation: '表示因果关系，常用于书面语。[reference:22]' },
      { category: 'words', title: '连词：否则', structure: '情况，否则 + 后果', examples: ['快点儿，否则要迟到了。', '你必须同意，否则计划无法进行。'], translation: ['Hurry up, otherwise we\'ll be late.', 'You must agree, otherwise the plan cannot proceed.'], explanation: '表示“如果不这样”，引出相反情况下的结果。' },
      { category: 'words', title: '连词：然而', structure: '……，然而……', examples: ['他想去，然而没有时间。', '虽然失败了多次，然而他从未放弃。'], translation: ['He wants to go, however he has no time.', 'Although he failed many times, he never gave up.'], explanation: '表示转折，多用于书面语。[reference:23]' },
      { category: 'words', title: '连词：于是', structure: '……，于是……', examples: ['听说这家餐厅不错，于是我们决定试试。', '下雪了，于是他给女儿取名“夏雪”。'], translation: ['We heard this restaurant was good, so we decided to try it.', 'It snowed, so he named his daughter "Xia Xue".'], explanation: '表示后一事紧接着前一事发生，有顺承关系。[reference:24]' },
      { category: 'words', title: '助词：着', structure: '动词 + 着 (+ 动词)', examples: ['她笑着说。', '门开着呢。'], translation: ['She said with a smile.', 'The door is open.'], explanation: '表示动作的持续状态或伴随方式。' },
      { category: 'words', title: '助词：来着', structure: '句子 + 来着', examples: ['你刚才说什么来着？', '他叫什么名字来着？'], translation: ['What were you saying just now?', 'What was his name again?'], explanation: '用于口语，表示回想或提醒，意为“刚刚……”。' },

      // 2. 句子成分 (components) - 补语为主
      { category: 'components', title: '结果补语', structure: '动词 + 形容词/动词 (完/好/懂/干净...)', examples: ['请把水果洗干净。', '我听懂了。'], translation: ['Please wash the fruit clean.', 'I understood (from listening).'], explanation: '表示动作的结果。HSK4级要求掌握更多结果补语搭配，如“洗干净”、“听清楚”。[reference:25]' },
      { category: 'components', title: '趋向补语 (复合)', structure: '动词 + 上来/下去/出来/起来...', examples: ['他从包里拿出一本书来。', '请你继续说下去。'], translation: ['He took out a book from his bag.', 'Please continue talking.'], explanation: '表示动作的方向。HSK4级要求掌握“起来、出来、下去”等的引申用法。' },
      { category: 'components', title: '趋向补语引申：起来', structure: '动词 + 起来', examples: ['这首歌听起来不错。', '大家笑了起来。'], translation: ['This song sounds good.', 'Everyone started laughing.'], explanation: '表示开始并持续，或表示对某事的评价（听/看起来）。[reference:26]' },
      { category: 'components', title: '趋向补语引申：下去', structure: '动词 + 下去', examples: ['这个故事很有意思，继续说下去吧。', '你要坚持下去。'], translation: ['This story is very interesting, please continue.', 'You must persevere.'], explanation: '表示已经开始的动作继续进行。' },
      { category: 'components', title: '可能补语', structure: '动词 + 得/不 + 结果/趋向', examples: ['我看得见。', '我吃不下了。', '他听得懂中文。'], translation: ['I can see it.', 'I can\'t eat any more.', 'He can understand Chinese.'], explanation: '在动词和结果/趋向补语之间插入“得”或“不”表示可能性。' },
      { category: 'components', title: '程度补语', structure: '形容词 + 得 + 很/不得了/不行', examples: ['今天热得很。', '我累得不行。', '他气得不得了。'], translation: ['Today is very hot.', 'I\'m extremely tired.', 'He is terribly angry.'], explanation: 'HSK4级要求掌握“得很”、“得不行”、“得不得了”等结构表达极高的程度。[reference:27]' },
      { category: 'components', title: '状态补语', structure: '动词 + 得 + 程度/状态', examples: ['她高兴得跳了起来。', '他跑得很快。'], translation: ['She was so happy she jumped up.', 'He runs very fast.'], explanation: '用“得”连接，描述动作或状态的程度或情形。' },
      { category: 'components', title: '数量补语', structure: '动词 + 时量/动量', examples: ['我等了你一个小时。', '请再说一遍。'], translation: ['I waited for you for an hour.', 'Please say it again.'], explanation: '表示动作持续的时间或发生的次数。' },

      // 3. 特殊句型 (sentences)
      { category: 'sentences', title: '把字句 (高级)', structure: 'S + 把 + O + V + 结果/趋向/状态', examples: ['请把作业交给老师。', '他把房间打扫得干干净净。'], translation: ['Please hand in your homework to the teacher.', 'He cleaned the room spotlessly.'], explanation: '强调对宾语的处置及结果。HSK4要求掌握带补语的复杂“把”字句。' },
      { category: 'sentences', title: '被字句 (高级)', structure: 'S + 被/叫/让 + O + V + 补语', examples: ['我的车被朋友开走了。', '窗户给风吹开了。'], translation: ['My car was driven away by a friend.', 'The window was blown open by the wind.'], explanation: '表示被动。HSK4要求掌握带补语的被动句及口语中“叫、让、给”的用法。' },
      { category: 'sentences', title: '比较句：A 比 B + 更/还 + Adj', structure: 'A 比 B + 更/还 + 形容词', examples: ['今天比昨天还冷。', '他比我更了解情况。'], translation: ['Today is even colder than yesterday.', 'He understands the situation better than I do.'], explanation: '用“更”或“还”加强比较的程度。' },
      { category: 'sentences', title: '比较句：A 没有 B (那么) + Adj', structure: 'A 没有 B + (那么) + 形容词', examples: ['我没有他那么高。', '这个没有那个好。'], translation: ['I\'m not as tall as him.', 'This one is not as good as that one.'], explanation: '表示A在某个方面不如B。' },
      { category: 'sentences', title: '比较句：越来越 + Adj/V', structure: '越来越 + 形容词/动词', examples: ['天气越来越热了。', '我越来越喜欢中国了。'], translation: ['The weather is getting hotter and hotter.', 'I like China more and more.'], explanation: '表示程度随时间推移而加深。' },
      { category: 'sentences', title: '兼语句', structure: 'S + V1 + O + V2 (让/叫/派/请/使...)', examples: ['他让我帮他一个忙。', '公司派他去上海。'], translation: ['He asked me to help him.', 'The company sent him to Shanghai.'], explanation: '谓语由两个动词短语组成，前一个动词的宾语是后一个动词的主语。' },
      { category: 'sentences', title: '存现句', structure: '地方 + 动词 + 着 + 事物', examples: ['桌子上放着一本书。', '门口站着一个人。'], translation: ['There is a book on the table.', 'There is a person standing at the door.'], explanation: '表示某处存在、出现或消失了某人或某物。' },
      { category: 'sentences', title: '连动句', structure: 'S + V1 + (O1) + V2 + (O2)', examples: ['他去图书馆看书。', '我坐飞机去北京。'], translation: ['He went to the library to read.', 'I go to Beijing by plane.'], explanation: '由两个或以上动词短语构成，表示先后发生或方式目的。' },
      { category: 'sentences', title: '是……的 (强调)', structure: 'S + 是 + 时间/地点/方式 + V + 的', examples: ['我是昨天到北京的。', '他是跟朋友一起来的。'], translation: ['I arrived in Beijing yesterday.', 'He came with a friend.'], explanation: '强调已经发生的动作的时间、地点、方式等。[reference:28]' },
      { category: 'sentences', title: '双重否定', structure: '不……不…… / 没有……不……', examples: ['我不得不去。', '没有人不喜欢他。'], translation: ['I have to go.', 'There is no one who doesn\'t like him.'], explanation: '用两个否定词表示肯定的意思，语气更强。' },

      // 4. 复句 (complex)
      { category: 'complex', title: '并列：既……又/也/还……', structure: '既 + Adj/V + 又/也/还 + Adj/V', examples: ['她既聪明又漂亮。', '散步既可以锻炼身体，又可以减肥。'], translation: ['She is both smart and beautiful.', 'Walking can both exercise your body and help you lose weight.'], explanation: '连接两个并列的形容词或动词，表示同时具有两种属性。[reference:29]' },
      { category: 'complex', title: '递进：不仅……而且/还……', structure: '不仅 + A, 而且/还 + B', examples: ['他不仅会英语，还会法语。', '玛丽不仅身体健康，还成了运动员。'], translation: ['He not only speaks English, but also French.', 'Mary is not only healthy, but has also become an athlete.'], explanation: '表示意思更进一层。[reference:30]' },
      { category: 'complex', title: '递进：不但不/没……反而……', structure: '不但不/没 + 预期, 反而 + 相反结果', examples: ['雨不但没停，反而下得更大了。', '他不但不帮我，反而给我添麻烦。'], translation: ['Not only did the rain not stop, it got even heavier.', 'Not only did he not help me, he caused me trouble.'], explanation: '表示情况与预期相反，并且程度更重。[reference:31]' },
      { category: 'complex', title: '转折：虽然……但是/却……', structure: '虽然 + A, 但是/却 + B', examples: ['虽然很累，但是我很快乐。', '虽然下雨了，他却坚持去跑步。'], translation: ['Although I\'m tired, I\'m very happy.', 'Although it rained, he insisted on going running.'], explanation: '先承认一个事实，然后转折。' },
      { category: 'complex', title: '转折：尽管……可是/但是……', structure: '尽管 + A, 可是/但是 + B', examples: ['尽管遇到很多困难，他却没有放弃。', '尽管天气不好，我们还是出发了。'], translation: ['Despite encountering many difficulties, he didn\'t give up.', 'Despite the bad weather, we still set out.'], explanation: '“尽管”比“虽然”语气更强，表示让步。[reference:32]' },
      { category: 'complex', title: '让步：即使……也……', structure: '即使 + 假设, 也 + 结果', examples: ['即使明天下雨，我也要去。', '即使你不说，我也知道。'], translation: ['Even if it rains tomorrow, I will go.', 'Even if you don\'t say it, I know.'], explanation: '表示假设性的让步，意为“就算是……也……”。[reference:33]' },
      { category: 'complex', title: '让步：哪怕……也……', structure: '哪怕 + 极端情况, 也 + 结果', examples: ['哪怕只有一线希望，我们也要试试。', '哪怕再难，我也不放弃。'], translation: ['Even if there\'s only a glimmer of hope, we must try.', 'No matter how hard it is, I won\'t give up.'], explanation: '表示对极端情况的让步，比“即使”更口语化。' },
      { category: 'complex', title: '让步：再……也……', structure: '再 + Adj/V + 也 + 结果', examples: ['再大的困难也不怕。', '你再说也没用。'], translation: ['No matter how great the difficulty, I\'m not afraid.', 'It\'s no use even if you say more.'], explanation: '表示“无论多么……也……”。[reference:34]' },
      { category: 'complex', title: '因果：由于……因此/所以……', structure: '由于 + 原因, 因此/所以 + 结果', examples: ['由于工作努力，因此得到了认可。', '由于生病，所以他请假了。'], translation: ['Because he worked hard, he got recognition.', 'Because he was sick, he asked for leave.'], explanation: '“由于”强调客观原因，常用于书面语。[reference:35]' },
      { category: 'complex', title: '因果：既然……就……', structure: '既然 + 已知事实, 就 + 推论', examples: ['既然大家都到了，我们就开始吧。', '既然你不喜欢，就别买了。'], translation: ['Since everyone is here, let\'s begin.', 'Since you don\'t like it, don\'t buy it.'], explanation: '根据已知事实推出结论或建议。[reference:36]' },
      { category: 'complex', title: '条件：只要……就……', structure: '只要 + 条件, 就 + 结果', examples: ['只要你努力，就能成功。', '只要不下雨，我们就去。'], translation: ['As long as you work hard, you will succeed.', 'As long as it doesn\'t rain, we will go.'], explanation: '表示充分条件，满足条件即可得到结果。' },
      { category: 'complex', title: '条件：只有……才……', structure: '只有 + 唯一条件, 才 + 结果', examples: ['只有多听多说，才能学好汉语。', '只有他才能解决这个问题。'], translation: ['Only by listening and speaking more can you learn Chinese well.', 'Only he can solve this problem.'], explanation: '强调唯一的、必不可少的条件。' },
      { category: 'complex', title: '条件：除非……才/否则……', structure: '除非 + 条件, 才 + 结果 / 否则 + 后果', examples: ['除非你去，我才会去。', '除非下雨，否则比赛照常进行。'], translation: ['Only if you go will I go.', 'Unless it rains, the match will proceed as usual.'], explanation: '强调唯一的条件。“除非……否则……”意为“如果不……就不……”。' },
      { category: 'complex', title: '假设：要是……就……', structure: '要是 + 假设, 就 + 结果', examples: ['要是明天下雨，我就不去了。', '要是你想去，我就陪你去。'], translation: ['If it rains tomorrow, I won\'t go.', 'If you want to go, I\'ll go with you.'], explanation: '“要是”和“如果”意思相同，更口语化。' },
      { category: 'complex', title: '假设：万一……就……', structure: '万一 + 小概率事件, 就 + 应对', examples: ['万一下雨，我们就在室内活动。', '万一他忘了，你就提醒他一下。'], translation: ['In case it rains, we\'ll do indoor activities.', 'If he forgets, just remind him.'], explanation: '假设发生可能性极小且往往是不利的事情。[reference:37]' },
      { category: 'complex', title: '顺承：先……然后/接着/再……', structure: '先 + V1, 然后/接着/再 + V2', examples: ['我先吃饭，然后再去。', '我们先讨论，接着做决定。'], translation: ['I\'ll eat first, then go.', 'Let\'s discuss first, then make a decision.'], explanation: '表示动作发生的先后顺序。' },
      { category: 'complex', title: '顺承：一……就……', structure: '一 + V1 + 就 + V2', examples: ['我一回家就给你打电话。', ['经理一回来，我就告诉他。']], translation: ['I\'ll call you as soon as I get home.', 'I\'ll tell the manager as soon as he returns.'], explanation: '表示两件事紧接着发生。[reference:38]' },

      // 5. 固定格式 (fixed)
      { category: 'fixed', title: '快要/就要/要……了', structure: '快要/就要/要 + V/Adj + 了', examples: ['火车快要开了。', '我明天就要回国了。'], translation: ['The train is about to leave.', 'I\'m going back to my country tomorrow.'], explanation: '表示动作或情况即将发生。“快要”前不能加时间词，“就要”前可以。[reference:39]' },
      { category: 'fixed', title: '在……看来', structure: '在 + Person + 看来', examples: ['在我看来，这不是个好主意。', '在老师看来，每个学生都很重要。'], translation: ['In my opinion, this is not a good idea.', 'From the teacher\'s perspective, every student is important.'], explanation: '引出某人的观点或看法。[reference:40]' },
      { category: 'fixed', title: '从……起', structure: '从 + 时间/地点 + 起', examples: ['从明天起，我要戒烟。', '从这里起，都是山路。'], translation: ['Starting tomorrow, I\'m going to quit smoking.', 'From here on, it\'s all mountain roads.'], explanation: '表示时间或空间的起点。' },
      { category: 'fixed', title: '在……上', structure: '在 + 方面/领域 + 上', examples: ['他在学习上很努力。', '在生活上，她是个细心的人。'], translation: ['He works very hard in his studies.', 'In daily life, she is a careful person.'], explanation: '表示在某个方面或领域。' },
      { category: 'fixed', title: '在……下', structure: '在 + 条件/环境 + 下', examples: ['在朋友的帮助下，我完成了任务。', '在老师的鼓励下，他进步很快。'], translation: ['With the help of friends, I completed the task.', 'With the teacher\'s encouragement, he made rapid progress.'], explanation: '表示在某种条件或影响下。' },
      { category: 'fixed', title: '和/跟……相比', structure: '和/跟 + B + 相比, A + 更……', examples: ['跟昨天相比，今天暖和多了。', '和他相比，我差得远呢。'], translation: ['Compared with yesterday, today is much warmer.', 'Compared to him, I still have a long way to go.'], explanation: '用于比较两个事物。' },
      { category: 'fixed', title: '为了……而……', structure: '为了 + 目的 + 而 + 行动', examples: ['为了理想而奋斗。', '他为了买房子而努力工作。'], translation: ['Strive for ideals.', 'He works hard in order to buy a house.'], explanation: '表示目的，常用于书面语。' },
      { category: 'fixed', title: '非……不可', structure: '非 + V + 不可', examples: ['我非去不可。', '今天非下雨不可。'], translation: ['I absolutely must go.', 'It\'s bound to rain today.'], explanation: '双重否定，表示强烈的肯定或决心。' },
      { category: 'fixed', title: '拿……来说', structure: '拿 + 例子 + 来说', examples: ['拿小张来说，他就很会过日子。', '拿这件事来说，你的处理方式就不对。'], translation: ['Take Xiao Zhang for example, he is very good at managing his life.', 'Take this matter for example, your way of handling it was wrong.'], explanation: '用于举例说明观点。[reference:41]' },
      { category: 'fixed', title: '对……来说', structure: '对 + Person + 来说', examples: ['对我来说，家庭最重要。', '对他来说，这是个好消息。'], translation: ['For me, family is the most important.', 'For him, this is good news.'], explanation: '从某人的角度看问题。' },
      { category: 'fixed', title: '……，尤其是……', structure: '普遍情况，尤其是 + 突出部分', examples: ['我喜欢吃水果，尤其是苹果。', '大家都很忙，尤其是小张。'], translation: ['I like eating fruit, especially apples.', 'Everyone is very busy, especially Xiao Zhang.'], explanation: '突出强调某个具体的人或事物。' },
      { category: 'fixed', title: 'V + 着 + V + 着', structure: 'V + 着 + V + 着 + (就) + V2', examples: ['他说着说着就哭了。', '我看着看着就睡着了。'], translation: ['He was talking and then started crying.', 'I was reading and then fell asleep.'], explanation: '表示一个动作持续的过程中，出现了另一个动作或状态。[reference:42]' },
      { category: 'fixed', title: '自从……以来', structure: '自从 + 时间点 + 以来', examples: ['自从毕业以来，我们就没见过面。', '自从来了中国，我胖了五公斤。'], translation: ['Since graduation, we haven\'t seen each other.', 'Since I came to China, I\'ve gained 5 kg.'], explanation: '表示从过去的某个时间点到现在。' },
      { category: 'fixed', title: 'V + 来 + V + 去', structure: 'V + 来 + V + 去', examples: ['我想来想去，还是决定不去。', '他挑来挑去，最后什么都没买。'], translation: ['After thinking it over, I decided not to go.', 'He picked and chose, but didn\'t buy anything in the end.'], explanation: '表示动作反复进行。' },
      { category: 'fixed', title: '怎么 + V + 也 + V + 不 + 结果', structure: '怎么 + V + 也 + V + 不 + 结果', examples: ['这道题我怎么想也想不出来。', '门怎么打也打不开。'], translation: ['I can\'t figure out this problem no matter how hard I think.', 'The door won\'t open no matter what I do.'], explanation: '表示无论用什么方法都无法达到预期结果。' }
    ];

    // ---------- 游戏化状态 ----------
    let mastered = new Set(JSON.parse(localStorage.getItem('hsk4_grammar_mastered') || '[]'));
    let currentCategory = 'all';
    let currentQuizItem = null;

    // DOM 元素
    const grid = document.getElementById('grammarGrid');
    const progressFill = document.getElementById('progressFill');
    const masteryPercentSpan = document.getElementById('masteryPercent');
    const badgeContainer = document.getElementById('badgeContainer');
    const catBtns = document.querySelectorAll('.cat-btn');
    const resetBtn = document.getElementById('resetProgressBtn');
    const modal = document.getElementById('quizModal');
    const quizQuestion = document.getElementById('quizQuestion');
    const quizOptions = document.getElementById('quizOptions');
    const quizFeedback = document.getElementById('quizFeedback');
    const closeQuizBtn = document.getElementById('closeQuizBtn');

    // 勋章定义
    const badges = [
      { name: '词类专家', icon: 'fa-tags', condition: () => masteredCount('words') >= 15 },
      { name: '成分大师', icon: 'fa-puzzle-piece', condition: () => masteredCount('components') >= 5 },
      { name: '句型高手', icon: 'fa-quote-right', condition: () => masteredCount('sentences') >= 6 },
      { name: '复句精英', icon: 'fa-link', condition: () => masteredCount('complex') >= 10 },
      { name: '格式达人', icon: 'fa-cubes', condition: () => masteredCount('fixed') >= 8 },
      { name: '语法全通', icon: 'fa-crown', condition: () => mastered.size >= 40 }
    ];

    function masteredCount(cat) {
      return grammarData.filter(g => g.category === cat && mastered.has(g.title)).length;
    }

    function totalCount(cat) {
      return grammarData.filter(g => g.category === cat).length;
    }

    function updateProgress() {
      const percent = Math.round((mastered.size / grammarData.length) * 100);
      masteryPercentSpan.innerText = percent + '%';
      progressFill.style.width = percent + '%';
      renderBadges();
    }

    function renderBadges() {
      let html = '';
      badges.forEach(b => {
        const unlocked = b.condition();
        html += `<div class="badge ${unlocked ? 'unlocked' : ''}"><i class="fas ${b.icon}"></i> ${b.name}</div>`;
      });
      badgeContainer.innerHTML = html;
    }

    function saveMastered() {
      localStorage.setItem('hsk4_grammar_mastered', JSON.stringify([...mastered]));
    }

    // 渲染卡片
    function renderCards() {
      const filtered = currentCategory === 'all' ? grammarData : grammarData.filter(g => g.category === currentCategory);
      let html = '';
      filtered.forEach(item => {
        const isMastered = mastered.has(item.title);
        const exampleHtml = item.examples.map((ex, i) => `
          <div class="example-box">
            <div class="example">📌 ${ex}</div>
            <div class="translation">💬 ${Array.isArray(item.translation) ? item.translation[i] : item.translation}</div>
          </div>
        `).join('');
        html += `
          <div class="grammar-card" data-title="${item.title}">
            <div class="card-header">
              <i class="fas fa-bookmark"></i>
              <h3>${item.title}</h3>
            </div>
            <div class="structure">${item.structure}</div>
            <div class="explanation">📘 ${item.explanation}</div>
            ${exampleHtml}
            <div class="card-footer">
              <button class="check-btn ${isMastered ? 'completed' : ''}" data-title="${item.title}">
                <i class="fas ${isMastered ? 'fa-check-circle' : 'fa-circle'}"></i> ${isMastered ? '已掌握' : '标记掌握'}
              </button>
              <span class="quiz-hint"><i class="fas fa-dice"></i> 测验</span>
            </div>
          </div>
        `;
      });
      grid.innerHTML = html;

      // 绑定标记按钮
      document.querySelectorAll('.check-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const title = btn.dataset.title;
          if (mastered.has(title)) {
            mastered.delete(title);
            btn.classList.remove('completed');
            btn.innerHTML = '<i class="fas fa-circle"></i> 标记掌握';
          } else {
            mastered.add(title);
            btn.classList.add('completed');
            btn.innerHTML = '<i class="fas fa-check-circle"></i> 已掌握';
          }
          saveMastered();
          updateProgress();
        });
      });

      // 卡片点击触发小测验 (除了按钮)
      document.querySelectorAll('.grammar-card').forEach(card => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.check-btn')) return;
          const title = card.dataset.title;
          const item = grammarData.find(g => g.title === title);
          if (item) startQuiz(item);
        });
      });
    }

    // ---------- 游戏化小测验 ----------
    function startQuiz(item) {
      currentQuizItem = item;
      const questions = [
        { q: `“${item.structure}” 最适合描述哪一项？`, options: [item.explanation, '表示过去', '表示将来', '表示否定'], correct: 0 },
        { q: `下列哪个例句使用了“${item.title}”？`, options: [item.examples[0], '我今天很高兴。', '他去学校了。', '这本书很有意思。'], correct: 0 },
        { q: `“${item.title}” 的英文解释最接近？`, options: [Array.isArray(item.translation) ? item.translation[0] : item.translation, 'very good', 'not bad', 'how are you'], correct: 0 }
      ];
      const selectedQ = questions[Math.floor(Math.random() * questions.length)];
      quizQuestion.innerText = selectedQ.q;
      quizOptions.innerHTML = '';
      selectedQ.options.forEach((opt, idx) => {
        const optDiv = document.createElement('div');
        optDiv.className = 'quiz-opt';
        optDiv.innerText = opt;
        optDiv.addEventListener('click', () => {
          document.querySelectorAll('.quiz-opt').forEach(o => o.style.background = '');
          if (idx === selectedQ.correct) {
            optDiv.style.background = 'var(--accent-soft)';
            quizFeedback.innerHTML = '<span style="color:green">✅ 正确！很棒！</span>';
            if (!mastered.has(item.title)) {
              mastered.add(item.title);
              saveMastered();
              updateProgress();
              renderCards(); // 刷新按钮状态
            }
          } else {
            optDiv.style.background = '#f8d7da';
            quizFeedback.innerHTML = `<span style="color:#c44536">❌ 再想想。正确答案是：${selectedQ.options[selectedQ.correct]}</span>`;
          }
        });
        quizOptions.appendChild(optDiv);
      });
      quizFeedback.innerHTML = '';
      modal.classList.add('show');
    }

    closeQuizBtn.addEventListener('click', () => {
      modal.classList.remove('show');
    });

    // 分类切换
    catBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        catBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.cat;
        renderCards();
      });
    });

    // 重置进度
    resetBtn.addEventListener('click', () => {
      if (confirm('确定要重置所有语法学习进度吗？')) {
        mastered.clear();
        saveMastered();
        updateProgress();
        renderCards();
      }
    });

    // 深色模式切换
    const darkBtn = document.createElement('button');
    darkBtn.innerHTML = '<i class="fas fa-moon"></i>';
    darkBtn.style.position = 'fixed'; darkBtn.style.bottom = '20px'; darkBtn.style.right = '20px';
    darkBtn.style.background = 'var(--accent)'; darkBtn.style.color = 'white'; darkBtn.style.border = 'none';
    darkBtn.style.borderRadius = '50%'; darkBtn.style.width = '50px'; darkBtn.style.height = '50px'; darkBtn.style.cursor = 'pointer';
    darkBtn.style.zIndex = '1500';
    darkBtn.onclick = () => {
      const isDark = document.body.classList.contains('dark');
      if (isDark) { document.body.classList.remove('dark'); document.body.classList.add('light'); localStorage.setItem('hsk4_grammar_theme', 'light'); }
      else { document.body.classList.remove('light'); document.body.classList.add('dark'); localStorage.setItem('hsk4_grammar_theme', 'dark'); }
    };
    document.body.appendChild(darkBtn);
    const savedTheme = localStorage.getItem('hsk4_grammar_theme');
    if (savedTheme === 'dark') { document.body.classList.add('dark'); document.body.classList.remove('light'); }

    // 初始化
    updateProgress();
    renderCards();
  })();
</script>
</body>
</html>
