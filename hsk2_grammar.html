<body class="light">
<div class="container">
  <h1>📐 HSK 2 Grammar Points</h1>
  <div class="grammar-grid" id="grammarList"></div>
  <a href="hsk2_hub.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Hub</a>
</div>
<script>
  const grammarData = [
    { title: "1. Comparative sentence with '比'", structure: "A + 比 + B + Adjective", examples: ["我比他高。", "今天比昨天热。"], explanation: "Used to compare two things." },
    { title: "2. '正在' for ongoing action", structure: "Subject + 正在 + Verb", examples: ["我正在吃饭。", "他在看书。"], explanation: "Indicates an action in progress." },
    { title: "3. '要...了' for imminent action", structure: "Subject + 要 + Verb + 了", examples: ["我要走了。", "天要下雨了。"], explanation: "Something is about to happen." },
    { title: "4. '虽然...但是...'", structure: "虽然 + clause, 但是 + clause", examples: ["虽然很累，但是很开心。", "虽然下雨，但是我还是去了。"], explanation: "Although... but..." },
    { title: "5. '把' sentence", structure: "Subject + 把 + Object + Verb + 了", examples: ["我把作业做完了。", "请把门关上。"], explanation: "Emphasizes the handling of an object." },
    { title: "6. '从' to indicate starting point", structure: "从 + place/time + Verb", examples: ["我从北京来。", "从早上八点开始。"], explanation: "Indicates the origin." }
  ];
  const container = document.getElementById('grammarList');
  let html = '';
  grammarData.forEach(g => {
    html += `<div class="grammar-card">
      <div class="grammar-title">${g.title}</div>
      <div class="grammar-structure">${g.structure}</div>
      <div class="grammar-example">${g.examples.map(e => `“${e}”`).join(' · ')}</div>
      <div>${g.explanation}</div>
    </div>`;
  });
  container.innerHTML = html;
  // Dark mode (same as HSK1)
</script>
</body>
</html>
