    { type: "listening_part4", passage: "жҲ‘зҡ„жҲҝй—ҙдёҚеӨ§гҖӮжңүдёҖеј еәҠгҖҒдёҖеј жЎҢеӯҗе’ҢдёҖжҠҠжӨ…еӯҗгҖӮжЎҢеӯҗдёҠжңүдёҖеҸ°з”өи„‘гҖӮ", question: "жЎҢеӯҗдёҠжңүд»Җд№Ҳпјҹ", options: ["д№Ұ", "з”өи„‘", "зҒҜ", "жқҜеӯҗ"], correct: 1 }

    { type: "reading_part1", text: "еҰҲеҰҲ", img: "рҹ‘©вҖҚрҹ‘§", correct: true },

    { type: "reading_part2", sentence: "д»–еқҗиҪҰеҺ»еӯҰж ЎгҖӮ", imgOptions: ["рҹҡ—еқҗиҪҰ", "рҹҡІйӘ‘иҪҰ", "рҹҡ¶иө°и·Ҝ", "рҹҸғи·‘жӯҘ"], correct: 0 },
    { type: "reading_part2", sentence: "еҘ№е–ңж¬ўе”ұжӯҢгҖӮ", imgOptions: ["рҹҺӨе”ұжӯҢ", "рҹ’ғи·іиҲһ", "рҹ“–иҜ»д№Ұ", "вңҚпёҸеҶҷеӯ—"], correct: 0 },
    { type: "reading_part2", sentence: "д»–жҳҜдёҖеҗҚиҖҒеёҲгҖӮ", imgOptions: ["рҹ‘ЁвҖҚрҹҸ«", "рҹ‘©вҖҚвҡ•пёҸ", "рҹ‘ЁвҖҚрҹҚі", "рҹ‘®вҖҚвҷӮпёҸ"], correct: 0 },
    { type: "reading_part2", sentence: "иҝҷжҳҜдёҖеҸӘзҢ«гҖӮ", imgOptions: ["рҹҗұ", "рҹҗ¶", "рҹҗӯ", "рҹҗ°"], correct: 0 },
    // Part 3: Sentence ordering (logical sequence) (Q31-35)
    { type: "reading_part3", sentences: ["жҲ‘иө·еәҠгҖӮ", "жҲ‘еҗғж—©йҘӯгҖӮ", "жҲ‘еҺ»еӯҰж ЎгҖӮ"], correctOrder: [0,1,2] },

  let currentSection = 'listening'; // 'listening' or 'reading'

  let timerInterval = null;

  // Speech synthesis function
  function speak(text) {
    if (!text) return;
    try {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-CN';
      utterance.rate = 0.8;
      window.speechSynthesis.speak(utterance);
    } catch(e) { console.error(e); }
  }

  // Render current section
  function render() {
    const container = document.getElementById('questionsContainer');
    const nextBtn = document.getElementById('nextSectionBtn');
    const submitBtn = document.getElementById('submitBtn');
    const timerEl = document.getElementById('timer');

    if (currentSection === 'listening') {
      timerEl.innerText = `Listening Section: ${Math.floor(listeningTimer/60)}:${(listeningTimer%60).toString().padStart(2,'0')}`;
      let html = '<div class="section-header">рҹҺ§ Listening (20 questions)</div>';
      listeningQuestions.forEach((q, idx) => {
        if (q.type === 'listening_part1') {
          html += `<div class="question">
            <div><strong>${idx+1}.</strong> <button class="play-btn" data-text="${q.text}"><i class="fas fa-play"></i> Listen</button></div>

            <div class="options">
              <label><input type="radio" name="q${idx}" value="true"> вң“ True</label>
              <label><input type="radio" name="q${idx}" value="false"> вң— False</label>
            </div>
          </div>`;
        } else if (q.type === 'listening_part2') {
          html += `<div class="question">
            <div><strong>${idx+1}.</strong> <button class="play-btn" data-text="${q.dialogue}"><i class="fas fa-play"></i> Listen</button></div>
            <div class="options">`;
          q.imgOptions.forEach((opt, optIdx) => {
            html += `<div><input type="radio" name="q${idx}" value="${optIdx}"> ${opt}</div>`;
          });
          html += `</div></div>`;
        } else if (q.type === 'listening_part3') {
          html += `<div class="question">
            <div><strong>${idx+1}.</strong> <button class="play-btn" data-text="${q.dialogue}"><i class="fas fa-play"></i> Listen</button></div>
            <div>${q.question}</div>
            <div class="options">`;
          q.options.forEach((opt, optIdx) => {
            html += `<div><input type="radio" name="q${idx}" value="${optIdx}"> ${opt}</div>`;
          });
          html += `</div></div>`;
        } else if (q.type === 'listening_part4') {
          html += `<div class="question">
            <div><strong>${idx+1}.</strong> <button class="play-btn" data-text="${q.passage}"><i class="fas fa-play"></i> Listen</button></div>
            <div>${q.question}</div>
            <div class="options">`;
          q.options.forEach((opt, optIdx) => {
            html += `<div><input type="radio" name="q${idx}" value="${optIdx}"> ${opt}</div>`;
          });
          html += `</div></div>`;
        }
      });
      container.innerHTML = html;
      // Attach play button events
      document.querySelectorAll('.play-btn').forEach(btn => {
        btn.addEventListener('click', () => speak(btn.dataset.text));
      });
      // Load saved answers
      listeningAnswers.forEach((ans, idx) => {
        if (ans !== -1) {
          const radio = document.querySelector(`input[name="q${idx}"][value="${ans}"]`);
          if (radio) radio.checked = true;
        }
      });
      // Update answers when changed
      document.querySelectorAll('input[type="radio"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
          const name = e.target.name;
          const idx = parseInt(name.substring(1));
          const val = e.target.value;
          listeningAnswers[idx] = (val === 'true' || val === 'false') ? (val === 'true') : parseInt(val);
        });
      });
      nextBtn.classList.remove('hidden');
      submitBtn.classList.add('hidden');
    } else {
      timerEl.innerText = `Reading Section: ${Math.floor(readingTimer/60)}:${(readingTimer%60).toString().padStart(2,'0')}`;
      let html = '<div class="section-header">рҹ“– Reading (20 questions)</div>';
      readingQuestions.forEach((q, idx) => {
        if (q.type === 'reading_part1') {
          html += `<div class="question">

            <div class="options">
              <label><input type="radio" name="r${idx}" value="true"> вң“ True</label>
              <label><input type="radio" name="r${idx}" value="false"> вң— False</label>
            </div>
          </div>`;
        } else if (q.type === 'reading_part2') {
          html += `<div class="question">
            <div><strong>${idx+21}.</strong> Sentence: "${q.sentence}"</div>
            <div class="options">`;
          q.imgOptions.forEach((opt, optIdx) => {
            html += `<div><input type="radio" name="r${idx}" value="${optIdx}"> ${opt}</div>`;
          });
          html += `</div></div>`;
        } else if (q.type === 'reading_part3') {
          // For ordering, we need to let user drag or use dropdowns. Simplified: give options as orders
          html += `<div class="question">
            <div><strong>${idx+21}.</strong> Arrange in logical order:</div>
            <div>${q.sentences.map((s, i) => `<span style="display:inline-block; margin:0 5px;">${i+1}. ${s}</span>`).join('<br>')}</div>
            <div>Your order (e.g., 0,1,2): <input type="text" name="r${idx}" placeholder="0,1,2" value="${readingAnswers[idx] !== -1 ? readingAnswers[idx].join(',') : ''}"></div>
          </div>`;
        } else if (q.type === 'reading_part4') {
          html += `<div class="question">
            <div><strong>${idx+21}.</strong> ${q.sentence}</div>
            <div class="options">`;
          q.options.forEach((opt, optIdx) => {
            html += `<div><input type="radio" name="r${idx}" value="${optIdx}"> ${opt}</div>`;
          });
          html += `</div></div>`;
        }
      });
      container.innerHTML = html;
      // Load saved answers
      readingAnswers.forEach((ans, idx) => {
        if (ans !== -1) {
          if (readingQuestions[idx].type === 'reading_part3') {
            const input = document.querySelector(`input[name="r${idx}"]`);
            if (input) input.value = ans.join(',');
          } else {
            const radio = document.querySelector(`input[name="r${idx}"][value="${ans}"]`);
            if (radio) radio.checked = true;
          }
        }
      });
      document.querySelectorAll('input[type="radio"], input[type="text"]').forEach(input => {
        input.addEventListener('change', (e) => {
          const name = e.target.name;
          const idx = parseInt(name.substring(1));
          let val;
          if (readingQuestions[idx].type === 'reading_part3') {
            val = e.target.value.split(',').map(Number);
            readingAnswers[idx] = val;
          } else {
            val = (e.target.value === 'true' || e.target.value === 'false') ? (e.target.value === 'true') : parseInt(e.target.value);
            readingAnswers[idx] = val;
          }
        });
      });
      nextBtn.classList.add('hidden');
      submitBtn.classList.remove('hidden');
    }
  }

  function startListeningTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (currentSection === 'listening' && listeningTimer > 0) {
        listeningTimer--;
        document.getElementById('timer').innerText = `Listening Section: ${Math.floor(listeningTimer/60)}:${(listeningTimer%60).toString().padStart(2,'0')}`;
        if (listeningTimer <= 0) {
          clearInterval(timerInterval);
          alert("Listening section time's up! Moving to reading section.");
          nextSection();
        }
      } else if (currentSection === 'reading' && readingTimer > 0) {
        readingTimer--;
        document.getElementById('timer').innerText = `Reading Section: ${Math.floor(readingTimer/60)}:${(readingTimer%60).toString().padStart(2,'0')}`;
        if (readingTimer <= 0) {
          clearInterval(timerInterval);
          alert("Reading section time's up! Submitting exam.");
          submitExam();
        }
      }
    }, 1000);
  }

  function nextSection() {
    clearInterval(timerInterval);
    currentSection = 'reading';
    listeningFinished = true;
    render();
    startListeningTimer();
  }

  function submitExam() {
    clearInterval(timerInterval);
    // Calculate score
    let totalCorrect = 0;
    // Listening part
    for (let i=0; i<listeningQuestions.length; i++) {
      const q = listeningQuestions[i];
      const userAns = listeningAnswers[i];
      let correct = false;
      if (q.type === 'listening_part1') correct = (userAns === q.correct);
      else if (q.type === 'listening_part2' || q.type === 'listening_part3' || q.type === 'listening_part4') correct = (userAns === q.correct);
      if (correct) totalCorrect++;
    }
    // Reading part
    for (let i=0; i<readingQuestions.length; i++) {
      const q = readingQuestions[i];
      const userAns = readingAnswers[i];
      let correct = false;
      if (q.type === 'reading_part1') correct = (userAns === q.correct);
      else if (q.type === 'reading_part2') correct = (userAns === q.correct);
      else if (q.type === 'reading_part3') correct = (JSON.stringify(userAns) === JSON.stringify(q.correctOrder));
      else if (q.type === 'reading_part4') correct = (userAns === q.correct);
      if (correct) totalCorrect++;
    }
    const percent = Math.round((totalCorrect / 40) * 100);
    const passed = percent >= 60;
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = `<strong>Your score: ${totalCorrect}/40 (${percent}%)</strong><br>${passed ? 'рҹҺү Congratulations! You passed HSK 1!' : 'рҹҳў Keep practicing! You can retake the exam.'}`;
    const best = localStorage.getItem('hsk1_exam_best') || 0;
    if (percent > best) localStorage.setItem('hsk1_exam_best', percent);
    resultDiv.innerHTML += `<br>рҹҸҶ Best score: ${best}%`;
  }

  document.getElementById('nextSectionBtn').addEventListener('click', nextSection);
  document.getElementById('submitBtn').addEventListener('click', submitExam);
  document.getElementById('resetBtn').addEventListener('click', () => {
    listeningAnswers.fill(-1);
    readingAnswers.fill(-1);
    listeningTimer = 15 * 60;
    readingTimer = 17 * 60;
    currentSection = 'listening';
    listeningFinished = false;
    render();
    startListeningTimer();
    document.getElementById('result').innerHTML = '';
  });

  // Dark mode toggle
  const darkBtn = document.createElement('button');
  darkBtn.innerHTML = '<i class="fas fa-moon"></i> Dark';
  darkBtn.style.position = 'fixed'; darkBtn.style.bottom = '20px'; darkBtn.style.right = '20px';
  darkBtn.style.background = 'var(--accent)'; darkBtn.style.color = 'white'; darkBtn.style.border = 'none'; darkBtn.style.borderRadius = '30px'; darkBtn.style.padding = '0.4rem 1rem'; darkBtn.style.cursor = 'pointer';
  darkBtn.onclick = () => {
    const isDark = document.body.classList.contains('dark');
    if (isDark) { document.body.classList.remove('dark'); document.body.classList.add('light'); localStorage.setItem('hsk1_exam_theme', 'light'); }
    else { document.body.classList.remove('light'); document.body.classList.add('dark'); localStorage.setItem('hsk1_exam_theme', 'dark'); }
  };
  document.body.appendChild(darkBtn);
  const savedTheme = localStorage.getItem('hsk1_exam_theme');
  if (savedTheme === 'dark') { document.body.classList.add('dark'); document.body.classList.remove('light'); }
  else { document.body.classList.add('light'); document.body.classList.remove('dark'); }

  render();
  startListeningTimer();
</script>
</body>
</html>
