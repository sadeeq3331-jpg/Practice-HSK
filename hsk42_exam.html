<script>
  (function(){
    // ==================== 听力部分 (45题) ====================
    const listeningQuestions = [
      // 第一部分：判断对错 (10题) —— 全新题目
      { type: "part1", sentence: "现在我很少看电视，其中一个原因是，广告太多了，不管什么时间，也不管什么节目，只要你打开电视，总能看到那么多的广告，浪费我的时间。", statement: "★ 他喜欢看电视广告。", correct: false },
      { type: "part1", sentence: "我和他是在朋友家里认识的，虽然第一次见面的时候没怎么聊天儿，但是他给我的印象很深。后来我们进了同一家公司，每天一起工作，才慢慢熟悉起来。", statement: "★ 他们俩是在公司认识的。", correct: false },
      { type: "part1", sentence: "妻子们大多都希望自己的丈夫能记住他们是哪天结婚的，而且能在每年的那一天看到丈夫送她的礼物。", statement: "★ 妻子希望丈夫天天送她礼物。", correct: false },
      { type: "part1", sentence: "踢足球不是一个人的运动，即使你踢得很好，没有其他球员的努力，比赛也不会好看。", statement: "★ 踢足球需要球员们一起努力。", correct: true },
      { type: "part1", sentence: "怎么样才能找到适合自己的人？两个人共同生活，不仅需要浪漫的爱情，更需要性格上互相吸引，最重要的是，两个人都要想着好好照顾家人。", statement: "★ 爱情不需要浪漫。", correct: false },
      { type: "part1", sentence: "我们总是羡慕别人有个好工作、有个好妻子，但是常常忘记了自己已经有的幸福。其实，我们在很多人眼里也是幸福的，只是我们没有发现。", statement: "★ 不要总是羡慕别人。", correct: true },
      { type: "part1", sentence: "这次调查发现，超过70％的儿童更愿意让爸爸给自己读书。", statement: "★ 大多数孩子喜欢爸爸给他读书。", correct: true },
      { type: "part1", sentence: "等车的时候，我随便买了本杂志，看了没几页，就看到一个小故事，虽然这个故事不长，但是写得却很好，让我很感动。", statement: "★ 他被那个故事感动了。", correct: true },
      { type: "part1", sentence: "多与人交流当然有很多好处。通过交流，你不但可以增加对别人的了解，而且可以从不同的人那里得到不同的知识、经验、快乐等。", statement: "★ 要多跟人交流。", correct: true },
      { type: "part1", sentence: "经过这段时间的学习，他的汉语水平提高了不少，不但可以听懂一些较短的句子，还可以进行简单的交流。", statement: "★ 他现在是翻译。", correct: false },
      
      // 第二部分：短对话 (15题) —— 全新题目，问题由考官朗读
      { type: "part2", dialogue: "女：什么时候让我们见见你的女朋友？男：没问题。姐，我们正想下个周末请家里人一起吃个饭呢。", question: "说话人是什么关系？", options: ["A. 姐弟", "B. 兄妹", "C. 父女", "D. 同学"], correct: 0 },
      { type: "part2", dialogue: "男：王老师，我下个月十号就要结婚了。女：你不是在开玩笑吧？你们才认识一个月呀。", question: "女的觉得怎么样？", options: ["A. 结婚太早", "B. 结婚太晚", "C. 男的在开玩笑", "D. 两个人很合适"], correct: 2 },
      { type: "part2", dialogue: "女：我希望我的男朋友又高又帅，还要非常幽默。男：你说的是我吗？", question: "根据对话，可以知道男的怎么样？", options: ["A. 又高又帅", "B. 非常幽默", "C. 很生气", "D. 不幽默"], correct: 1 },
      { type: "part2", dialogue: "女：小李，我给你介绍个女朋友吧，说说你有什么要求。男：我啊，喜欢可爱的女孩子，漂亮不漂亮没关系。", question: "男的觉得哪种女孩子比较好？", options: ["A. 漂亮的", "B. 可爱的", "C. 聪明的", "D. 幽默的"], correct: 1 },
      { type: "part2", dialogue: "女：这个电影讲了一个爱情故事，很浪漫，特别让人感动。男：你们女孩子就是喜欢看这种电影。", question: "他们在谈论什么？", options: ["A. 小说", "B. 电影", "C. 电视剧", "D. 女朋友"], correct: 1 },
      { type: "part2", dialogue: "女：好几年没见，你还是这么爱开玩笑。男：没有，我说的是真的，你真的比以前更年轻、更漂亮了。", question: "男的觉得女的怎么样？", options: ["A. 爱开玩笑", "B. 老了", "C. 更漂亮了", "D. 很生气"], correct: 2 },
      { type: "part2", dialogue: "男：你家里怎么有这么多关于法律的书？你大学学的就是法律吗？女：哪儿啊？我大学读的是数学，只是我最近对法律特别感兴趣。", question: "女的上大学时是学什么的？", options: ["A. 法律", "B. 数学", "C. 经济", "D. 中文"], correct: 1 },
      { type: "part2", dialogue: "男：喂，你好，我在网上看到你们的广告，你有房子要出租是吗？女：实在对不起，那个房子暂时不租了，对不起。", question: "女的主要是什么意思？", options: ["A. 房子太贵", "B. 房子不租了", "C. 房子太小", "D. 房子太远"], correct: 1 },
      { type: "part2", dialogue: "女：明天周末了，你有什么安排吗？男：我刚出差回来，有点儿累，就想在家里休息休息。", question: "男的周末准备做什么？", options: ["A. 出差", "B. 上班", "C. 在家休息", "D. 和朋友见面"], correct: 2 },
      { type: "part2", dialogue: "男：这几个西红柿怎么吃？女：就加点儿糖，做个凉菜吧。", question: "女的打算怎么吃西红柿？", options: ["A. 煮汤", "B. 炒菜", "C. 做凉菜", "D. 直接吃"], correct: 2 },
      { type: "part2", dialogue: "女：真羡慕你，除了平时的节假日，还有一个寒假和一个暑假。男：当时选择这个职业，没考虑到这些，我只是喜欢和孩子们在一起。", question: "男的最可能是做什么的？", options: ["A. 医生", "B. 老师", "C. 演员", "D. 律师"], correct: 1 },
      { type: "part2", dialogue: "男：那个饭店离咱们家也太远了，我们就在附近吃吧。女：不算太远。它的菜做得很好吃，而且价格也不贵。", question: "女的觉得那家饭店怎么样？", options: ["A. 太远了", "B. 不好吃", "C. 价格贵", "D. 菜好又不贵"], correct: 3 },
      { type: "part2", dialogue: "女：导游刚才说还要多久才能到长城？男：还有半小时就到了，我本来以为还得一个小时呢。", question: "到长城还要多长时间？", options: ["A. 半小时", "B. 一小时", "C. 一个半小时", "D. 两小时"], correct: 0 },
      { type: "part2", dialogue: "男：你为什么不喜欢小王？他不是挺成熟的吗？女：可是他一点儿也不幽默，约会的时候真无聊。", question: "女的喜欢什么样的人？", options: ["A. 成熟的", "B. 幽默的", "C. 帅气的", "D. 有钱的"], correct: 1 },
      { type: "part2", dialogue: "女：小王，我要去办签证，需要准备哪些材料？男：我也不是很清楚，我有大使馆的号码，您给他们打个电话问问？", question: "男的主要是什么意思？", options: ["A. 他不知道", "B. 他不想帮忙", "C. 让女的打电话问", "D. 他很清楚"], correct: 2 },
      
      // 第三部分：长对话/短文 (20题) —— 全新题目
      { type: "part3", dialogue: "男：把这个材料复印5份，一会儿拿到会议室发给大家。女：好的。会议是下午三点吗？男：改了。三点半，推迟了半个小时。女：好，602会议室没变吧？男：对，没变。", questions: [{ q: "会议几点开始？", options: ["A. 两点", "B. 3点", "C. 3点半", "D. 4点"], correct: 2 }] },
      { type: "part3", dialogue: "女：明天的电影你想不想看？男：我当然想看，可是票早就卖完了。女：我朋友多给了我一张，那到时候一起去吧。男：真的吗？你不是在开玩笑吧？女：怎么会呢？明晚七点南门见。", questions: [{ q: "明天晚上他们要去干什么？", options: ["A. 看电影", "B. 吃饭", "C. 开会", "D. 唱歌"], correct: 0 }] },
      { type: "part3", dialogue: "女：你最近忙吗？哪天有时间？男：怎么了？又想让我陪你吃饭呀？女：我的笔记本电脑太旧了，我想买个新的。男：那十七号周六我和你去看看。", questions: [{ q: "男的哪天有时间？", options: ["A. 今天", "B. 明天", "C. 十七号周六", "D. 十八号周日"], correct: 2 }] },
      { type: "part3", dialogue: "男：今天我去不了了，我明天晚上去吧。女：不会又要加班吧？男：没办法，同事们都在公司忙呢。女：好的，那就明天晚上。", questions: [{ q: "男的今天为什么去不了？", options: ["A. 生病了", "B. 加班", "C. 有约会", "D. 出差"], correct: 1 }] },
      { type: "part3", dialogue: "女：打了一下午羽毛球，肚子有点儿饿了。真香，今天吃什么？男：你鼻子真好，今晚我们吃饺子。再等一会儿，饭马上就好。", questions: [{ q: "女的现在感觉怎么样？", options: ["A. 饱了", "B. 饿了", "C. 累了", "D. 渴了"], correct: 1 }] },
      { type: "part3", dialogue: "女：小王，怎么最近在车站看不到你了？男：我买汽车了，现在每天开车上班，所以不用挤公共汽车了。女：你买车了？太好了。开车上班的感觉不错吧？男：刚开始挺紧张的，现在好多了。女：慢慢就习惯了。", questions: [{ q: "男的现在怎么上班？", options: ["A. 坐公交", "B. 开车", "C. 骑自行车", "D. 走路"], correct: 1 },{ q: "男的刚开始开车时怎么样？", options: ["A. 很熟练", "B. 很紧张", "C. 很兴奋", "D. 很无聊"], correct: 1 }] },
      { type: "part3", dialogue: "女：杨老师，我明天要去北京参加一个会议，飞机上午十点到。男：非常欢迎！我明天没有什么安排。女：不用来接我，我自己能行。不知道北京现在的天气怎么样？男：我们这儿挺冷的，今天最高气温只有五度，听说明天有大风。", questions: [{ q: "女的来北京做什么？", options: ["A. 旅游", "B. 探亲", "C. 开会", "D. 看病"], correct: 2 },{ q: "明天天气怎么样？", options: ["A. 暖和", "B. 有大风", "C. 下雨", "D. 晴天"], correct: 1 }] },
      { type: "part3", dialogue: "女：于经理，您看了我们的教学环境觉得怎么样？男：你们的教学环境不错，老师水平也还可以，但我得回去和老板商量一下。过两天我再跟您联系吧。", questions: [{ q: "女的最可能从事哪个行业？", options: ["A. 教育", "B. 医疗", "C. 金融", "D. 餐饮"], correct: 0 },{ q: "男的是什么意思？", options: ["A. 马上签合同", "B. 拒绝合作", "C. 需要回去商量", "D. 不满意"], correct: 2 }] },
      { type: "part3", dialogue: "旅客们，大家下午好，欢迎您乘坐T61次从北京开往昆明的火车。我们将于今天下午三点从北京出发，明天下午六点到达昆明，行程共3050公里，列车行驶时间为二十七个小时。", questions: [{ q: "这列火车的终点站是哪里？", options: ["A. 北京", "B. 武汉", "C. 长沙", "D. 昆明"], correct: 3 },{ q: "列车行驶时间是多少？", options: ["A. 20小时", "B. 24小时", "C. 27小时", "D. 30小时"], correct: 2 }] },
      { type: "part3", dialogue: "在一个寒冷的冬天，一个卖鞋的商人赶着马车在冰上走。突然，马受惊了，拼命地跑起来，商人怎么拉也拉不住。这时，对面来了一辆汽车，司机看到这危险的情况，马上把自己的车横在路中间，挡住了马车的去路。马被挡住了，商人和马都得救了。", questions: [{ q: "商人遇到了什么情况？", options: ["A. 马生病了", "B. 马车翻了", "C. 马受惊了", "D. 冰裂了"], correct: 2 },{ q: "司机是怎么做的？", options: ["A. 开车躲开", "B. 用车挡住马", "C. 下车帮忙", "D. 打电话报警"], correct: 1 }] }
    ];

    // 扁平化听力
    const flatListening = [];
    listeningQuestions.forEach(q => {
      if (q.type === 'part1' || q.type === 'part2') flatListening.push(q);
      else if (q.type === 'part3') q.questions.forEach(sq => flatListening.push({ ...sq, type: 'part3', dialogue: q.dialogue }));
    });

    // ==================== 阅读部分 (40题) ====================
    const readingQuestions = [

    const writingQuestions = [

    }

    function render() {

      renderNavBar();

      if (examState.section === 'listening') {
        const playBtn = document.getElementById('playAudioBtn');
        if (playBtn) {
          playBtn.addEventListener('click', ()=>{
            if (q.type === 'part1') speak(q.sentence);
            else {
              // 考官模式：先播放对话，再播放问题
              speak(q.dialogue, ()=>{
                setTimeout(()=>{ speak(q.q||q.question); }, 500);
              });
            }
          });
          setTimeout(()=> playBtn.click(), 300);
        }
      }
      document.querySelectorAll('input[name="q"]').forEach(r=>r.addEventListener('change', e=>{
        let v = e.target.value; v = (v==='true')? true : (v==='false'? false : parseInt(v));
        examState.answers[gIdx] = v; renderNavBar();
      }));

      if (examState.section==='writing' && q.type==='part1') {
        let selectedWords = [];
        document.querySelectorAll('.word-tile').forEach(t=>t.addEventListener('click', ()=>{
          selectedWords.push(t.dataset.word); t.classList.add('selected'); t.style.pointerEvents='none';
          document.getElementById('sentencePreview').innerText = selectedWords.join('');
        }));
        document.getElementById('clearBtn').addEventListener('click', ()=>{
          selectedWords=[]; document.querySelectorAll('.word-tile').forEach(t=>{ t.classList.remove('selected'); t.style.pointerEvents='auto'; });
          document.getElementById('sentencePreview').innerText='点击词语排序...';

        document.getElementById('checkBtn').addEventListener('click', ()=>{

    function renderNavBar() {

      let h = ''; 
      for(let i=0; i<qs.length; i++) {
        const g = getGlobalIndex() - examState.currentQuestionIndex + i;
        h += `<button class="nav-btn ${examState.answers[g]!==null?'answered':''} ${i===examState.currentQuestionIndex?'current':''}" data-index="${i}">${i+1}</button>`;
      }
      navBar.innerHTML = h;
      navBar.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click', ()=>{
        examState.currentQuestionIndex = parseInt(b.dataset.index); render();
      }));
    }

    function nextQuestion() {
      const qs = getCurrentQuestions();
      if (examState.currentQuestionIndex < qs.length-1) { examState.currentQuestionIndex++; render(); }
      else {
        if (examState.section==='listening') { examState.section='answerSheet'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startAnswerSheetTimer(); render(); }
        else if (examState.section==='reading') { examState.section='writing'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startWritingTimer(); render(); }
        else if (examState.section==='writing') finishExam();
      }
    }

    function startListeningTimer() {
      clearInterval(examState.timerInterval);
      examState.timerInterval = setInterval(() => {
        if (examState.paused) return;
        if (examState.section==='listening' && examState.listeningTimer>0) {
          examState.listeningTimer--;
          timerEl.innerText = `听力部分: ${formatTime(examState.listeningTimer)}`;
          if (examState.listeningTimer<=0) {
            examState.section='answerSheet'; examState.currentQuestionIndex=0;
            clearInterval(examState.timerInterval); startAnswerSheetTimer(); render();
          }
        }
      }, 1000);
    }
    function startAnswerSheetTimer() {
      clearInterval(examState.timerInterval);
      examState.timerInterval = setInterval(() => {
        if (examState.paused) return;
        if (examState.section==='answerSheet' && examState.answerSheetTimer>0) {
          examState.answerSheetTimer--;
          timerEl.innerText = `答题卡: ${formatTime(examState.answerSheetTimer)}`;

            examState.section='reading'; examState.currentQuestionIndex=0;
            clearInterval(examState.timerInterval); startReadingTimer(); render();
          }
        }
      }, 1000);
    }
    function startReadingTimer() {

      examState.timerInterval = setInterval(() => {
        if (examState.paused) return;
        if (examState.section==='reading' && examState.readingTimer>0) {
          examState.readingTimer--;
          timerEl.innerText = `阅读部分: ${formatTime(examState.readingTimer)}`;
          if (examState.readingTimer<=0) {
            examState.section='writing'; examState.currentQuestionIndex=0;
            clearInterval(examState.timerInterval); startWritingTimer(); render();
          }
        }
      }, 1000);
    }
    function startWritingTimer() {
      clearInterval(examState.timerInterval);
      examState.timerInterval = setInterval(() => {
        if (examState.paused) return;
        if (examState.section==='writing' && examState.writingTimer>0) {
          examState.writingTimer--;
          timerEl.innerText = `书写部分: ${formatTime(examState.writingTimer)}`;
          if (examState.writingTimer<=0) finishExam();
        }
      }, 1000);
    }

    function calculateScore() {
      let lc=0, rc=0, wc=0;
      for(let i=0; i<flatListening.length; i++) if(examState.answers[i]===flatListening[i].correct) lc++;
      for(let i=0; i<flatReading.length; i++) if(examState.answers[flatListening.length+i]===flatReading[i].correct) rc++;
      const writingPart1 = writingQuestions.filter(q=>q.type==='part1');
      for(let i=0; i<writingPart1.length; i++) if(examState.answers[flatListening.length+flatReading.length+i]===writingPart1[i].correct) wc++;
      const ls = Math.round(lc/flatListening.length*100), rs = Math.round(rc/flatReading.length*100), ws = Math.round(wc/writingPart1.length*100);
      return { ls, rs, ws, total: ls+rs+ws, passed: ls+rs+ws>=180 };
    }

    function finishExam() {
      clearInterval(examState.timerInterval);
      const s = calculateScore();
      examArea.classList.add('hidden'); resultArea.classList.remove('hidden');
      resultArea.innerHTML = `<div style="text-align:center;"><h2>考试完成</h2><div style="display:flex; justify-content:center; gap:2rem; margin:1rem 0;"><div>听力<br><strong>${s.ls}/100</strong></div><div>阅读<br><strong>${s.rs}/100</strong></div><div>书写<br><strong>${s.ws}/100</strong></div></div><p style="font-size:2rem;"><strong>总分: ${s.total}/300</strong></p><p style="font-size:1.5rem; color:${s.passed?'green':'red'};">${s.passed?'🎉 恭喜！通过HSK 4！':'😢 继续努力！'}</p><button id="restartBtn" class="control-btn">重新开始</button></div>`;
      document.getElementById('restartBtn').addEventListener('click', ()=>location.reload());
    }

    startBtn.addEventListener('click', ()=>{
      startScreen.classList.add('hidden'); examArea.classList.remove('hidden');
      examState.started = true; startListeningTimer(); render();
    });
    prevBtn.addEventListener('click', ()=>{ if(examState.currentQuestionIndex>0) { examState.currentQuestionIndex--; render(); } });
    nextBtn.addEventListener('click', nextQuestion);
    pauseBtn.addEventListener('click', function(){
      examState.paused = !examState.paused;
      this.innerHTML = examState.paused ? '<i class="fas fa-play"></i> 继续' : '<i class="fas fa-pause"></i> 暂停';
    });

    const darkBtn = document.createElement('button'); darkBtn.innerHTML='<i class="fas fa-moon"></i>';
    darkBtn.style.cssText='position:fixed; bottom:20px; right:20px; background:var(--accent); color:white; border:none; border-radius:50%; width:50px; height:50px; cursor:pointer;';
    darkBtn.onclick = ()=>{
      const is = document.body.classList.contains('dark');
      if(is) { document.body.classList.remove('dark'); document.body.classList.add('light'); }
      else { document.body.classList.remove('light'); document.body.classList.add('dark'); }
    };
    document.body.appendChild(darkBtn);
  })();
</script>
</body>
</html>
