    const listeningQuestions = [

      { type: "part1", dialogue: "女：你怎么又把耳机弄丢了？男：别提了，今天在地铁上听歌，下车时忘记拿了。", question: "男的耳机怎么了？", options: ["A. 坏了", "B. 丢了", "C. 被偷了", "D. 借给别人了"], correct: 1 },
      { type: "part1", dialogue: "男：你觉得这件衬衫怎么样？女：料子挺好的，不过颜色有点老气。", question: "女的觉得衬衫怎么样？", options: ["A. 料子不好", "B. 颜色老气", "C. 价格贵", "D. 很合适"], correct: 1 },
      { type: "part1", dialogue: "女：周末我们去打保龄球吧？男：好啊，不过我从来没打过，你得教教我。", question: "男的什么意思？", options: ["A. 不想去", "B. 不会打保龄球", "C. 怕丢人", "D. 没时间"], correct: 1 },
      { type: "part1", dialogue: "男：听说你最近在学插花？女：是啊，插花可以修身养性，我很享受这个过程。", question: "女的最近在做什么？", options: ["A. 学画画", "B. 学插花", "C. 学弹琴", "D. 学跳舞"], correct: 1 },
      { type: "part1", dialogue: "女：你平时周末都怎么过？男：我一般会去逛逛博物馆或者美术馆，感受一下艺术气息。", question: "男的周末喜欢做什么？", options: ["A. 加班", "B. 逛博物馆美术馆", "C. 运动", "D. 旅游"], correct: 1 },
      { type: "part1", dialogue: "男：你今天怎么没点咖啡？女：昨晚没睡好，今天不喝了，怕晚上又失眠。", question: "女的为什么不喝咖啡？", options: ["A. 不喜欢", "B. 怕失眠", "C. 太贵了", "D. 忘了"], correct: 1 },
      { type: "part1", dialogue: "女：你吃生鱼片吗？男：我吃不惯生的东西，每次吃都闹肚子。", question: "男的为什么不吃生鱼片？", options: ["A. 太贵了", "B. 吃不惯生的", "C. 过敏", "D. 不喜欢味道"], correct: 1 },
      { type: "part1", dialogue: "男：你觉得新来的同事怎么样？女：挺有创意的，就是有时候想法不太切实际。", question: "女的觉得新同事怎么样？", options: ["A. 没创意", "B. 想法不切实际", "C. 太保守", "D. 能力差"], correct: 1 },
      { type: "part1", dialogue: "女：你看天气预报了吗？明天天气怎么样？男：看了，说是晴转多云，温度适宜。", question: "明天天气怎么样？", options: ["A. 下雨", "B. 晴转多云", "C. 下雪", "D. 大风"], correct: 1 },
      { type: "part1", dialogue: "男：你打算什么时候要孩子？女：再等等吧，现在事业刚起步，想过两年再说。", question: "女的为什么没要孩子？", options: ["A. 不喜欢孩子", "B. 事业刚起步", "C. 身体不好", "D. 经济压力大"], correct: 1 },
      { type: "part1", dialogue: "女：这道题我研究半天也没明白。男：我来看看，这个问题我遇到过，是这样解决的……", question: "男的是什么态度？", options: ["A. 不愿意帮忙", "B. 很热心", "C. 不耐烦", "D. 自己也不会"], correct: 1 },
      { type: "part1", dialogue: "男：你昨天怎么没来参加团建？女：我昨天胃疼得厉害，去医院挂水了。", question: "女的为什么没来团建？", options: ["A. 忘了", "B. 不想来", "C. 胃疼去医院", "D. 有事请假"], correct: 2 },
      { type: "part1", dialogue: "女：你觉得这两条项链哪条更好看？男：我觉得银色的那条更精致，金色的那条更华丽。", question: "男的觉得哪条精致？", options: ["A. 银色的", "B. 金色的", "C. 两条都精致", "D. 两条都不精致"], correct: 0 },
      { type: "part1", dialogue: "男：听说你辞职了？女：对，我想休息一段时间，好好想想自己到底想做什么。", question: "女的为什么辞职？", options: ["A. 工资低", "B. 想休息和思考", "C. 和同事关系不好", "D. 被辞退了"], correct: 1 },
      { type: "part1", dialogue: "女：你儿子多大了？男：今年十岁，上小学四年级了。", question: "男的儿子几岁了？", options: ["A. 八岁", "B. 九岁", "C. 十岁", "D. 十一岁"], correct: 2 },
      { type: "part1", dialogue: "男：你怎么又买这么多书？女：书店清仓处理，五块钱一本，不买白不买。", question: "女的为什么买这么多书？", options: ["A. 需要看", "B. 清仓便宜", "C. 送朋友", "D. 收藏"], correct: 1 },
      { type: "part1", dialogue: "女：你觉得这份工作怎么样？男：虽然有时候很忙，但能接触到很多牛人，长了不少见识。", question: "男的觉得工作怎么样？", options: ["A. 工资低", "B. 能长见识", "C. 太累了", "D. 没前途"], correct: 1 },
      { type: "part1", dialogue: "男：你每天早上几点起床？女：我习惯五点半起，然后练一小时瑜伽。", question: "女的几点起床？", options: ["A. 五点", "B. 五点半", "C. 六点", "D. 六点半"], correct: 1 },
      { type: "part1", dialogue: "女：你跟你爸爸性格像吗？男：不太像，我爸比较严肃，我比较随和。", question: "男的爸爸性格怎么样？", options: ["A. 随和", "B. 严肃", "C. 幽默", "D. 不知道"], correct: 1 },
      { type: "part1", dialogue: "男：你的感冒好点了吗？女：好多了，就是嗓子还有点哑。", question: "女的现在怎么样了？", options: ["A. 完全好了", "B. 更严重了", "C. 好多了嗓子有点哑", "D. 没变化"], correct: 2 },
      
      // 第二部分：长对话/短文 (25题)
      { type: "part2", dialogue: "女：小刘，这次去青岛出差感觉怎么样？男：挺好的，签了一个大单，还吃了正宗的海鲜。那边的海鲜真是太新鲜了，就是啤酒喝得有点多。女：青岛啤酒确实有名。你哪天回来的？男：昨天下午的飞机，今天就赶来上班了。", questions: [{ q: "男的觉得青岛的什么有名？", options: ["A. 海鲜和啤酒", "B. 烧烤", "C. 火锅", "D. 小吃"], correct: 0 }] },
      { type: "part2", dialogue: "男：妈，我想跟您商量个事儿。我想养一只鹦鹉。女：鹦鹉？那东西会不会很吵？而且听说能活好几十年，你能坚持养吗？男：我会好好照顾它的，它很聪明的。女：还是算了吧，太麻烦了。", questions: [{ q: "妈妈为什么不同意养鹦鹉？", options: ["A. 太贵了", "B. 担心吵和麻烦", "C. 家里没地方", "D. 怕鹦鹉咬人"], correct: 1 }] },
      { type: "part2", dialogue: "女：你看过《消失的她》吗？男：看过，剧情反转太厉害了，看得我头皮发麻。朱一龙的演技炸裂。女：是啊，看完我都不敢去东南亚旅游了。", questions: [{ q: "他们在谈论什么？", options: ["A. 一部电影", "B. 一部电视剧", "C. 一本书", "D. 一个新闻"], correct: 0 },{ q: "男的觉得电影怎么样？", options: ["A. 很无聊", "B. 反转厉害", "C. 看不懂", "D. 很搞笑"], correct: 1 }] },
      { type: "part2", dialogue: "男：请问，去最近的公共厕所怎么走？女：你沿着这条路直走，看到一个便利店，右转进去就能看到了。男：好的，谢谢。远吗？女：不远，走两步就到了。", questions: [{ q: "男的要去哪儿？", options: ["A. 便利店", "B. 公共厕所", "C. 餐厅", "D. 商场"], correct: 1 },{ q: "厕所怎么走？", options: ["A. 直走左转", "B. 直走右转", "C. 左转再右转", "D. 右转再左转"], correct: 1 }] },
      { type: "part2", dialogue: "女：大夫，我的脚踝特别疼，昨天打篮球的时候崴了一下。男：来，让我看看。肿得挺厉害的，先去拍个片子，看看有没有伤到骨头。这几天尽量少走动，用冰敷一下。", questions: [{ q: "女的怎么了？", options: ["A. 手腕疼", "B. 脚踝扭伤", "C. 膝盖疼", "D. 腰疼"], correct: 1 },{ q: "医生建议女的做什么检查？", options: ["A. 拍X光", "B. 做CT", "C. 拍片子", "D. 验血"], correct: 2 }] },
      { type: "part2", dialogue: "随着人口老龄化的加剧，养老问题越来越受到关注。除了传统的居家养老，社区养老、机构养老等新模式也逐渐兴起。如何让老年人安享晚年，是一个需要全社会共同努力的问题。", questions: [{ q: "这段话主要谈什么？", options: ["A. 人口老龄化", "B. 养老问题", "C. 社区养老", "D. 机构养老"], correct: 1 }] },
      { type: "part2", dialogue: "行百里者半九十。意思是，走一百里路，走了九十里才算走了一半。比喻事情越接近成功越困难，越要认真对待，坚持到底。", questions: [{ q: "这句话告诉我们什么？", options: ["A. 走九十里很容易", "B. 越接近成功越要坚持", "C. 走一百里很难", "D. 不要走远路"], correct: 1 }] },
      { type: "part2", dialogue: "冬至是中国传统节日，在每年的12月21日或22日。这一天是北半球白天最短、黑夜最长的一天。北方有吃饺子的习俗，南方则流行吃汤圆。", questions: [{ q: "冬至北方吃什么？", options: ["A. 汤圆", "B. 饺子", "C. 粽子", "D. 月饼"], correct: 1 },{ q: "冬至这一天有什么特点？", options: ["A. 白天最长", "B. 黑夜最短", "C. 白天最短黑夜最长", "D. 昼夜等长"], correct: 2 }] },
      { type: "part2", dialogue: "各位观众，演出马上就要开始了。请您对号入座，将手机调至静音状态。演出期间请不要随意走动，不要使用闪光灯拍照。谢谢您的配合。", questions: [{ q: "观众应该做什么？", options: ["A. 随意走动", "B. 使用闪光灯", "C. 将手机调静音", "D. 大声说话"], correct: 2 }] },
      { type: "part2", dialogue: "小秦最近迷上了攀岩，每个周末都去攀岩馆挑战各种难度的线路。他说，攀岩不仅锻炼身体，还能磨练意志。", questions: [{ q: "小秦最近有什么爱好？", options: ["A. 跑步", "B. 攀岩", "C. 游泳", "D. 打球"], correct: 1 }] },
      { type: "part2", dialogue: "女：你怎么看起来这么没精神？男：别提了，昨晚追比赛追到凌晨四点，今天困得不行。女：你也太拼了，赶紧去喝杯咖啡提提神吧。", questions: [{ q: "男的为什么没精神？", options: ["A. 工作太忙", "B. 追比赛熬夜", "C. 失眠", "D. 生病了"], correct: 1 }] },
      { type: "part2", dialogue: "男：你觉得这两种方案哪个更靠谱？女：我觉得第一种方案太理想化了，第二种方案虽然保守，但更实际，更容易落地。", questions: [{ q: "女的觉得第二种方案怎么样？", options: ["A. 太理想化", "B. 更实际", "C. 太保守", "D. 不可行"], correct: 1 }] },
      { type: "part2", dialogue: "女：你平时喜欢看什么类型的动漫？男：我比较喜欢看热血漫和搞笑漫，不太喜欢看恋爱番。", questions: [{ q: "男的不喜欢什么动漫？", options: ["A. 热血漫", "B. 搞笑漫", "C. 恋爱番", "D. 科幻漫"], correct: 2 }] },
      { type: "part2", dialogue: "男：听说你要去支教了？女：对，去贵州山区待半年，我觉得这是一件很有意义的事情。", questions: [{ q: "女的要去做什么？", options: ["A. 旅游", "B. 支教", "C. 工作", "D. 学习"], correct: 1 }] },

          html = `<div class="question"><div><strong>${idx+1}.</strong> 完成句子</div><div class="sentence-builder" id="wordTiles">${shuffled.map(w=>`<span class="word-tile" data-word="${w}">${w}</span>`).join('')}</div><div class="sentence-preview" id="sentencePreview">${selected||'点击词语排序...'}</div><button id="clearBtn" class="control-btn">清空</button><button id="checkBtn" class="control-btn">检查</button><div id="fb" style="margin-top:0.5rem;"></div></div>`;
        } else {
          html = `<div class="question"><div><strong>${idx+1}.</strong> 短文写作</div>`;
          html += q.style === 'words' ? `<div style="margin:0.8rem 0;">词语：<strong>${q.promptWords}</strong></div>` : `<div style="font-size:3rem; text-align:center;">${q.image}<br><span style="font-size:0.9rem;">${q.imageDesc}</span></div>`;
          html += `<div style="margin:0.5rem 0;">${q.requirement}</div><textarea id="essayInput" class="essay-area" rows="4" placeholder="请在此输入短文...">${selected||''}</textarea><div class="word-count" id="wordCount">${selected?selected.length:0} 字</div><button id="saveBtn" class="control-btn">保存答案</button></div>`;
        }
      }

      questionContainer.innerHTML = html;
      progressInfo.innerText = `第 ${idx+1} / ${qs.length} 题`;
      sectionHeader.innerText = examState.section==='listening'?`🎧 听力 (${idx+1}/${qs.length})`: examState.section==='reading'?`📖 阅读 (${idx+1}/${qs.length})`: examState.section==='writing'?`✍️ 书写 (${idx+1}/${qs.length})`:`📝 答题卡填写`;
      renderNavBar();

      if (examState.section === 'listening') {
        const playBtn = document.getElementById('playAudioBtn');
        if (playBtn) {
          playBtn.addEventListener('click', ()=>{
            speak(q.dialogue, ()=>{ setTimeout(()=>{ speak(q.q||q.question); }, 500); });
          });
          setTimeout(()=> playBtn.click(), 300);
        }
      }
      document.querySelectorAll('input[name="q"]').forEach(r=>r.addEventListener('change', e=>{
        let v = parseInt(e.target.value); examState.answers[gIdx] = v; renderNavBar();
      }));

      if (examState.section==='writing' && q.type==='part1') {
        let selectedWords = [];
        document.querySelectorAll('.word-tile').forEach(t=>t.addEventListener('click', ()=>{
          selectedWords.push(t.dataset.word); t.classList.add('selected'); t.style.pointerEvents='none';
          document.getElementById('sentencePreview').innerText = selectedWords.join('');
        }));
        document.getElementById('clearBtn').addEventListener('click', ()=>{
          selectedWords=[]; document.querySelectorAll('.word-tile').forEach(t=>{ t.classList.remove('selected'); t.style.pointerEvents='auto'; });
          document.getElementById('sentencePreview').innerText='点击词语排序...';
        });
        document.getElementById('checkBtn').addEventListener('click', ()=>{
          const s = selectedWords.join(''), fb = document.getElementById('fb');
          fb.innerHTML = s===q.correct? '✅ 正确！' : `❌ 参考答案：${q.correct}`;
          examState.answers[gIdx] = s; renderNavBar();
        });
      }
      if (examState.section==='writing' && q.type==='part2') {
        const ta = document.getElementById('essayInput');
        ta.addEventListener('input', ()=>{ document.getElementById('wordCount').innerText = ta.value.length + ' 字'; });
        document.getElementById('saveBtn').addEventListener('click', ()=>{ examState.answers[gIdx]=ta.value; renderNavBar(); });
      }

      document.getElementById('continueToReadingBtn')?.addEventListener('click', ()=>{
        examState.section='reading'; examState.currentQuestionIndex=0;
        clearInterval(examState.timerInterval); startReadingTimer(); render();
      });
    }

    function renderNavBar() {
      const qs = getCurrentQuestions(); let h = ''; 
      for(let i=0; i<qs.length; i++) {
        const g = getGlobalIndex() - examState.currentQuestionIndex + i;
        h += `<button class="nav-btn ${examState.answers[g]!==null?'answered':''} ${i===examState.currentQuestionIndex?'current':''}" data-index="${i}">${i+1}</button>`;
      }
      navBar.innerHTML = h;
      navBar.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click', ()=>{ examState.currentQuestionIndex = parseInt(b.dataset.index); render(); }));
    }

    function nextQuestion() {
      const qs = getCurrentQuestions();
      if (examState.currentQuestionIndex < qs.length-1) { examState.currentQuestionIndex++; render(); }
      else {
        if (examState.section==='listening') { examState.section='answerSheet'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startAnswerSheetTimer(); render(); }
        else if (examState.section==='reading') { examState.section='writing'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startWritingTimer(); render(); }
        else if (examState.section==='writing') finishExam();
      }
    }

    function startListeningTimer() {
      clearInterval(examState.timerInterval);
      examState.timerInterval = setInterval(() => {
        if (examState.paused) return;
        if (examState.section==='listening' && examState.listeningTimer>0) {
          examState.listeningTimer--;
          timerEl.innerText = `听力部分: ${formatTime(examState.listeningTimer)}`;
          if (examState.listeningTimer<=0) { examState.section='answerSheet'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startAnswerSheetTimer(); render(); }
        }
      }, 1000);
    }
    function startAnswerSheetTimer() {
      clearInterval(examState.timerInterval);
      examState.timerInterval = setInterval(() => {
        if (examState.paused) return;
        if (examState.section==='answerSheet' && examState.answerSheetTimer>0) {
          examState.answerSheetTimer--;
          timerEl.innerText = `答题卡: ${formatTime(examState.answerSheetTimer)}`;
          const disp = document.getElementById('answerSheetTimerDisplay'); if (disp) disp.innerText = `剩余时间: ${formatTime(examState.answerSheetTimer)}`;
          if (examState.answerSheetTimer<=0) { examState.section='reading'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startReadingTimer(); render(); }
        }
      }, 1000);
    }
    function startReadingTimer() {
      clearInterval(examState.timerInterval);
      examState.timerInterval = setInterval(() => {
        if (examState.paused) return;
        if (examState.section==='reading' && examState.readingTimer>0) {
          examState.readingTimer--;
          timerEl.innerText = `阅读部分: ${formatTime(examState.readingTimer)}`;
          if (examState.readingTimer<=0) { examState.section='writing'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startWritingTimer(); render(); }
        }
      }, 1000);
    }
    function startWritingTimer() {
      clearInterval(examState.timerInterval);
      examState.timerInterval = setInterval(() => {
        if (examState.paused) return;
        if (examState.section==='writing' && examState.writingTimer>0) {
          examState.writingTimer--;
          timerEl.innerText = `书写部分: ${formatTime(examState.writingTimer)}`;
          if (examState.writingTimer<=0) finishExam();
        }
      }, 1000);
    }

    function calculateScore() {
      let lc=0, rc=0, wc=0;
      for(let i=0; i<flatListening.length; i++) if(examState.answers[i]===flatListening[i].correct) lc++;
      for(let i=0; i<flatReading.length; i++) if(examState.answers[flatListening.length+i]===flatReading[i].correct) rc++;
      const writingPart1 = writingQuestions.filter(q=>q.type==='part1');
      for(let i=0; i<writingPart1.length; i++) if(examState.answers[flatListening.length+flatReading.length+i]===writingPart1[i].correct) wc++;
      const ls = Math.round(lc/flatListening.length*100), rs = Math.round(rc/flatReading.length*100), ws = Math.round(wc/writingPart1.length*100);
      return { ls, rs, ws, total: ls+rs+ws, passed: ls+rs+ws>=180 };
    }

    function finishExam() {
      clearInterval(examState.timerInterval);
      const s = calculateScore();
      examArea.classList.add('hidden'); resultArea.classList.remove('hidden');
      resultArea.innerHTML = `<div style="text-align:center;"><h2>考试完成</h2><div style="display:flex; justify-content:center; gap:2rem; margin:1rem 0;"><div>听力<br><strong>${s.ls}/100</strong></div><div>阅读<br><strong>${s.rs}/100</strong></div><div>书写<br><strong>${s.ws}/100</strong></div></div><p style="font-size:2rem;"><strong>总分: ${s.total}/300</strong></p><p style="font-size:1.5rem; color:${s.passed?'green':'red'};">${s.passed?'🎉 恭喜！通过HSK 5！':'😢 继续努力！'}</p><button id="restartBtn" class="control-btn">重新开始</button></div>`;
      document.getElementById('restartBtn').addEventListener('click', ()=>location.reload());
    }

    startBtn.addEventListener('click', ()=>{ startScreen.classList.add('hidden'); examArea.classList.remove('hidden'); examState.started = true; startListeningTimer(); render(); });
    prevBtn.addEventListener('click', ()=>{ if(examState.currentQuestionIndex>0) { examState.currentQuestionIndex--; render(); } });
    nextBtn.addEventListener('click', nextQuestion);
    pauseBtn.addEventListener('click', function(){ examState.paused = !examState.paused; this.innerHTML = examState.paused ? '<i class="fas fa-play"></i> 继续' : '<i class="fas fa-pause"></i> 暂停'; });

    const darkBtn = document.createElement('button'); darkBtn.innerHTML='<i class="fas fa-moon"></i>';
    darkBtn.style.cssText='position:fixed; bottom:20px; right:20px; background:var(--accent); color:white; border:none; border-radius:50%; width:50px; height:50px; cursor:pointer;';
    darkBtn.onclick = ()=>{ const is = document.body.classList.contains('dark'); if(is) { document.body.classList.remove('dark'); document.body.classList.add('light'); } else { document.body.classList.remove('light'); document.body.classList.add('dark'); } };
    document.body.appendChild(darkBtn);
  })();
</script>
</body>
</html>
