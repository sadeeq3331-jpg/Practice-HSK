<script>
  (function() { if (!window.speechSynthesis) { window.speakText = function(t) { console.log(t); }; return; } window.speakText = function(text) { if (!text) return; try { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'zh-CN'; u.rate = 0.9; window.speechSynthesis.speak(u); } catch(e) { console.error(e); } }; })();

  const wordList = window.HSK2_WORDS || []; if (wordList.length === 0) alert('words_hsk2.js missing');

  let favorites = new Set(JSON.parse(localStorage.getItem('hsk2_favorites') || '[]'));

  const bottomPrev = document.getElementById('prevPageBottom'), bottomNext = document.getElementById('nextPageBottom'), pageInfoSpan = document.getElementById('pageInfo');
  const categoryBtns = document.querySelectorAll('.cat-btn'), favCountSpan = document.getElementById('favCount'), studiedCountSpan = document.getElementById('studiedCount');
  const totalWordsStatSpan = document.getElementById('totalWordsStat'), masteryPercentSpan = document.getElementById('masteryPercent'), statsPanel = document.getElementById('statsPanel');
  const toggleStatsBtn = document.getElementById('toggleStatsBtn'), exportFavBtn = document.getElementById('exportFavBtn'), importFavBtn = document.getElementById('importFavBtn');

  function updateStats() { favCountSpan.innerText = favorites.size; studiedCountSpan.innerText = studiedWords.size; totalWordsStatSpan.innerText = wordList.length; masteryPercentSpan.innerText = wordList.length ? Math.round((studiedWords.size / wordList.length) * 100) : 0; }
  function markWordsStudied(words) { let changed = false; words.forEach(w => { if (!studiedWords.has(w.word)) { studiedWords.add(w.word); changed = true; } }); if (changed) { localStorage.setItem('hsk2_studied', JSON.stringify([...studiedWords])); updateStats(); } }
  function refreshAds() { if (typeof(adsbygoogle) !== 'undefined') { try { document.querySelectorAll('.adsbygoogle').forEach(ad => { (adsbygoogle = window.adsbygoogle || []).push({}); }); } catch(e) { } } }

  function applyFilter() {
    const searchTerm = searchInput.value.trim().toLowerCase();
    let base = wordList;
    if (currentFilter === 'favorites') base = wordList.filter(w => favorites.has(w.word));
    else if (currentFilter !== 'all') { const [s,e] = currentFilter === '1-50' ? [0,50] : currentFilter === '51-100' ? [50,100] : [100,150]; base = wordList.slice(s,e); }
    if (currentLetter) base = base.filter(w => w.pinyin.trim().toLowerCase().charAt(0) === currentLetter);

  function toggleFavorite(word) { if (favorites.has(word)) favorites.delete(word); else favorites.add(word); saveFavorites(); if (currentFilter === 'favorites') applyFilter(); render(); refreshAds(); }
  function render() {
    const pageWords = filteredWords.slice((currentPage-1)*pageSize, currentPage*pageSize);
    if (pageWords.length === 0) grid.innerHTML = '<div class="empty-state">✨ No words found</div>';
    else {
      let html = '';
      pageWords.forEach(item => {
        const isFav = favorites.has(item.word);
        const exampleHtml = item.example ? `<div class="example-container"><span class="example-text">📌 ${item.example}</span><button class="example-speaker" data-example="${item.example}"><i class="fas fa-volume-up"></i></button></div>` : '';
        html += `<div class="vocab-card"><div class="word-header"><span class="chinese-word">${item.word}</span><div><button class="favorite-btn ${isFav ? 'active' : ''}" data-word="${item.word}"><i class="${isFav ? 'fas' : 'far'} fa-heart"></i></button><button class="speaker-btn" data-word="${item.word}"><i class="fas fa-volume-up"></i></button></div></div><div class="pinyin">${item.pinyin}</div><div class="meaning">${item.meaning}</div>${exampleHtml}</div>`;
      });
      grid.innerHTML = html;
      markWordsStudied(pageWords);
    }
    document.querySelectorAll('.speaker-btn').forEach(btn => btn.addEventListener('click', () => window.speakText(btn.dataset.word)));
    document.querySelectorAll('.example-speaker').forEach(btn => btn.addEventListener('click', () => window.speakText(btn.dataset.example)));
    document.querySelectorAll('.favorite-btn').forEach(btn => btn.addEventListener('click', () => { toggleFavorite(btn.dataset.word); const icon = btn.querySelector('i'); if (favorites.has(btn.dataset.word)) { icon.classList.remove('far'); icon.classList.add('fas'); btn.classList.add('active'); } else { icon.classList.remove('fas'); icon.classList.add('far'); btn.classList.remove('active'); } }));

    if (totalPages <= 1) { paginationDiv.innerHTML = ''; bottomPrev.disabled = true; bottomNext.disabled = true; pageInfoSpan.innerText = 'Page 1 / 1'; } else {
      let btns = `<button class="page-btn" id="prevPageTop" ${currentPage===1?'disabled':''}><i class="fas fa-chevron-left"></i></button>`;
      for (let i=1; i<=totalPages; i++) btns += `<button class="page-btn ${i===currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
      btns += `<button class="page-btn" id="nextPageTop" ${currentPage===totalPages?'disabled':''}><i class="fas fa-chevron-right"></i></button>`;
      paginationDiv.innerHTML = btns;
      document.querySelectorAll('.page-btn[data-page]').forEach(btn => btn.addEventListener('click', () => { currentPage = parseInt(btn.dataset.page); render(); refreshAds(); }));
      document.getElementById('prevPageTop')?.addEventListener('click', () => { if (currentPage > 1) { currentPage--; render(); refreshAds(); } });
      document.getElementById('nextPageTop')?.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; render(); refreshAds(); } });
      bottomPrev.disabled = (currentPage === 1); bottomNext.disabled = (currentPage === totalPages);
      pageInfoSpan.innerText = `Page ${currentPage} / ${totalPages}`;
    }
  }
  function buildLetterFilter() {
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    letterFilterDiv.innerHTML = '<button class="letter-btn all-letters" data-letter="">All</button>';
    letters.forEach(l => { const btn = document.createElement('button'); btn.className = 'letter-btn'; btn.textContent = l; btn.dataset.letter = l.toLowerCase(); btn.addEventListener('click', () => { document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentLetter = l.toLowerCase(); applyFilter(); render(); refreshAds(); }); letterFilterDiv.appendChild(btn); });
    const allBtn = document.querySelector('.letter-btn.all-letters'); if (allBtn) allBtn.addEventListener('click', () => { document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active')); allBtn.classList.add('active'); currentLetter = null; applyFilter(); render(); refreshAds(); });
  }
  categoryBtns.forEach(btn => btn.addEventListener('click', () => { categoryBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFilter = btn.dataset.cat; applyFilter(); render(); refreshAds(); }));
  function handleSearch() { applyFilter(); render(); refreshAds(); }
  searchBtn.addEventListener('click', handleSearch); searchInput.addEventListener('keyup', e => e.key === 'Enter' && handleSearch());
  bottomPrev.addEventListener('click', () => { if (currentPage > 1) { currentPage--; render(); refreshAds(); } });
  bottomNext.addEventListener('click', () => { if (currentPage < Math.ceil(filteredWords.length / pageSize)) { currentPage++; render(); refreshAds(); } });
  toggleStatsBtn.addEventListener('click', () => { statsPanel.classList.toggle('hidden'); localStorage.setItem('hsk2_stats_visible', (!statsPanel.classList.contains('hidden')).toString()); refreshAds(); });
  if (localStorage.getItem('hsk2_stats_visible') === 'true') statsPanel.classList.remove('hidden'); else statsPanel.classList.add('hidden');
  darkModeToggle.addEventListener('click', () => { const isDark = document.body.classList.contains('dark'); if (isDark) { document.body.classList.remove('dark'); document.body.classList.add('light'); localStorage.setItem('hsk2_theme', 'light'); darkModeToggle.innerHTML = '<i class="fas fa-moon"></i> Dark Mode'; } else { document.body.classList.remove('light'); document.body.classList.add('dark'); localStorage.setItem('hsk2_theme', 'dark'); darkModeToggle.innerHTML = '<i class="fas fa-sun"></i> Light Mode'; } refreshAds(); });
  exportFavBtn.addEventListener('click', () => { const data = JSON.stringify([...favorites], null, 2); const blob = new Blob([data], {type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'hsk2_favorites.json'; a.click(); URL.revokeObjectURL(url); });
  importFavBtn.addEventListener('click', () => importFavFile.click());
  importFavFile.addEventListener('change', e => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = ev => { try { const imported = JSON.parse(ev.target.result); if (Array.isArray(imported)) { favorites = new Set(imported); saveFavorites(); if (currentFilter === 'favorites') { applyFilter(); render(); } else render(); updateStats(); alert('Favorites imported!'); refreshAds(); } else alert('Invalid file'); } catch(err) { alert('Parse error'); } importFavFile.value = ''; }; reader.readAsText(file); });
  resetProgressBtn.addEventListener('click', () => { if (confirm('Reset progress?')) { studiedWords.clear(); localStorage.setItem('hsk2_studied', JSON.stringify([])); updateStats(); alert('Progress reset'); refreshAds(); } });
  studyModeToggle.addEventListener('click', () => { studyMode = !studyMode; localStorage.setItem('hsk2_studyMode', studyMode); if (studyMode) document.body.classList.add('study-mode-active'); else document.body.classList.remove('study-mode-active'); refreshAds(); });
  function getRandomWordFromFiltered() { if (filteredWords.length === 0) return null; return filteredWords[Math.floor(Math.random() * filteredWords.length)]; }
  function updateBuddyWord(wordObj) { currentBuddyWord = wordObj; if (!wordObj) buddyWordDisplay.innerText = '?'; else { buddyWordDisplay.innerText = wordObj.word; if (currentMode === 'quiz') generateQuiz(wordObj); } }
  function generateQuiz(wordObj) { if (!wordObj) return; const correct = wordObj.meaning; let options = [correct]; while (options.length < 4) { const rand = wordList[Math.floor(Math.random() * wordList.length)]; if (!options.includes(rand.meaning) && rand.meaning !== correct) options.push(rand.meaning); } options = options.sort(() => Math.random() - 0.5); quizPanelElem.innerHTML = ''; options.forEach(opt => { const btn = document.createElement('div'); btn.className = 'quiz-opt'; btn.innerText = opt; btn.addEventListener('click', () => { document.querySelectorAll('.quiz-opt').forEach(el => el.style.pointerEvents = 'none'); if (opt === correct) btn.classList.add('correct'); else { btn.classList.add('wrong'); document.querySelectorAll('.quiz-opt').forEach(el => { if (el.innerText === correct) el.classList.add('correct'); }); } }); quizPanelElem.appendChild(btn); }); }
  function showTypingPanel() { typingPanelElem.style.display = 'flex'; quizPanelElem.style.display = 'none'; }
  function showQuizPanel() { typingPanelElem.style.display = 'none'; quizPanelElem.style.display = 'flex'; }
  function switchMode(mode) { currentMode = mode; if (mode === 'quiz') { showQuizPanel(); if (currentBuddyWord) generateQuiz(currentBuddyWord); } else showTypingPanel(); }
  function handleNewWord() { const newWordObj = getRandomWordFromFiltered(); if (newWordObj) { updateBuddyWord(newWordObj); if (currentMode === 'typing') { typingInputElem.value = ''; typingFeedbackMsg.innerHTML = ''; } } else buddyWordDisplay.innerText = 'No words'; }
  function handleTypingSubmit() { if (!currentBuddyWord) return; const userAns = typingInputElem.value.trim().toLowerCase(); const correct = currentBuddyWord.meaning.toLowerCase(); typingFeedbackMsg.innerHTML = (userAns === correct) ? '<span style="color:#38a169;">✓ Correct!</span>' : `<span style="color:#e53e3e;">✗ Wrong. Correct: ${currentBuddyWord.meaning}</span>`; }
  buddyAvatar.addEventListener('click', () => { if (buddyVisible) { buddyBubble.classList.add('hidden'); buddyVisible = false; } else { buddyBubble.classList.remove('hidden'); buddyVisible = true; if (!currentBuddyWord) handleNewWord(); } });
  closeBuddy.addEventListener('click', () => { buddyBubble.classList.add('hidden'); buddyVisible = false; });
  newBuddyWord.addEventListener('click', handleNewWord);
  speakBuddyWord.addEventListener('click', () => { if (currentBuddyWord) window.speakText(currentBuddyWord.word); });
  submitTyping.addEventListener('click', handleTypingSubmit);
  typingInputElem.addEventListener('keyup', e => { if (e.key === 'Enter') handleTypingSubmit(); });
  tabs.forEach(tab => tab.addEventListener('click', () => { tabs.forEach(t => t.classList.remove('active')); tab.classList.add('active'); switchMode(tab.dataset.mode); }));
  const savedTheme = localStorage.getItem('hsk2_theme'); if (savedTheme === 'dark') { document.body.classList.add('dark'); darkModeToggle.innerHTML = '<i class="fas fa-sun"></i> Light Mode'; } else { document.body.classList.add('light'); darkModeToggle.innerHTML = '<i class="fas fa-moon"></i> Dark Mode'; }
  buildLetterFilter(); applyFilter(); render(); updateStats(); refreshAds();
  if (localStorage.getItem('hsk2_studyMode') === 'true') { studyMode = true; document.body.classList.add('study-mode-active'); }
</script>
