<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>HSK 6 Vocabulary Master</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    body.light {
      background: linear-gradient(145deg, #eef2ff 0%, #e0e7ff 100%);
      --bg-card: #ffffff;
      --bg-header: rgba(255,255,255,0.7);
      --text-primary: #1e1b4b;
      --text-secondary: #4f46e5;
      --border-light: #c7d2fe;
      --shadow: 0 20px 40px rgba(79,70,229,0.1);
      --accent: #4f46e5;
      --accent-hover: #6366f1;
    }
    body.dark {
      background: linear-gradient(145deg, #0f172a 0%, #0b1120 100%);
      --bg-card: #1e293b;
      --bg-header: rgba(30,41,59,0.8);
      --text-primary: #e2e8f0;
      --text-secondary: #a5b4fc;
      --border-light: #334155;
      --shadow: 0 20px 40px rgba(0,0,0,0.3);
      --accent: #818cf8;
      --accent-hover: #6366f1;
    }
    body {
      padding: 0.5rem 0.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg-header);
    }
    .app-container {
      max-width: 1400px;
      width: 100%;
      background: var(--bg-header);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      padding: 0.8rem 1rem;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.2);
      margin-bottom: 1rem;
    }
    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
      gap: 0.8rem;
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .logo-svg {
      width: 36px;
      height: 36px;
    }
    .title-section h1 {
      font-size: 1.5rem;
      background: linear-gradient(135deg, var(--text-secondary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .badge {
      background: var(--accent);
      color: white;
      padding: 0.1rem 0.6rem;
      border-radius: 30px;
      font-size: 0.65rem;
    }
    .search-box {
      display: flex;
      background: var(--bg-card);
      border-radius: 40px;
      padding: 0.1rem 0.2rem 0.1rem 0.8rem;
      border: 1px solid var(--border-light);
      min-width: 200px;
    }
    .search-box input {
      font-size: 0.8rem;
      padding: 0.3rem 0;
    }
    .search-box button {
      padding: 0.3rem 0.8rem;
      font-size: 0.75rem;
    }
    .settings-bar {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
      flex-wrap: wrap;
    }
    .icon-btn {
      padding: 0.2rem 0.6rem;
      font-size: 0.75rem;
    }
    .stats-panel {
      padding: 0.4rem 0.8rem;
      margin-bottom: 0.4rem;
      font-size: 0.75rem;
    }
    .letter-filter {
      gap: 0.3rem;
      margin: 0.3rem 0;
    }
    .letter-btn {
      width: 28px;
      height: 28px;
      font-size: 0.7rem;
    }
    .categories {
      gap: 0.3rem;
      margin: 0.3rem 0;
    }
    .cat-btn {
      padding: 0.2rem 0.6rem;
      font-size: 0.7rem;
    }
    .stats-bar {
      margin: 0.3rem 0 0.4rem;
    }
    .word-counter {
      padding: 0.2rem 0.6rem;
      font-size: 0.75rem;
    }
    .page-btn {
      width: 28px;
      height: 28px;
      font-size: 0.7rem;
    }
    .card-grid {
      gap: 0.6rem;
      margin: 0.6rem 0;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    }
    .vocab-card {
      padding: 0.7rem 0.6rem;
    }
    .chinese-word {
      font-size: 1.4rem;
    }
    .pinyin, .meaning {
      font-size: 0.75rem;
    }
    .example-container {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
    }
    .buddy-bubble {
      width: 260px;
      padding: 0.8rem;
    }
    .footer-note {
      font-size: 0.6rem;
      margin-top: 0.3rem;
      text-align: center;
    }
    @media (max-width: 640px) {
      .app-container {
        padding: 0.6rem;
      }
      .chinese-word {
        font-size: 1.2rem;
      }
      .title-section h1 {
        font-size: 1.2rem;
      }
      .logo-svg {
        width: 28px;
        height: 28px;
      }
      .card-grid {
        grid-template-columns: 1fr;
      }
    }
    .study-mode-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 30px;
      padding: 0.2rem 0.8rem;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .study-mode-toggle.active {
      background: var(--accent);
      color: white;
    }
    .study-mode-active .pinyin,
    .study-mode-active .meaning,
    .study-mode-active .example-container {
      display: none !important;
    }
    /* Modal for full vocabulary */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      overflow-y: auto;
      padding: 1rem;
    }
    .modal-content {
      max-width: 1200px;
      margin: 2rem auto;
      background: var(--bg-card);
      border-radius: 1.5rem;
      padding: 1rem;
      position: relative;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
    }
    .modal-header h2 {
      color: var(--text-primary);
      font-size: 1.2rem;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-secondary);
    }
    .modal-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 0.5rem;
    }
    .modal-tab {
      background: none;
      border: none;
      padding: 0.3rem 1rem;
      cursor: pointer;
      font-weight: 500;
      color: var(--text-secondary);
      border-radius: 30px;
    }
    .modal-tab.active {
      background: var(--accent);
      color: white;
    }
    .vocab-list {
      max-height: 70vh;
      overflow-y: auto;
      padding-right: 0.5rem;
    }
    .letter-group {
      margin-bottom: 1.2rem;
    }
    .letter-group h3 {
      background: var(--accent);
      color: white;
      display: inline-block;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }
    .letter-group .word-item {
      display: inline-block;
      width: calc(20% - 8px);
      margin: 4px;
      background: rgba(79,70,229,0.05);
      padding: 4px 6px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.1s;
    }
    .letter-group .word-item:hover {
      background: var(--accent);
      color: white;
    }
    .range-group {
      margin-bottom: 1rem;
    }
    .range-group h4 {
      color: var(--text-primary);
      margin-bottom: 0.3rem;
    }
    .buddy-container { position: fixed; bottom: 15px; right: 15px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; }
    .buddy-bubble { position: absolute; bottom: 60px; right: 0; background: var(--bg-card); border-radius: 20px 20px 10px 20px; padding: 0.8rem; width: 260px; max-width: 85vw; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 1px solid var(--accent); }
    .buddy-bubble.hidden { visibility: hidden; opacity: 0; pointer-events: none; }
    .buddy-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.8rem; }
    .buddy-tabs { display: flex; gap: 6px; margin-bottom: 8px; }
    .buddy-tab { font-size: 0.7rem; padding: 3px 6px; }
    .buddy-word { font-size: 1.3rem; margin: 4px 0; }
    .buddy-controls button { font-size: 0.7rem; padding: 4px 10px; }
    .quiz-opt { font-size: 0.7rem; padding: 4px 8px; }
    .typing-input { font-size: 0.7rem; padding: 4px 8px; }
    .buddy-avatar { width: 48px; height: 48px; }
    .buddy-avatar img { width: 40px; height: 40px; }
    .hidden { display: none; }
  </style>
  <script src="words_hsk6.js"></script>
</head>
<body class="light">
<div class="app-container">
  <div class="header">
    <div class="logo-area">
      <div class="logo-svg"><svg width="36" height="36" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="800" rx="200" fill="#0a2942"/><g transform="translate(200, 200) scale(0.8)"><path d="M192 32c0-17.7-14.3-32-32-32s-32 14.3-32 32v25.6C69.5 68.4 16 127.1 16 200v32c0 101.7 82.3 184 184 184h64c101.7 0 184-82.3 184-184v-32c0-72.9-53.5-131.6-128-142.4V32c0-17.7-14.3-32-32-32s-32 14.3-32 32v16H192V32zM48 200c0-63.1 48-115.4 109.5-126.9 4.2-.7 8.5-1.1 12.8-1.1h31.5c4.3 0 8.6 .4 12.8 1.1C288 84.6 336 136.9 336 200v32c0 75.1-60.9 136-136 136h-64c-75.1 0-136-60.9-136-136v-32zm320 240c0-8.8-7.2-16-16-16H32c-8.8 0-16 7.2-16 16v48c0 8.8 7.2 16 16 16h320c8.8 0 16-7.2 16-16v-48z" fill="#ffd966"/></g></svg></div>
      <div class="title-section"><h1>HSK 6 · 词汇大师</h1><div class="badge"><i class="fas fa-crown"></i> 2500 words</div></div>
    </div>
    <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Search..."><button id="searchBtn">Go</button></div>
  </div>

  <div class="settings-bar">
    <button id="darkModeToggle" class="icon-btn"><i class="fas fa-moon"></i> Dark</button>
    <button id="toggleStatsBtn" class="icon-btn"><i class="fas fa-chart-line"></i> Stats</button>
    <button id="shuffleBtn" class="icon-btn"><i class="fas fa-random"></i> Shuffle</button>
    <button id="fullVocabBtn" class="icon-btn"><i class="fas fa-list-ul"></i> Full Vocabulary</button>
    <button id="exportFavBtn" class="icon-btn"><i class="fas fa-download"></i> Export</button>
    <button id="importFavBtn" class="icon-btn"><i class="fas fa-upload"></i> Import</button>
    <input type="file" id="importFavFile" style="display:none" accept=".json">
  </div>

  <div id="statsPanel" class="stats-panel hidden">
    <div class="stat"><i class="fas fa-heart"></i> Fav: <span id="favCount">0</span></div>
    <div class="stat"><i class="fas fa-eye"></i> Studied: <span id="studiedCount">0</span> / <span id="totalWordsStat">0</span></div>
    <div class="stat"><i class="fas fa-check-circle"></i> Mastery: <span id="masteryPercent">0</span>%</div>
    <button id="resetProgressBtn" class="icon-btn" style="font-size:0.65rem;"><i class="fas fa-trash-alt"></i> Reset</button>
  </div>

  <div id="studyModeToggle" class="study-mode-toggle"><i class="fas fa-eye-slash"></i><span>Study Mode</span></div>

  <div class="letter-filter" id="letterFilter"></div>
  <div class="categories" id="categoryTabs">
    <button class="cat-btn active" data-cat="all">All (2500)</button>
    <button class="cat-btn" data-cat="1-625">1–625</button>
    <button class="cat-btn" data-cat="626-1250">626–1250</button>
    <button class="cat-btn" data-cat="1251-1875">1251–1875</button>
    <button class="cat-btn" data-cat="1876-2500">1876–2500</button>
    <button class="cat-btn" data-cat="favorites"><i class="fas fa-heart"></i> Fav</button>
  </div>

  <div class="stats-bar"><div class="word-counter">📄 <span id="shownCount">0</span> / <span id="totalCount">2500</span></div><div class="pagination-controls" id="paginationContainer"></div></div>

  <div id="vocabGrid" class="card-grid"></div>

  <div class="bottom-pagination" id="bottomPagination"><button id="prevPageBottom"><i class="fas fa-chevron-left"></i> Prev</button><span id="pageInfo">Page 1 / 1</span><button id="nextPageBottom">Next <i class="fas fa-chevron-right"></i></button></div>

  <div class="footer-note"><span><i class="fas fa-heart"></i> Fav</span><span><i class="fas fa-volume-up"></i> Click to hear</span><span><i class="fas fa-robot"></i> Assistant</span><span><i class="fas fa-random"></i> Shuffle</span><span><i class="fas fa-list-ul"></i> Full List</span></div>
</div>

<!-- Modal for full vocabulary -->
<div id="vocabModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Complete HSK 6 Vocabulary</h2>
      <button class="modal-close" id="closeModal">&times;</button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" data-tab="letter">By Pinyin (A–Z)</button>
      <button class="modal-tab" data-tab="range">By Range (1–625, 626–1250...)</button>
    </div>
    <div id="letterView" class="vocab-list"></div>
    <div id="rangeView" class="vocab-list" style="display:none;"></div>
  </div>
</div>

<!-- Floating Buddy (unchanged) -->
<div class="buddy-container" id="buddyContainer"><div class="buddy-bubble hidden" id="buddyBubble"><div class="buddy-header"><span><i class="fas fa-robot"></i> Assistant</span><button class="buddy-close" id="closeBuddy"><i class="fas fa-times"></i></button></div><div class="buddy-tabs"><button class="buddy-tab active" data-mode="quiz">Quiz</button><button class="buddy-tab" data-mode="typing">Typing</button></div><div id="buddyWordDisplay" class="buddy-word">?</div><div class="buddy-controls"><button id="speakBuddyWord"><i class="fas fa-volume-up"></i> Speak</button><button id="newBuddyWord"><i class="fas fa-random"></i> Random</button></div><div id="quizPanel" class="quiz-options"></div><div id="typingPanel" class="typing-area" style="display:none;"><input type="text" id="typingInput" placeholder="Type meaning..."><button id="submitTyping">Submit</button><div id="typingFeedbackMsg"></div></div></div><div class="buddy-avatar" id="buddyAvatar"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%234f46e5'/%3E%3Ccircle cx='35' cy='40' r='5' fill='white'/%3E%3Ccircle cx='65' cy='40' r='5' fill='white'/%3E%3Cpath d='M35 65 Q50 80 65 65' stroke='white' stroke-width='4' fill='none' stroke-linecap='round'/%3E%3C/svg%3E" alt="buddy"></div></div>

<script>
  // ========== SPEECH MODULE ==========
  (function() { if (!window.speechSynthesis) { window.speakText = function(t) { console.log(t); }; return; } window.speakText = function(text) { if (!text) return; try { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'zh-CN'; u.rate = 0.9; window.speechSynthesis.speak(u); } catch(e) { console.error(e); } }; })();

  const wordList = window.HSK6_WORDS || [];
  if (wordList.length === 0) alert('words_hsk6.js missing!');

  let currentFilter = 'all', currentLetter = null, filteredWords = [...wordList], currentPage = 1, pageSize = 20;
  let favorites = new Set(JSON.parse(localStorage.getItem('hsk6_favorites') || '[]'));
  let studiedWords = new Set(JSON.parse(localStorage.getItem('hsk6_studied') || '[]'));
  let studyMode = localStorage.getItem('hsk6_studyMode') === 'true';

  // DOM elements
  const grid = document.getElementById('vocabGrid');
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const shownSpan = document.getElementById('shownCount');
  const totalSpan = document.getElementById('totalCount');
  const paginationDiv = document.getElementById('paginationContainer');
  const bottomPrev = document.getElementById('prevPageBottom');
  const bottomNext = document.getElementById('nextPageBottom');
  const pageInfoSpan = document.getElementById('pageInfo');
  const categoryBtns = document.querySelectorAll('.cat-btn');
  const favCountSpan = document.getElementById('favCount');
  const studiedCountSpan = document.getElementById('studiedCount');
  const totalWordsStatSpan = document.getElementById('totalWordsStat');
  const masteryPercentSpan = document.getElementById('masteryPercent');
  const statsPanel = document.getElementById('statsPanel');
  const toggleStatsBtn = document.getElementById('toggleStatsBtn');
  const exportFavBtn = document.getElementById('exportFavBtn');
  const importFavBtn = document.getElementById('importFavBtn');
  const importFavFile = document.getElementById('importFavFile');
  const resetProgressBtn = document.getElementById('resetProgressBtn');
  const darkModeToggle = document.getElementById('darkModeToggle');
  const letterFilterDiv = document.getElementById('letterFilter');
  const studyModeToggle = document.getElementById('studyModeToggle');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const fullVocabBtn = document.getElementById('fullVocabBtn');
  const modal = document.getElementById('vocabModal');
  const closeModal = document.getElementById('closeModal');
  const letterView = document.getElementById('letterView');
  const rangeView = document.getElementById('rangeView');
  const modalTabs = document.querySelectorAll('.modal-tab');

  // Buddy elements
  const buddyBubble = document.getElementById('buddyBubble');
  const buddyAvatar = document.getElementById('buddyAvatar');
  const closeBuddy = document.getElementById('closeBuddy');
  const newBuddyWord = document.getElementById('newBuddyWord');
  const speakBuddyWord = document.getElementById('speakBuddyWord');
  const buddyWordDisplay = document.getElementById('buddyWordDisplay');
  const quizPanelElem = document.getElementById('quizPanel');
  const typingPanelElem = document.getElementById('typingPanel');
  const typingInputElem = document.getElementById('typingInput');
  const submitTyping = document.getElementById('submitTyping');
  const typingFeedbackMsg = document.getElementById('typingFeedbackMsg');
  const tabs = document.querySelectorAll('.buddy-tab');

  let currentMode = 'quiz', currentBuddyWord = null, buddyVisible = false;

  function updateStats() {
    favCountSpan.innerText = favorites.size;
    studiedCountSpan.innerText = studiedWords.size;
    totalWordsStatSpan.innerText = wordList.length;
    masteryPercentSpan.innerText = wordList.length ? Math.round((studiedWords.size / wordList.length) * 100) : 0;
  }
  function markWordsStudied(words) {
    let changed = false;
    words.forEach(w => { if (!studiedWords.has(w.word)) { studiedWords.add(w.word); changed = true; } });
    if (changed) { localStorage.setItem('hsk6_studied', JSON.stringify([...studiedWords])); updateStats(); }
  }
  function refreshAds() { /* No ads, so nothing to refresh */ }

  function applyFilter() {
    const searchTerm = searchInput.value.trim().toLowerCase();
    let base = wordList;
    if (currentFilter === 'favorites') base = wordList.filter(w => favorites.has(w.word));
    else if (currentFilter !== 'all') {
      const [s,e] = currentFilter === '1-625' ? [0,625] : currentFilter === '626-1250' ? [625,1250] : currentFilter === '1251-1875' ? [1250,1875] : [1875,2500];
      base = wordList.slice(s,e);
    }
    if (currentLetter) base = base.filter(w => w.pinyin.trim().toLowerCase().charAt(0) === currentLetter);
    filteredWords = searchTerm ? base.filter(w => w.word.includes(searchTerm) || w.pinyin.toLowerCase().includes(searchTerm) || w.meaning.toLowerCase().includes(searchTerm)) : [...base];
    currentPage = 1;
  }
  function saveFavorites() { localStorage.setItem('hsk6_favorites', JSON.stringify([...favorites])); updateStats(); }
  function toggleFavorite(word) { if (favorites.has(word)) favorites.delete(word); else favorites.add(word); saveFavorites(); if (currentFilter === 'favorites') applyFilter(); render(); refreshAds(); }
  function render() {
    const pageWords = filteredWords.slice((currentPage-1)*pageSize, currentPage*pageSize);
    if (pageWords.length === 0) grid.innerHTML = '<div class="empty-state" style="text-align:center;padding:0.5rem;">✨ No words found</div>';
    else {
      let html = '';
      pageWords.forEach(item => {
        const isFav = favorites.has(item.word);
        const exampleHtml = item.example ? `<div class="example-container"><span class="example-text">📌 ${item.example}</span><button class="example-speaker" data-example="${item.example}"><i class="fas fa-volume-up"></i></button></div>` : '';
        html += `<div class="vocab-card"><div class="word-header"><span class="chinese-word">${item.word}</span><div><button class="favorite-btn ${isFav ? 'active' : ''}" data-word="${item.word}"><i class="${isFav ? 'fas' : 'far'} fa-heart"></i></button><button class="speaker-btn" data-word="${item.word}"><i class="fas fa-volume-up"></i></button></div></div><div class="pinyin">${item.pinyin}</div><div class="meaning">${item.meaning}</div>${exampleHtml}</div>`;
      });
      grid.innerHTML = html;
      markWordsStudied(pageWords);
    }
    document.querySelectorAll('.speaker-btn').forEach(btn => btn.addEventListener('click', () => window.speakText(btn.dataset.word)));
    document.querySelectorAll('.example-speaker').forEach(btn => btn.addEventListener('click', () => window.speakText(btn.dataset.example)));
    document.querySelectorAll('.favorite-btn').forEach(btn => btn.addEventListener('click', () => { toggleFavorite(btn.dataset.word); const icon = btn.querySelector('i'); if (favorites.has(btn.dataset.word)) { icon.classList.remove('far'); icon.classList.add('fas'); btn.classList.add('active'); } else { icon.classList.remove('fas'); icon.classList.add('far'); btn.classList.remove('active'); } }));
    shownSpan.innerText = filteredWords.length;
    renderPagination();
    if (studyMode) document.body.classList.add('study-mode-active'); else document.body.classList.remove('study-mode-active');
  }
  function renderPagination() {
    const totalPages = Math.ceil(filteredWords.length / pageSize);
    if (totalPages <= 1) { paginationDiv.innerHTML = ''; bottomPrev.disabled = true; bottomNext.disabled = true; pageInfoSpan.innerText = 'Page 1 / 1'; } else {
      let btns = `<button class="page-btn" id="prevPageTop" ${currentPage===1?'disabled':''}><i class="fas fa-chevron-left"></i></button>`;
      for (let i=1; i<=totalPages; i++) btns += `<button class="page-btn ${i===currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
      btns += `<button class="page-btn" id="nextPageTop" ${currentPage===totalPages?'disabled':''}><i class="fas fa-chevron-right"></i></button>`;
      paginationDiv.innerHTML = btns;
      document.querySelectorAll('.page-btn[data-page]').forEach(btn => btn.addEventListener('click', () => { currentPage = parseInt(btn.dataset.page); render(); refreshAds(); }));
      document.getElementById('prevPageTop')?.addEventListener('click', () => { if (currentPage > 1) { currentPage--; render(); refreshAds(); } });
      document.getElementById('nextPageTop')?.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; render(); refreshAds(); } });
      bottomPrev.disabled = (currentPage === 1); bottomNext.disabled = (currentPage === totalPages);
      pageInfoSpan.innerText = `Page ${currentPage} / ${totalPages}`;
    }
  }
  function buildLetterFilter() {
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    letterFilterDiv.innerHTML = '<button class="letter-btn all-letters" data-letter="">All</button>';
    letters.forEach(l => { const btn = document.createElement('button'); btn.className = 'letter-btn'; btn.textContent = l; btn.dataset.letter = l.toLowerCase(); btn.addEventListener('click', () => { document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentLetter = l.toLowerCase(); applyFilter(); render(); refreshAds(); }); letterFilterDiv.appendChild(btn); });
    const allBtn = document.querySelector('.letter-btn.all-letters'); if (allBtn) allBtn.addEventListener('click', () => { document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active')); allBtn.classList.add('active'); currentLetter = null; applyFilter(); render(); refreshAds(); });
  }
  categoryBtns.forEach(btn => btn.addEventListener('click', () => { categoryBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFilter = btn.dataset.cat; applyFilter(); render(); refreshAds(); }));
  function handleSearch() { applyFilter(); render(); refreshAds(); }
  searchBtn.addEventListener('click', handleSearch); searchInput.addEventListener('keyup', e => e.key === 'Enter' && handleSearch());
  bottomPrev.addEventListener('click', () => { if (currentPage > 1) { currentPage--; render(); refreshAds(); } });
  bottomNext.addEventListener('click', () => { if (currentPage < Math.ceil(filteredWords.length / pageSize)) { currentPage++; render(); refreshAds(); } });
  toggleStatsBtn.addEventListener('click', () => { statsPanel.classList.toggle('hidden'); localStorage.setItem('hsk6_stats_visible', (!statsPanel.classList.contains('hidden')).toString()); refreshAds(); });
  if (localStorage.getItem('hsk6_stats_visible') === 'true') statsPanel.classList.remove('hidden'); else statsPanel.classList.add('hidden');
  darkModeToggle.addEventListener('click', () => { const isDark = document.body.classList.contains('dark'); if (isDark) { document.body.classList.remove('dark'); document.body.classList.add('light'); localStorage.setItem('hsk6_theme', 'light'); darkModeToggle.innerHTML = '<i class="fas fa-moon"></i> Dark'; } else { document.body.classList.remove('light'); document.body.classList.add('dark'); localStorage.setItem('hsk6_theme', 'dark'); darkModeToggle.innerHTML = '<i class="fas fa-sun"></i> Light'; } refreshAds(); });
  exportFavBtn.addEventListener('click', () => { const data = JSON.stringify([...favorites], null, 2); const blob = new Blob([data], {type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'hsk6_favorites.json'; a.click(); URL.revokeObjectURL(url); });
  importFavBtn.addEventListener('click', () => importFavFile.click());
  importFavFile.addEventListener('change', e => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = ev => { try { const imported = JSON.parse(ev.target.result); if (Array.isArray(imported)) { favorites = new Set(imported); saveFavorites(); if (currentFilter === 'favorites') { applyFilter(); render(); } else render(); updateStats(); alert('Favorites imported!'); refreshAds(); } else alert('Invalid file'); } catch(err) { alert('Parse error'); } importFavFile.value = ''; }; reader.readAsText(file); });
  resetProgressBtn.addEventListener('click', () => { if (confirm('Reset progress?')) { studiedWords.clear(); localStorage.setItem('hsk6_studied', JSON.stringify([])); updateStats(); alert('Progress reset'); refreshAds(); } });

  // Study Mode
  studyModeToggle.addEventListener('click', () => {
    studyMode = !studyMode;
    localStorage.setItem('hsk6_studyMode', studyMode);
    if (studyMode) {
      document.body.classList.add('study-mode-active');
      studyModeToggle.classList.add('active');
      studyModeToggle.querySelector('i').classList.remove('fa-eye-slash');
      studyModeToggle.querySelector('i').classList.add('fa-eye');
    } else {
      document.body.classList.remove('study-mode-active');
      studyModeToggle.classList.remove('active');
      studyModeToggle.querySelector('i').classList.remove('fa-eye');
      studyModeToggle.querySelector('i').classList.add('fa-eye-slash');
    }
    refreshAds();
  });
  if (studyMode) {
    document.body.classList.add('study-mode-active');
    studyModeToggle.classList.add('active');
    studyModeToggle.querySelector('i').classList.remove('fa-eye-slash');
    studyModeToggle.querySelector('i').classList.add('fa-eye');
  }

  // Shuffle
  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
  shuffleBtn.addEventListener('click', () => {
    if (filteredWords.length > 0) {
      filteredWords = shuffleArray([...filteredWords]);
      currentPage = 1;
      render();
      refreshAds();
    }
  });

  // Full Vocabulary Modal
  function buildLetterView() {
    const groups = {};
    wordList.forEach(w => {
      const first = w.pinyin.trim().toLowerCase().charAt(0);
      if (!groups[first]) groups[first] = [];
      groups[first].push(w);
    });
    let html = '';
    for (let l of 'abcdefghijklmnopqrstuvwxyz') {
      if (groups[l]) {
        html += `<div class="letter-group"><h3>${l.toUpperCase()}</h3>`;
        groups[l].forEach(w => {
          html += `<div class="word-item" data-word="${w.word}" data-pinyin="${w.pinyin}" data-meaning="${w.meaning}">${w.word}</div>`;
        });
        html += `</div>`;
      }
    }
    letterView.innerHTML = html;
    document.querySelectorAll('#letterView .word-item').forEach(el => {
      el.addEventListener('click', () => {
        // Optional: jump to that word in main view? For now, just close modal
        modal.style.display = 'none';
        // Could also search for that word
        searchInput.value = el.dataset.word;
        handleSearch();
      });
    });
  }
  function buildRangeView() {
    const ranges = [
      { name: "1–625", start: 0, end: 625 },
      { name: "626–1250", start: 625, end: 1250 },
      { name: "1251–1875", start: 1250, end: 1875 },
      { name: "1876–2500", start: 1875, end: 2500 }
    ];
    let html = '';
    ranges.forEach(range => {
      const words = wordList.slice(range.start, range.end);
      html += `<div class="range-group"><h4>${range.name} (${words.length} words)</h4>`;
      words.forEach(w => {
        html += `<div class="word-item" data-word="${w.word}" data-pinyin="${w.pinyin}" data-meaning="${w.meaning}">${w.word}</div>`;
      });
      html += `</div>`;
    });
    rangeView.innerHTML = html;
    document.querySelectorAll('#rangeView .word-item').forEach(el => {
      el.addEventListener('click', () => {
        modal.style.display = 'none';
        searchInput.value = el.dataset.word;
        handleSearch();
      });
    });
  }
  fullVocabBtn.addEventListener('click', () => {
    buildLetterView();
    buildRangeView();
    modal.style.display = 'block';
  });
  closeModal.addEventListener('click', () => { modal.style.display = 'none'; });
  window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
  modalTabs.forEach(tab => {
    tab.addEventListener('click', () => {
      modalTabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      if (tab.dataset.tab === 'letter') {
        letterView.style.display = 'block';
        rangeView.style.display = 'none';
      } else {
        letterView.style.display = 'none';
        rangeView.style.display = 'block';
      }
    });
  });
  // Initially show letter view
  letterView.style.display = 'block';
  rangeView.style.display = 'none';

  // Buddy logic (unchanged)
  function getRandomWordFromFiltered() { if (filteredWords.length === 0) return null; return filteredWords[Math.floor(Math.random() * filteredWords.length)]; }
  function updateBuddyWord(wordObj) { currentBuddyWord = wordObj; if (!wordObj) buddyWordDisplay.innerText = '?'; else { buddyWordDisplay.innerText = wordObj.word; if (currentMode === 'quiz') generateQuiz(wordObj); } }
  function generateQuiz(wordObj) { if (!wordObj) return; const correct = wordObj.meaning; let options = [correct]; while (options.length < 4) { const rand = wordList[Math.floor(Math.random() * wordList.length)]; if (!options.includes(rand.meaning) && rand.meaning !== correct) options.push(rand.meaning); } options = options.sort(() => Math.random() - 0.5); quizPanelElem.innerHTML = ''; options.forEach(opt => { const btn = document.createElement('div'); btn.className = 'quiz-opt'; btn.innerText = opt; btn.addEventListener('click', () => { document.querySelectorAll('.quiz-opt').forEach(el => el.style.pointerEvents = 'none'); if (opt === correct) btn.classList.add('correct'); else { btn.classList.add('wrong'); document.querySelectorAll('.quiz-opt').forEach(el => { if (el.innerText === correct) el.classList.add('correct'); }); } }); quizPanelElem.appendChild(btn); }); }
  function showTypingPanel() { typingPanelElem.style.display = 'flex'; quizPanelElem.style.display = 'none'; }
  function showQuizPanel() { typingPanelElem.style.display = 'none'; quizPanelElem.style.display = 'flex'; }
  function switchMode(mode) { currentMode = mode; if (mode === 'quiz') { showQuizPanel(); if (currentBuddyWord) generateQuiz(currentBuddyWord); } else showTypingPanel(); }
  function handleNewWord() { const newWordObj = getRandomWordFromFiltered(); if (newWordObj) { updateBuddyWord(newWordObj); if (currentMode === 'typing') { typingInputElem.value = ''; typingFeedbackMsg.innerHTML = ''; } } else buddyWordDisplay.innerText = 'No words'; }
  function handleTypingSubmit() { if (!currentBuddyWord) return; const userAns = typingInputElem.value.trim().toLowerCase(); const correct = currentBuddyWord.meaning.toLowerCase(); typingFeedbackMsg.innerHTML = (userAns === correct) ? '<span style="color:#38a169;">✓ Correct!</span>' : `<span style="color:#e53e3e;">✗ Wrong. Correct: ${currentBuddyWord.meaning}</span>`; }
  buddyAvatar.addEventListener('click', () => { if (buddyVisible) { buddyBubble.classList.add('hidden'); buddyVisible = false; } else { buddyBubble.classList.remove('hidden'); buddyVisible = true; if (!currentBuddyWord) handleNewWord(); } });
  closeBuddy.addEventListener('click', () => { buddyBubble.classList.add('hidden'); buddyVisible = false; });
  newBuddyWord.addEventListener('click', handleNewWord);
  speakBuddyWord.addEventListener('click', () => { if (currentBuddyWord) window.speakText(currentBuddyWord.word); });
  submitTyping.addEventListener('click', handleTypingSubmit);
  typingInputElem.addEventListener('keyup', e => { if (e.key === 'Enter') handleTypingSubmit(); });
  tabs.forEach(tab => tab.addEventListener('click', () => { tabs.forEach(t => t.classList.remove('active')); tab.classList.add('active'); switchMode(tab.dataset.mode); }));

  const savedTheme = localStorage.getItem('hsk6_theme'); if (savedTheme === 'dark') { document.body.classList.add('dark'); darkModeToggle.innerHTML = '<i class="fas fa-sun"></i> Light'; } else { document.body.classList.add('light'); darkModeToggle.innerHTML = '<i class="fas fa-moon"></i> Dark'; }
  buildLetterFilter(); applyFilter(); render(); updateStats(); refreshAds();
</script>
</body>
