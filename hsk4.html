  const typingPanel = document.getElementById('typingPanel');
  const typingInput = document.getElementById('typingInput');
  const submitTyping = document.getElementById('submitTyping');
  const typingFeedbackMsg = document.getElementById('typingFeedbackMsg');
  const tabs = document.querySelectorAll('.buddy-tab');

  let currentMode = 'quiz';
  let currentBuddyWord = null;
  let buddyVisible = false;

  // Helper: update stats display
  function updateStats() {
    favCountSpan.innerText = favorites.size;
    const studied = studiedWords.size;
    studiedCountSpan.innerText = studied;
    totalWordsStatSpan.innerText = wordList.length;
    const percent = wordList.length ? Math.round((studied / wordList.length) * 100) : 0;
    masteryPercentSpan.innerText = percent;
  }

  // Mark word as studied when it appears on current page
  function markWordsStudied(words) {
    let changed = false;
    words.forEach(w => {
      if (!studiedWords.has(w.word)) {
        studiedWords.add(w.word);
        changed = true;
      }
    });
    if (changed) {
      localStorage.setItem('hsk4_studied', JSON.stringify([...studiedWords]));
      updateStats();
    }
  }

  // Speech helper (works on mobile)
  function speakText(text) {
    if (!text) return;
    if (window.speechSynthesis) {
      // Cancel any ongoing speech to avoid queue buildup
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-CN';
      utterance.rate = 0.9;
      // Ensure voices are loaded
      if (window.speechSynthesis.getVoices().length === 0) {
        window.speechSynthesis.addEventListener('voiceschanged', () => {
          window.speechSynthesis.speak(utterance);
        });
      } else {
        window.speechSynthesis.speak(utterance);
      }
    } else {
      console.warn('Speech synthesis not supported');
    }
  }

  // Initialize app
  function initApp() {
    if (wordList.length === 0) return;
    totalSpan.innerText = wordList.length;
    // Build letter filter buttons (A-Z)
    buildLetterFilter();
    applyFilter();
    render();
    updateStats();

    // Load theme preference
    const savedTheme = localStorage.getItem('hsk4_theme');
    if (savedTheme === 'dark') {
      document.body.classList.remove('light');
      document.body.classList.add('dark');
      darkModeToggle.innerHTML = '<i class="fas fa-sun"></i> 亮色模式';
    } else {
      document.body.classList.add('light');
      darkModeToggle.innerHTML = '<i class="fas fa-moon"></i> 暗色模式';
    }
  }

  // Build letter filter buttons
  function buildLetterFilter() {
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    letterFilterDiv.innerHTML = '<button class="letter-btn all-letters" data-letter="">全部</button>';
    letters.forEach(l => {
      const btn = document.createElement('button');
      btn.className = 'letter-btn';
      btn.textContent = l;
      btn.dataset.letter = l.toLowerCase();
      btn.addEventListener('click', () => {
        // Remove active class from all letter buttons
        document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLetter = l.toLowerCase();
        applyFilter();
        render();
      });
      letterFilterDiv.appendChild(btn);
    });
    // Add "全部" button functionality
    const allBtn = document.querySelector('.letter-btn.all-letters');
    if (allBtn) {
      allBtn.addEventListener('click', () => {
        document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
        allBtn.classList.add('active');
        currentLetter = null;
        applyFilter();
        render();
      });
      allBtn.classList.add('active'); // default active
    }
  }

  // Filtering logic (incorporates category, search, and letter)
  function applyFilter() {
    const searchTerm = searchInput.value.trim().toLowerCase();
    let base = wordList;

    // Category filter
    if (currentFilter === 'favorites') {
      base = wordList.filter(w => favorites.has(w.word));
    } else if (currentFilter !== 'all') {
      const [start, end] = getRangeIndices(currentFilter);
      base = wordList.slice(start, end);
    }

    // Letter filter (by pinyin first letter)
    if (currentLetter) {
      base = base.filter(w => {
        const pinyinFirst = w.pinyin.trim().toLowerCase().charAt(0);
        return pinyinFirst === currentLetter;
      });
    }

    // Search filter
    if (searchTerm) {
      filteredWords = base.filter(w =>
        w.word.includes(searchTerm) ||
        w.pinyin.toLowerCase().includes(searchTerm) ||
        w.meaning.toLowerCase().includes(searchTerm)
      );
    } else {
      filteredWords = [...base];
    }
    currentPage = 1;
  }

  function getRangeIndices(range) {
    switch(range) {
      case '1-150': return [0, 150];
      case '151-300': return [150, 300];
      case '301-600': return [300, 600];
      case '601-1200': return [600, 1200];
      default: return [0, wordList.length];
    }
  }

  function saveFavorites() {
    localStorage.setItem('hsk4_favorites', JSON.stringify([...favorites]));
    updateStats();
  }

  function toggleFavorite(word) {
    if (favorites.has(word)) favorites.delete(word);
    else favorites.add(word);
    saveFavorites();
    if (currentFilter === 'favorites') {
      applyFilter();
      render();
    } else {
      render(); // refresh hearts
    }
  }

  function render() {
    const start = (currentPage-1)*pageSize;
    const pageWords = filteredWords.slice(start, start+pageSize);
    if (pageWords.length === 0) {
      grid.innerHTML = '<div class="empty-state" style="text-align:center;padding:2rem;">✨ 暂无词汇</div>';
    } else {
      let html = '';
      pageWords.forEach(item => {
        const isFav = favorites.has(item.word);
        const exampleHtml = item.example ? `
          <div class="example-container">
            <span class="example-text">📌 ${item.example}</span>
            <button class="example-speaker" data-example="${item.example}"><i class="fas fa-volume-up"></i></button>
          </div>
        ` : '';
        html += `
          <div class="vocab-card">
            <div class="word-header">
              <span class="chinese-word">${item.word}</span>
              <div>
                <button class="favorite-btn ${isFav ? 'active' : ''}" data-word="${item.word}"><i class="${isFav ? 'fas' : 'far'} fa-heart"></i></button>
                <button class="speaker-btn" data-word="${item.word}"><i class="fas fa-volume-up"></i></button>
              </div>
            </div>
            <div class="pinyin">${item.pinyin}</div>
            <div class="meaning">${item.meaning}</div>
            ${exampleHtml}
          </div>
        `;
      });
      grid.innerHTML = html;
      // Mark words as studied
      markWordsStudied(pageWords);
    }

    // attach event listeners
    document.querySelectorAll('.speaker-btn').forEach(btn => {
      btn.addEventListener('click', () => speakText(btn.dataset.word));
    });
    document.querySelectorAll('.example-speaker').forEach(btn => {
      btn.addEventListener('click', () => speakText(btn.dataset.example));
    });
    document.querySelectorAll('.favorite-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const word = btn.dataset.word;
        toggleFavorite(word);
        const icon = btn.querySelector('i');
        if (favorites.has(word)) {
          icon.classList.remove('far');
          icon.classList.add('fas');
          btn.classList.add('active');
        } else {
          icon.classList.remove('fas');
          icon.classList.add('far');
          btn.classList.remove('active');
        }
      });
    });

    shownSpan.innerText = filteredWords.length;
    renderPagination();
  }

  function renderPagination() {
    const totalPages = Math.ceil(filteredWords.length / pageSize);
    if (totalPages <= 1) {
      paginationDiv.innerHTML = '';
      bottomPrev.disabled = true;
      bottomNext.disabled = true;
      pageInfoSpan.innerText = `第 1 / 1 页`;
    } else {
      // Top pagination
      let btns = '';
      btns += `<button class="page-btn" id="prevPageTop" ${currentPage===1?'disabled':''}><i class="fas fa-chevron-left"></i></button>`;
      for (let i=1; i<=totalPages; i++) {
        btns += `<button class="page-btn ${i===currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
      }
      btns += `<button class="page-btn" id="nextPageTop" ${currentPage===totalPages?'disabled':''}><i class="fas fa-chevron-right"></i></button>`;
      paginationDiv.innerHTML = btns;
      document.querySelectorAll('.page-btn[data-page]').forEach(btn => {
        btn.addEventListener('click', () => {
          currentPage = parseInt(btn.dataset.page);
          render();
        });
      });
      document.getElementById('prevPageTop')?.addEventListener('click', () => {
        if (currentPage > 1) { currentPage--; render(); }
      });
      document.getElementById('nextPageTop')?.addEventListener('click', () => {
        if (currentPage < totalPages) { currentPage++; render(); }
      });

      // Bottom pagination
      bottomPrev.disabled = (currentPage === 1);
      bottomNext.disabled = (currentPage === totalPages);
      pageInfoSpan.innerText = `第 ${currentPage} / ${totalPages} 页`;
    }
  }

  // Category & search & letter changes
  categoryBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      categoryBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.cat;
      // Clear letter filter when switching categories? We'll keep letter filter active.
      applyFilter();
      render();
    });
  });
  function handleSearch() { applyFilter(); render(); }
  searchBtn.addEventListener('click', handleSearch);
  searchInput.addEventListener('keyup', e => e.key === 'Enter' && handleSearch());

  // Bottom pagination buttons
  bottomPrev.addEventListener('click', () => {
    if (currentPage > 1) {
      currentPage--;
      render();
    }
  });
  bottomNext.addEventListener('click', () => {
    const totalPages = Math.ceil(filteredWords.length / pageSize);
    if (currentPage < totalPages) {
      currentPage++;
      render();
    }
  });

  // Stats panel toggle
  toggleStatsBtn.addEventListener('click', () => {
    statsPanel.classList.toggle('hidden');
    localStorage.setItem('hsk4_stats_visible', (!statsPanel.classList.contains('hidden')).toString());
  });
  if (localStorage.getItem('hsk4_stats_visible') === 'true') {
    statsPanel.classList.remove('hidden');
  } else {
    statsPanel.classList.add('hidden');
  }

  // Dark mode toggle
  darkModeToggle.addEventListener('click', () => {
    const isDark = document.body.classList.contains('dark');
    if (isDark) {
      document.body.classList.remove('dark');
      document.body.classList.add('light');
      localStorage.setItem('hsk4_theme', 'light');
      darkModeToggle.innerHTML = '<i class="fas fa-moon"></i> 暗色模式';
    } else {
      document.body.classList.remove('light');
      document.body.classList.add('dark');
      localStorage.setItem('hsk4_theme', 'dark');
      darkModeToggle.innerHTML = '<i class="fas fa-sun"></i> 亮色模式';
    }
  });

  // Export favorites
  exportFavBtn.addEventListener('click', () => {
    const data = JSON.stringify([...favorites], null, 2);
    const blob = new Blob([data], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'hsk4_favorites.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  // Import favorites
  importFavBtn.addEventListener('click', () => {
    importFavFile.click();
  });
  importFavFile.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (Array.isArray(imported)) {
          favorites = new Set(imported);
          saveFavorites();
          if (currentFilter === 'favorites') {
            applyFilter();
            render();
          } else {
            render(); // update hearts
          }
          updateStats();
          alert('收藏导入成功！');
        } else {
          alert('文件格式错误，需要JSON数组');
        }
      } catch (err) {
        alert('解析失败，请选择正确的JSON文件');
      }
      importFavFile.value = '';
    };
    reader.readAsText(file);
  });

  // Reset progress
  resetProgressBtn.addEventListener('click', () => {
    if (confirm('重置进度将清除所有已学记录，确定吗？')) {
      studiedWords.clear();
      localStorage.setItem('hsk4_studied', JSON.stringify([]));
      updateStats();
      alert('进度已重置');
    }
  });

  // ---------------------- Buddy Logic (with improved touch) ----------------------
  function getRandomWordFromFiltered() {
    if (filteredWords.length === 0) return null;
    return filteredWords[Math.floor(Math.random() * filteredWords.length)];
  }

  function updateBuddyWord(wordObj) {
    currentBuddyWord = wordObj;
    if (!wordObj) {
      buddyWordDisplay.innerText = '?';
      return;
    }
    buddyWordDisplay.innerText = wordObj.word;
    if (currentMode === 'quiz') generateQuiz(wordObj);
  }

  function generateQuiz(wordObj) {
    if (!wordObj) return;
    const correct = wordObj.meaning;
    let options = [correct];
    while (options.length < 4) {
      const rand = wordList[Math.floor(Math.random() * wordList.length)];
      if (!options.includes(rand.meaning) && rand.meaning !== correct) options.push(rand.meaning);
    }
    options = options.sort(() => Math.random() - 0.5);
    quizPanel.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('div');
      btn.className = 'quiz-opt';
      btn.innerText = opt;
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.quiz-opt').forEach(el => el.style.pointerEvents = 'none');
        if (opt === correct) btn.classList.add('correct');
        else {
          btn.classList.add('wrong');
          document.querySelectorAll('.quiz-opt').forEach(el => {
            if (el.innerText === correct) el.classList.add('correct');
          });
        }
      });
      quizPanel.appendChild(btn);
    });
  }

  function showTypingPanel(wordObj) {
    if (!wordObj) return;
    typingInput.value = '';
    typingFeedbackMsg.innerHTML = '';
    typingPanel.style.display = 'flex';
    quizPanel.style.display = 'none';
  }

  function showQuizPanel() {
    typingPanel.style.display = 'none';
    quizPanel.style.display = 'flex';
  }

  function switchMode(mode) {
    currentMode = mode;
    if (mode === 'quiz') {
      showQuizPanel();
      if (currentBuddyWord) generateQuiz(currentBuddyWord);
    } else {
      showTypingPanel(currentBuddyWord);
    }
  }

  function handleNewWord() {
    const newWordObj = getRandomWordFromFiltered();
    if (newWordObj) {
      updateBuddyWord(newWordObj);
      if (currentMode === 'typing') {
        typingInput.value = '';
        typingFeedbackMsg.innerHTML = '';
      }
    } else {
      buddyWordDisplay.innerText = '暂无词汇';
    }
  }

  function handleTypingSubmit() {
    if (!currentBuddyWord) return;
    const userAns = typingInput.value.trim().toLowerCase();
    const correct = currentBuddyWord.meaning.toLowerCase();
    if (userAns === correct) {
      typingFeedbackMsg.innerHTML = '<span style="color:#38a169;">✓ 正确！</span>';
    } else {
      typingFeedbackMsg.innerHTML = `<span style="color:#e53e3e;">✗ 错误，正确答案: ${currentBuddyWord.meaning}</span>`;
    }
  }

  // Buddy toggle with improved touch detection (no drag conflict)
  let dragStarted = false;
  let dragTimer;
  buddyAvatar.addEventListener('touchstart', (e) => {
    dragStarted = false;
    dragTimer = setTimeout(() => { dragStarted = true; }, 100);
  });
  buddyAvatar.addEventListener('touchend', (e) => {
    clearTimeout(dragTimer);
    if (!dragStarted) {
      // toggle bubble
      if (buddyVisible) hideBuddy();
      else showBuddy();
    }
  });
  // For mouse (PC)
  let mouseDrag = false;
  buddyAvatar.addEventListener('mousedown', (e) => {
    mouseDrag = false;
    const startX = e.clientX, startY = e.clientY;
    const moveHandler = (moveEvent) => {
      if (Math.abs(moveEvent.clientX - startX) > 5 || Math.abs(moveEvent.clientY - startY) > 5) {
        mouseDrag = true;
      }
    };
    const upHandler = () => {
      if (!mouseDrag) {
        if (buddyVisible) hideBuddy();
        else showBuddy();
      }
      document.removeEventListener('mousemove', moveHandler);
      document.removeEventListener('mouseup', upHandler);
    };
    document.addEventListener('mousemove', moveHandler);
    document.addEventListener('mouseup', upHandler);
  });

  function showBuddy() {
    buddyBubble.classList.remove('hidden');
    buddyVisible = true;
    if (!currentBuddyWord) handleNewWord();
  }
  function hideBuddy() {
    buddyBubble.classList.add('hidden');
    buddyVisible = false;
  }
  closeBuddy.addEventListener('click', hideBuddy);
  newBuddyWord.addEventListener('click', handleNewWord);
  speakBuddyWord.addEventListener('click', () => {
    if (currentBuddyWord) speakText(currentBuddyWord.word);
  });
  submitTyping.addEventListener('click', handleTypingSubmit);
  typingInput.addEventListener('keyup', e => { if (e.key === 'Enter') handleTypingSubmit(); });

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const mode = tab.dataset.mode;
      switchMode(mode);
    });
  });

  // Draggable buddy (keep for mouse/touch drag)
  let dragActive = false, startX, startY, startLeft, startTop;
  buddyAvatar.addEventListener('mousedown', startDrag);
  buddyAvatar.addEventListener('touchstart', startDrag, {passive: false});
  function startDrag(e) {
    // Only start drag if it's not a simple click (handled by toggle logic)
    // We'll let the toggle logic run first; if drag occurs, we'll cancel the click.
    // But we already have separate detection; we'll still allow drag.
    e.preventDefault();
    dragActive = true;
    const rect = buddyContainer.getBoundingClientRect();
    const clientX = e.clientX ?? e.touches[0].clientX;
    const clientY = e.clientY ?? e.touches[0].clientY;
    startX = clientX - rect.left;
    startY = clientY - rect.top;
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('touchmove', onDrag, {passive: false});
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);
  }
  function onDrag(e) {
    if (!dragActive) return;
    e.preventDefault();
    const clientX = e.clientX ?? e.touches[0].clientX;
    const clientY = e.clientY ?? e.touches[0].clientY;
    let left = clientX - startX;
    let top = clientY - startY;
    left = Math.min(Math.max(left, 0), window.innerWidth - buddyContainer.offsetWidth);
    top = Math.min(Math.max(top, 0), window.innerHeight - buddyContainer.offsetHeight);
    buddyContainer.style.position = 'fixed';
    buddyContainer.style.left = left + 'px';
    buddyContainer.style.top = top + 'px';
    buddyContainer.style.right = 'auto';
    buddyContainer.style.bottom = 'auto';
  }
  function stopDrag() {
    dragActive = false;
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('touchmove', onDrag);
    document.removeEventListener('mouseup', stopDrag);
    document.removeEventListener('touchend', stopDrag);
  }

  // Initialize everything
  initApp();
</script>
</body>
</html>
