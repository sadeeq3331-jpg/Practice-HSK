  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body.light { background: linear-gradient(145deg, #eef2ff 0%, #e0e7ff 100%); --bg-card: #ffffff; --bg-header: rgba(255,255,255,0.7); --text-primary: #1e1b4b; --text-secondary: #4f46e5; --border-light: #c7d2fe; --accent: #4f46e5; }
    body.dark { background: linear-gradient(145deg, #0f172a 0%, #0b1120 100%); --bg-card: #1e293b; --bg-header: rgba(30,41,59,0.8); --text-primary: #e2e8f0; --text-secondary: #a5b4fc; --border-light: #334155; --accent: #818cf8; }
    body { padding: 1.2rem; display: flex; flex-direction: column; align-items: center; background: var(--bg-header); }
    .container { max-width: 1000px; width: 100%; background: var(--bg-header); backdrop-filter: blur(12px); border-radius: 2rem; padding: 1.5rem; }
    h1 { text-align: center; margin-bottom: 1rem; background: linear-gradient(135deg, var(--text-secondary), var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .grammar-grid { display: grid; gap: 1rem; margin: 1rem 0; }
    .grammar-card { background: var(--bg-card); border-radius: 1rem; padding: 1rem; border: 1px solid var(--border-light); }
    .grammar-title { font-size: 1.2rem; font-weight: 600; color: var(--accent); }
    .grammar-structure { font-family: monospace; background: rgba(0,0,0,0.05); padding: 0.2rem 0.5rem; border-radius: 0.5rem; display: inline-block; margin: 0.5rem 0; }
    .grammar-example { padding-left: 0.5rem; border-left: 3px solid var(--accent); margin: 0.5rem 0; font-style: italic; }
    .back-btn { background: var(--accent); color: white; border: none; padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer; margin-top: 1rem; display: inline-block; text-decoration: none; }
  </style>
</head>
<body class="light">
<div class="container">
  <h1>📐 HSK 1 Grammar Points</h1>
  <div class="grammar-grid" id="grammarList"></div>
  <a href="hsk1_hub.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Hub</a>
</div>
<script>
  const grammarData = [
    { title: "1. Subject + 是 + Object", structure: "S + 是 + O", examples: ["我是学生。", "她是医生。"], explanation: "Used to identify or equate." },
    { title: "2. Subject + 有 + Object", structure: "S + 有 + O", examples: ["我有一本书。", "他有一个哥哥。"], explanation: "Indicates possession." },
    { title: "3. Adverb 很 (very)", structure: "S + 很 + Adj", examples: ["她很高兴。", "今天很热。"], explanation: "Used before adjectives; often omits 'very' meaning." },
    { title: "4. Question particle 吗", structure: "Statement + 吗", examples: ["你是学生吗？", "他来了吗？"], explanation: "Turns a statement into a yes/no question." },
    { title: "5. Measure words", structure: "Numeral + MW + Noun", examples: ["一个人", "三本书"], explanation: "Measure words are used between numbers and nouns." },
    { title: "6. Time expressions", structure: "Time + Subject + Verb", examples: ["我明天去北京。", "他早上八点起床。"], explanation: "Time phrase comes before the verb." },
    { title: "7. Negation 不", structure: "Subject + 不 + Verb/Adj", examples: ["我不喜欢喝茶。", "他不高。"], explanation: "Negates present or future actions/states." },
    { title: "8. Negation 没", structure: "Subject + 没 + Verb", examples: ["我没吃饭。", "他没来。"], explanation: "Negates past actions or 'have not'." },
    { title: "9. Particle 了 (change or completion)", structure: "Subject + Verb + 了", examples: ["我吃饭了。", "下雨了。"], explanation: "Indicates a change of state or completed action." },
    { title: "10. Question word 什么", structure: "Subject + Verb + 什么", examples: ["你叫什么名字？", "这是什么？"], explanation: "Asks 'what'." }
  ];
  const container = document.getElementById('grammarList');
  let html = '';
  grammarData.forEach(g => {
    html += `<div class="grammar-card">
      <div class="grammar-title">${g.title}</div>
      <div class="grammar-structure">${g.structure}</div>
      <div class="grammar-example">${g.examples.map(e => `“${e}”`).join(' · ')}</div>
      <div style="font-size:0.85rem; margin-top:0.3rem;">${g.explanation}</div>
    </div>`;
  });
  container.innerHTML = html;

  // Dark mode toggle
  const darkToggle = document.createElement('button');
  darkToggle.innerHTML = '<i class="fas fa-moon"></i> Dark';
  darkToggle.style.position = 'fixed'; darkToggle.style.bottom = '20px'; darkToggle.style.right = '20px';
  darkToggle.style.background = 'var(--accent)'; darkToggle.style.color = 'white'; darkToggle.style.border = 'none'; darkToggle.style.borderRadius = '30px'; darkToggle.style.padding = '0.4rem 1rem'; darkToggle.style.cursor = 'pointer';
  darkToggle.onclick = () => {
    const isDark = document.body.classList.contains('dark');
    if (isDark) { document.body.classList.remove('dark'); document.body.classList.add('light'); localStorage.setItem('hsk1_grammar_theme', 'light'); }
    else { document.body.classList.remove('light'); document.body.classList.add('dark'); localStorage.setItem('hsk1_grammar_theme', 'dark'); }
  };
  document.body.appendChild(darkToggle);
  const savedTheme = localStorage.getItem('hsk1_grammar_theme');
  if (savedTheme === 'dark') { document.body.classList.add('dark'); document.body.classList.remove('light'); }
  else { document.body.classList.add('light'); document.body.classList.remove('dark'); }
</script>
</body>
</html>
