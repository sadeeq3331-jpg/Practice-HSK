  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body.light { background: linear-gradient(145deg, #eef2ff 0%, #e0e7ff 100%); --bg-card: #ffffff; --bg-header: rgba(255,255,255,0.7); --text-primary: #1e1b4b; --text-secondary: #4f46e5; --border-light: #c7d2fe; --accent: #4f46e5; }
    body.dark { background: linear-gradient(145deg, #0f172a 0%, #0b1120 100%); --bg-card: #1e293b; --bg-header: rgba(30,41,59,0.8); --text-primary: #e2e8f0; --text-secondary: #a5b4fc; --border-light: #334155; --accent: #818cf8; }
    body { padding: 1.2rem; display: flex; flex-direction: column; align-items: center; background: var(--bg-header); }
    .container { max-width: 800px; width: 100%; background: var(--bg-header); backdrop-filter: blur(12px); border-radius: 2rem; padding: 1.5rem; }
    h1 { text-align: center; margin-bottom: 1rem; background: linear-gradient(135deg, var(--text-secondary), var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--bg-card); border-radius: 1rem; padding: 1rem; text-align: center; border: 1px solid var(--border-light); }
    .badge-list { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
    .badge { background: var(--bg-card); border-radius: 2rem; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; border: 1px solid var(--border-light); }
    .badge.unlocked { background: var(--accent); color: white; }
    .back-btn { background: var(--accent); color: white; border: none; padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer; margin-top: 1rem; display: inline-block; text-decoration: none; }
  </style>
</head>
<body class="light">
<div class="container">
  <h1>🏆 HSK 2 Badges & Progress</h1>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="badge-list" id="badgeList"></div>
  <a href="hsk2_hub.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Hub</a>
</div>
<script>
  // Retrieve data from localStorage (shared with vocabulary module)
  const studiedWords = new Set(JSON.parse(localStorage.getItem('hsk2_studied') || '[]'));
  const favorites = new Set(JSON.parse(localStorage.getItem('hsk2_favorites') || '[]'));
  const streak = parseInt(localStorage.getItem('hsk2_challenge_streak') || '0');
  const examBest = parseInt(localStorage.getItem('hsk2_exam_best') || '0');
  const totalWords = 150; // HSK2 total words
  const studiedCount = studiedWords.size;
  const favCount = favorites.size;
  const masteryPercent = Math.round((studiedCount / totalWords) * 100);
  const badges = [
    { id: "first_study", name: "First Steps", icon: "fas fa-shoe-prints", condition: () => studiedCount >= 1, description: "Studied your first word" },
    { id: "scholar", name: "Scholar", icon: "fas fa-graduation-cap", condition: () => studiedCount >= 50, description: "Studied 50 words" },
    { id: "master", name: "Master", icon: "fas fa-crown", condition: () => studiedCount >= 150, description: "Studied all 150 words" },
    { id: "collector", name: "Collector", icon: "fas fa-heart", condition: () => favCount >= 20, description: "Favorited 20 words" },
    { id: "streak_7", name: "Weekly Warrior", icon: "fas fa-fire", condition: () => streak >= 7, description: "7-day challenge streak" },
    { id: "exam_passer", name: "Exam Taker", icon: "fas fa-clipboard-check", condition: () => examBest >= 60, description: "Passed the mock exam" },
    { id: "perfectionist", name: "Perfectionist", icon: "fas fa-star", condition: () => examBest >= 90, description: "Scored 90%+ on exam" }
  ];
  const statsHTML = `
    <div class="stat-card"><i class="fas fa-book"></i><br>Studied<br><strong>${studiedCount}/${totalWords}</strong></div>
    <div class="stat-card"><i class="fas fa-heart"></i><br>Favorites<br><strong>${favCount}</strong></div>
    <div class="stat-card"><i class="fas fa-chart-line"></i><br>Mastery<br><strong>${masteryPercent}%</strong></div>
    <div class="stat-card"><i class="fas fa-fire"></i><br>Streak<br><strong>${streak} days</strong></div>
    <div class="stat-card"><i class="fas fa-trophy"></i><br>Best Exam<br><strong>${examBest}%</strong></div>
  `;
  document.getElementById('statsGrid').innerHTML = statsHTML;
  const badgeHTML = badges.map(b => `<div class="badge ${b.condition() ? 'unlocked' : ''}"><i class="${b.icon}"></i> ${b.name}<span style="font-size:0.7rem; margin-left:0.3rem;">${b.description}</span></div>`).join('');
  document.getElementById('badgeList').innerHTML = badgeHTML;
  // Dark mode
  const darkBtn = document.createElement('button');
  darkBtn.innerHTML = '<i class="fas fa-moon"></i> Dark';
  darkBtn.style.position = 'fixed'; darkBtn.style.bottom = '20px'; darkBtn.style.right = '20px';
  darkBtn.style.background = 'var(--accent)'; darkBtn.style.color = 'white'; darkBtn.style.border = 'none'; darkBtn.style.borderRadius = '30px'; darkBtn.style.padding = '0.4rem 1rem'; darkBtn.style.cursor = 'pointer';
  darkBtn.onclick = () => {
    const isDark = document.body.classList.contains('dark');
    if (isDark) { document.body.classList.remove('dark'); document.body.classList.add('light'); localStorage.setItem('hsk2_badges_theme', 'light'); }
    else { document.body.classList.remove('light'); document.body.classList.add('dark'); localStorage.setItem('hsk2_badges_theme', 'dark'); }
  };
  document.body.appendChild(darkBtn);
  const savedTheme = localStorage.getItem('hsk2_badges_theme');
  if (savedTheme === 'dark') { document.body.classList.add('dark'); document.body.classList.remove('light'); }
  else { document.body.classList.add('light'); document.body.classList.remove('dark'); }
</script>
</body>
</html>
