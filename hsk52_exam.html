  (function(){
    // ==================== 听力部分 (45题·第二套全新) ====================
    const listeningQuestions = [
      // 第一部分：短对话 (20题)
      { type: "part1", dialogue: "女：一个礼拜不见，你怎么变得这么黑？男：晒的，我和朋友去海南玩儿了几天。", question: "男的怎么了？", options: ["A. 晒黑了", "B. 过敏了", "C. 失眠了", "D. 后悔了"], correct: 0 },
      { type: "part1", dialogue: "男：这是机票，你拿好。女：谢谢，多亏你送我过来，不然我真没法儿准时到机场。", question: "他们现在在哪儿？", options: ["A. 酒吧", "B. 机场", "C. 邮局", "D. 火车站"], correct: 1 },
      { type: "part1", dialogue: "女：您好！请问去国家博物馆是朝这个方向走吗？男：对，你走到第二个红绿灯，向右拐就到了。", question: "根据对话，下列哪项正确？", options: ["A. 女的在问路", "B. 男的迷路了", "C. 他们在划船", "D. 他们走错方向了"], correct: 0 },
      { type: "part1", dialogue: "男：出国手续办好了？女：没，还有些材料没准备好，看来得等到五月底了。", question: "关于女的，可以知道什么？", options: ["A. 在实习", "B. 论文没写完", "C. 做过志愿者", "D. 在办出国手续"], correct: 3 },
      { type: "part1", dialogue: "女：我也安装了这个软件，为什么没有你那个功能呢？男：这个软件已经升级了，我这是最新的版本。", question: "根据对话，可以知道什么？", options: ["A. 硬盘摔坏了", "B. 软件升级了", "C. 电脑中毒了", "D. 手机没信号"], correct: 1 },
      { type: "part1", dialogue: "男：你就坐这儿吧，以后有什么问题可以随时来找我，我就在隔壁办公。女：好的，谢谢张主任。", question: "关于女的，可以知道什么？", options: ["A. 是新来的", "B. 想辞职", "C. 表现出色", "D. 负责产品宣传"], correct: 0 },
      { type: "part1", dialogue: "女：婚礼的日期定了吗？男：定了，我们想九月十六号举行婚礼，那时天气不冷也不热。", question: "根据对话，下列哪项正确？", options: ["A. 戒指太贵", "B. 房子没装修", "C. 婚礼很豪华", "D. 男的九月十六号结婚"], correct: 3 },
      { type: "part1", dialogue: "男：还是得吃点儿肉，光吃蔬菜营养不够。女：我知道，别担心。等我瘦下去了一定会吃的。", question: "女的是什么意思？", options: ["A. 吃饱了", "B. 减肥很成功", "C. 现在不想吃肉", "D. 吃蔬菜更健康"], correct: 2 },
      { type: "part1", dialogue: "女：听说咱们班新来的那个同学是华裔。男：是吗？难怪他汉语说得那么好。", question: "关于新来的同学，可以知道什么？", options: ["A. 是华裔", "B. 会弹钢琴", "C. 对人热情", "D. 物理很好"], correct: 0 },
      { type: "part1", dialogue: "男：打雷了，估计快要下雨了。女：糟糕，我没带伞。天气预报也没说今天要下雨啊。", question: "女的为什么说"糟糕"？", options: ["A. 水洒了", "B. 没带伞", "C. 没关窗户", "D. 衣服湿了"], correct: 1 },
      { type: "part1", dialogue: "女：经理，网站的风格我又调整了一下。男：我看了，还是不太理想。要注意用户需求，这个网站是针对儿童的，要再活泼一点儿。", question: "男的觉得那个网站怎么样？", options: ["A. 不够活泼", "B. 动画效果差", "C. 内容不丰富", "D. 图片不吸引人"], correct: 0 },
      { type: "part1", dialogue: "男：这房子真不错，你是直接找房东租的吗？女：不是，我当时找了一家中介，和他们签的合同。", question: "女的是怎么租到房子的？", options: ["A. 看广告", "B. 通过中介", "C. 朋友介绍", "D. 亲自找房东"], correct: 1 },
      { type: "part1", dialogue: "女：这样做太冒险了，这笔钱可不是个小数目，我们再想想吧。男：我觉得这是个投资的好机会，再犹豫，机会可就没了。", question: "男的是什么意思？", options: ["A. 缺少设备", "B. 计划通过了", "C. 资金到账了", "D. 要抓住机会"], correct: 3 },
      { type: "part1", dialogue: "男：踢得太棒了！咱们班肯定能赢。女：是，只要继续保持这种状态，冠军肯定是我们的！", question: "根据对话，下列哪项正确？", options: ["A. 会议取消了", "B. 比赛还没结束", "C. 他们在打排球", "D. 考试时间推迟了"], correct: 1 },
      { type: "part1", dialogue: "女：前面胡同太窄，不好倒车，我在这儿下车就可以。男：好吧，那我就不开进去了，你到家给我发个短信吧。", question: "女的是什么意思？", options: ["A. 想散步", "B. 想现在下车", "C. 前面堵车了", "D. 没拿到驾照"], correct: 1 },
      { type: "part1", dialogue: "男：这是你的第一份工作，挣钱多少是次要的，主要还是积累经验。女：我知道了，爸。", question: "关于第一份工作，男的有什么看法？", options: ["A. 需要运气", "B. 要认真仔细", "C. 要符合所学专业", "D. 收入不是最关键的"], correct: 3 },
      { type: "part1", dialogue: "女：趁开幕式还没开始，我去买两瓶矿泉水。男：就剩十分钟了，别去了，来不及了。", question: "女的要去做什么？", options: ["A. 退票", "B. 存包", "C. 买零食", "D. 买矿泉水"], correct: 3 },
      { type: "part1", dialogue: "男：您检查一下包裹，如果没有问题，请在这儿签个字。女：好，我先打开看看。", question: "根据对话，下列哪项正确？", options: ["A. 东西送错了", "B. 收据不见了", "C. 男的没带名片", "D. 女的收到包裹了"], correct: 3 },
      { type: "part1", dialogue: "女：现在请您设置一下密码，是六位数字，输入后请按确认键。男：好的，谢谢。", question: "女的让男的做什么？", options: ["A. 设置密码", "B. 修改地址", "C. 确认数量", "D. 下载文件"], correct: 0 },
      { type: "part1", dialogue: "男：这两种方案其实很相似，除了实施的步骤，其他几乎都一样。女：我倒不这么认为，我觉得它们首先在预期目标上就有很大的不同。", question: "女的认为两种方案的不同之处在哪儿？", options: ["A. 预期目标", "B. 指导原则", "C. 最终成果", "D. 适用对象"], correct: 0 },
      
      // 第二部分：长对话/短文 (25题)
      { type: "part2", dialogue: "女：你休息会儿，我们轮流开。男：没事，一路走的都是高速，不累。女：不行，你都开了一上午了，疲劳驾驶很危险。男：好吧，到前面服务区停下来换你。", questions: [{ q: "女的认为什么很危险？", options: ["A. 超速行驶", "B. 酒后驾车", "C. 疲劳驾驶", "D. 开车时打电话"], correct: 2 }] },
      { type: "part2", dialogue: "男：你这些图片处理得真棒，你是怎么弄的？女：我下载了一个软件，就是这个，你没用过吗？男：没有，是免费的？女：对，是免费的，我一会儿传给你。", questions: [{ q: "关于那个软件，下列哪项正确？", options: ["A. 有病毒", "B. 是收费的", "C. 是处理图片的", "D. 可以处理视频"], correct: 2 }] },
      { type: "part2", dialogue: "女：你怎么了？男：胃有点儿不舒服。女：是不是着凉了？男：不是，可能是消化不良，中午吃太多了。女：我这儿有助消化的药，你吃一粒吧。", questions: [{ q: "男的怎么了？", options: ["A. 失眠了", "B. 感冒了", "C. 胃不舒服", "D. 辣椒吃多了"], correct: 2 }] },
      { type: "part2", dialogue: "男：告诉你一个好消息，"五月天"要来北京开演唱会了。女：真的吗？什么时候？男：就这个月的最后两天，连续举办两场，现在已经开始售票了。女：太好了，这次无论如何我都要去！", questions: [{ q: "关于这场演唱会，下列哪项正确？", options: ["A. 在北京举办", "B. 只举办一场", "C. 演出时间待定", "D. 这个月中旬举办"], correct: 0 }] },
      { type: "part2", dialogue: "女：新房子装修大概需要多少钱啊？男：我咨询了一下装修公司，如果是简单装一下的话，五万左右吧。女：那加上家具呢？男：加上家具的话，估计得十万。", questions: [{ q: "根据对话，可以知道什么？", options: ["A. 房租涨了", "B. 家具买好了", "C. 他们打算贷款", "D. 房子还没装修"], correct: 3 }] },
      { type: "part2", dialogue: "男：看我这身衣服怎么样？女：挺好的，很合身，你穿西装显得要精神了，不过……男：不过什么？女：你为什么不打领带，搭配上一条领带就完美了。", questions: [{ q: "女的有什么建议？", options: ["A. 换件衣服", "B. 打领带", "C. 换双鞋", "D. 不用换"], correct: 1 }] },
      { type: "part2", dialogue: "女：这个暑假你想去实习？男：是，我已经投了好几份简历，正在等消息呢。女：我也有这个打算，有实习经验的话，毕业后好找工作。男：是呀，现在用人单位基本上都要求有一定的工作经验。", questions: [{ q: "男的打算暑假做什么？", options: ["A. 旅游", "B. 实习", "C. 打工", "D. 学习"], correct: 1 }] },
      { type: "part2", dialogue: "男：你怎么买了这么多书啊？女：书店正在搞活动，满一百返二十，所以我一下子买了很多。男：都是些什么书啊？女：大部分是关于如何投资的。", questions: [{ q: "女的为什么买了很多书？", options: ["A. 喜欢看书", "B. 书店搞活动", "C. 需要考试", "D. 朋友推荐"], correct: 1 }] },
      { type: "part2", dialogue: "女：你这么兴奋，天上掉馅儿饼啦？男：差不多吧，我的那个教材项目领导已经同意了，批下来了。女：真的？恭喜你！真是"功夫不负有心人"啊。", questions: [{ q: "男的为什么兴奋？", options: ["A. 中奖了", "B. 项目通过了", "C. 升职了", "D. 加薪了"], correct: 1 }] },
      { type: "part2", dialogue: "男：您这是第一次来中国吗？女：不是，我五年前来过一次，不过那时候只去了北京和上海。这次我想去西部看看，比如西安、成都这些地方。", questions: [{ q: "女的这次想去哪儿？", options: ["A. 北京", "B. 上海", "C. 西部", "D. 广州"], correct: 2 }] },
      { type: "part2", dialogue: "女：你看今天的新闻了吗？说是有一种新型流感正在流行。男：看到了，专家建议大家勤洗手，少去人多的地方。女：我这就去买几个口罩备着。", questions: [{ q: "专家有什么建议？", options: ["A. 多吃药", "B. 勤洗手", "C. 多喝水", "D. 不要出门"], correct: 1 }] },
      { type: "part2", dialogue: "男：你觉得老张这个人怎么样？女：他这个人吧，什么都好，就是有点儿爱面子，有时候明明错了也不肯承认。", questions: [{ q: "女的觉得老张怎么样？", options: ["A. 很谦虚", "B. 爱面子", "C. 很诚实", "D. 很热情"], correct: 1 }] },
      { type: "part2", dialogue: "女：听说公司最近要裁员？男：我也听说了，不过应该不会裁到我们部门吧。女：谁知道呢，还是先做好自己的工作吧。", questions: [{ q: "他们在谈论什么？", options: ["A. 涨工资", "B. 裁员", "C. 招聘", "D. 出差"], correct: 1 }] },
      { type: "part2", dialogue: "男：你的手机怎么老是关机？我给你打了好几次电话都打不通。女：不好意思，我这几天在老家，信号不太好。", questions: [{ q: "女的为什么关机？", options: ["A. 手机坏了", "B. 没电了", "C. 信号不好", "D. 不想接电话"], correct: 2 }] },

    const writingQuestions = [
      // 第一部分：完成句子 (8题)
      { type: "part1", words: ["发表", "这篇论文", "什么时候", "是", "的"], correct: "这篇论文是什么时候发表的" },
      { type: "part1", words: ["他", "中国", "了", "已经", "三年", "在"], correct: "他在中国已经三年了" },
      { type: "part1", words: ["我", "北京", "去过", "一次", "只"], correct: "我只去过一次北京" },
      { type: "part1", words: ["这个问题", "解决", "需要", "时间", "来"], correct: "这个问题需要时间来解决" },
      { type: "part1", words: ["她", "汉语", "说", "得", "很", "流利"], correct: "她汉语说得很流利" },
      { type: "part1", words: ["今天", "比", "昨天", "冷", "多了"], correct: "今天比昨天冷多了" },
      { type: "part1", words: ["他", "被", "那本书", "吸引", "住了", "深深地"], correct: "他被那本书深深地吸引住了" },
      { type: "part1", words: ["我们", "把", "这件事", "处理好", "一定", "会"], correct: "我们一定会把这件事处理好" },
      // 第二部分：短文写作 (2题)
      { type: "part2", style: "words", promptWords: ["旅行", "风景", "心情", "收获"], requirement: "请用以上词语写一篇80字左右的短文。" },
      { type: "part2", style: "image", image: "🏞️", imageDesc: "美丽的自然风景", requirement: "请结合图片写一篇80字左右的短文。" }
    ];

    // ==================== 考试状态 ====================
    let examState = {
      section: 'listening', currentQuestionIndex: 0,
      answers: new Array(flatListening.length + flatReading.length + writingQuestions.length).fill(null),
      listeningTimer: 30*60, answerSheetTimer: 5*60, readingTimer: 45*60, writingTimer: 40*60,
      timerInterval: null, paused: false, started: false
    };

    const startScreen = document.getElementById('startScreen'), examArea = document.getElementById('examArea'), resultArea = document.getElementById('resultArea');
    const timerEl = document.getElementById('timer'), sectionHeader = document.getElementById('sectionHeader'), questionContainer = document.getElementById('questionContainer');
    const progressInfo = document.getElementById('progressInfo'), navBar = document.getElementById('navBar');
    const startBtn = document.getElementById('startBtn'), prevBtn = document.getElementById('prevBtn'), nextBtn = document.getElementById('nextBtn'), pauseBtn = document.getElementById('pauseBtn');

    function getCurrentQuestions() {
      if (examState.section === 'listening') return flatListening;
      if (examState.section === 'reading') return flatReading;
      return writingQuestions;
    }

    function getGlobalIndex() {
      let offset = 0;
      if (examState.section === 'reading') offset = flatListening.length;
      else if (examState.section === 'writing') offset = flatListening.length + flatReading.length;
      return offset + examState.currentQuestionIndex;
    }

    function formatTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }

    function speak(text, callback) {
      if (!text) return;
      try { speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang='zh-CN'; u.rate=0.9; u.onend=callback||null; speechSynthesis.speak(u); } catch(e) {}
    }

    function render() {
      const qs = getCurrentQuestions(), idx = examState.currentQuestionIndex, q = qs[idx];
      const gIdx = getGlobalIndex(), selected = examState.answers[gIdx];
      let html = '';

      if (examState.section === 'answerSheet') {
        html = `<div class="question" style="text-align:center; padding:2rem;"><i class="fas fa-clock" style="font-size:3rem; color:var(--accent);"></i><h2>⏱️ 正在填写答题卡</h2><p>听力部分已结束，您有5分钟时间将答案填涂到答题卡上。</p><p style="margin:1rem 0; font-size:1.5rem;" id="answerSheetTimerDisplay">剩余时间: 05:00</p><button id="continueToReadingBtn" class="control-btn">继续进入阅读部分</button></div>`;
      } else if (examState.section === 'listening') {
        html = `<div class="question"><div><strong>${idx+1}.</strong> <button id="playAudioBtn" class="control-btn"><i class="fas fa-play"></i> 播放音频</button></div>`;
        html += `<div>${q.q||q.question}</div><div class="options">${q.options.map((o,i)=>`<div class="option"><label><input type="radio" name="q" value="${i}" ${selected===i?'checked':''}> ${o}</label></div>`).join('')}</div>`;
        html += `</div>`;
      } else if (examState.section === 'reading') {
        if (q.type === 'part1') {
          html = `<div class="question"><div><strong>${idx+1}.</strong> 选词填空</div><div class="options">${q.options.map((o,i)=>`<div class="option"><label><input type="radio" name="q" value="${i}" ${selected===i?'checked':''}> ${o}</label></div>`).join('')}</div></div>`;
        } else if (q.type === 'part2') {
          html = `<div class="question"><div><strong>${idx+1}.</strong> 请选出与试题内容一致的一项</div><div style="margin:0.8rem 0;">${q.passage}</div><div class="options">${q.options.map((o,i)=>`<div class="option"><label><input type="radio" name="q" value="${i}" ${selected===i?'checked':''}> ${o}</label></div>`).join('')}</div></div>`;
        } else {
          html = `<div class="question"><div><strong>${idx+1}.</strong> 阅读理解</div><div style="margin:0.8rem 0;">${q.passage}</div><div>${q.q}</div><div class="options">${q.options.map((o,i)=>`<div class="option"><label><input type="radio" name="q" value="${i}" ${selected===i?'checked':''}> ${o}</label></div>`).join('')}</div></div>`;
        }
      } else if (examState.section === 'writing') {
        if (q.type === 'part1') {
          const shuffled = [...q.words].sort(()=>Math.random()-0.5);
          html = `<div class="question"><div><strong>${idx+1}.</strong> 完成句子</div><div class="sentence-builder" id="wordTiles">${shuffled.map(w=>`<span class="word-tile" data-word="${w}">${w}</span>`).join('')}</div><div class="sentence-preview" id="sentencePreview">${selected||'点击词语排序...'}</div><button id="clearBtn" class="control-btn">清空</button><button id="checkBtn" class="control-btn">检查</button><div id="fb" style="margin-top:0.5rem;"></div></div>`;
        } else {
          html = `<div class="question"><div><strong>${idx+1}.</strong> 短文写作</div>`;
          html += q.style === 'words' ? `<div style="margin:0.8rem 0;">词语：<strong>${q.promptWords}</strong></div>` : `<div style="font-size:3rem; text-align:center;">${q.image}<br><span style="font-size:0.9rem;">${q.imageDesc}</span></div>`;
          html += `<div style="margin:0.5rem 0;">${q.requirement}</div><textarea id="essayInput" class="essay-area" rows="4" placeholder="请在此输入短文...">${selected||''}</textarea><div class="word-count" id="wordCount">${selected?selected.length:0} 字</div><button id="saveBtn" class="control-btn">保存答案</button></div>`;
        }
      }

      questionContainer.innerHTML = html;
      progressInfo.innerText = `第 ${idx+1} / ${qs.length} 题`;
      sectionHeader.innerText = examState.section==='listening'?`🎧 听力 (${idx+1}/${qs.length})`: examState.section==='reading'?`📖 阅读 (${idx+1}/${qs.length})`: examState.section==='writing'?`✍️ 书写 (${idx+1}/${qs.length})`:`📝 答题卡填写`;
      renderNavBar();

      if (examState.section === 'listening') {
        const playBtn = document.getElementById('playAudioBtn');
        if (playBtn) {
          playBtn.addEventListener('click', ()=>{
            speak(q.dialogue, ()=>{ setTimeout(()=>{ speak(q.q||q.question); }, 500); });
          });
          setTimeout(()=> playBtn.click(), 300);
        }
      }
      document.querySelectorAll('input[name="q"]').forEach(r=>r.addEventListener('change', e=>{
        let v = parseInt(e.target.value); examState.answers[gIdx] = v; renderNavBar();
      }));

      if (examState.section==='writing' && q.type==='part1') {
        let selectedWords = [];
        document.querySelectorAll('.word-tile').forEach(t=>t.addEventListener('click', ()=>{
          selectedWords.push(t.dataset.word); t.classList.add('selected'); t.style.pointerEvents='none';
          document.getElementById('sentencePreview').innerText = selectedWords.join('');
        }));
        document.getElementById('clearBtn').addEventListener('click', ()=>{
          selectedWords=[]; document.querySelectorAll('.word-tile').forEach(t=>{ t.classList.remove('selected'); t.style.pointerEvents='auto'; });
          document.getElementById('sentencePreview').innerText='点击词语排序...';
        });
        document.getElementById('checkBtn').addEventListener('click', ()=>{
          const s = selectedWords.join(''), fb = document.getElementById('fb');
          fb.innerHTML = s===q.correct? '✅ 正确！' : `❌ 参考答案：${q.correct}`;
          examState.answers[gIdx] = s; renderNavBar();
        });
      }
      if (examState.section==='writing' && q.type==='part2') {
        const ta = document.getElementById('essayInput');
        ta.addEventListener('input', ()=>{ document.getElementById('wordCount').innerText = ta.value.length + ' 字'; });
        document.getElementById('saveBtn').addEventListener('click', ()=>{ examState.answers[gIdx]=ta.value; renderNavBar(); });
      }

      document.getElementById('continueToReadingBtn')?.addEventListener('click', ()=>{
        examState.section='reading'; examState.currentQuestionIndex=0;
        clearInterval(examState.timerInterval); startReadingTimer(); render();
      });
    }

    function renderNavBar() {
      const qs = getCurrentQuestions(); let h = ''; 
      for(let i=0; i<qs.length; i++) {
        const g = getGlobalIndex() - examState.currentQuestionIndex + i;
        h += `<button class="nav-btn ${examState.answers[g]!==null?'answered':''} ${i===examState.currentQuestionIndex?'current':''}" data-index="${i}">${i+1}</button>`;
      }
      navBar.innerHTML = h;
      navBar.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click', ()=>{ examState.currentQuestionIndex = parseInt(b.dataset.index); render(); }));
    }

    function nextQuestion() {
      const qs = getCurrentQuestions();
      if (examState.currentQuestionIndex < qs.length-1) { examState.currentQuestionIndex++; render(); }
      else {
        if (examState.section==='listening') { examState.section='answerSheet'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startAnswerSheetTimer(); render(); }
        else if (examState.section==='reading') { examState.section='writing'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startWritingTimer(); render(); }
        else if (examState.section==='writing') finishExam();
      }
    }

    function startListeningTimer() {
      clearInterval(examState.timerInterval);
      examState.timerInterval = setInterval(() => {
        if (examState.paused) return;
        if (examState.section==='listening' && examState.listeningTimer>0) {
          examState.listeningTimer--;
          timerEl.innerText = `听力部分: ${formatTime(examState.listeningTimer)}`;
          if (examState.listeningTimer<=0) { examState.section='answerSheet'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startAnswerSheetTimer(); render(); }
        }
      }, 1000);
    }
    function startAnswerSheetTimer() {
      clearInterval(examState.timerInterval);
      examState.timerInterval = setInterval(() => {
        if (examState.paused) return;
        if (examState.section==='answerSheet' && examState.answerSheetTimer>0) {
          examState.answerSheetTimer--;
          timerEl.innerText = `答题卡: ${formatTime(examState.answerSheetTimer)}`;
          const disp = document.getElementById('answerSheetTimerDisplay'); if (disp) disp.innerText = `剩余时间: ${formatTime(examState.answerSheetTimer)}`;
          if (examState.answerSheetTimer<=0) { examState.section='reading'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startReadingTimer(); render(); }
        }
      }, 1000);
    }
    function startReadingTimer() {
      clearInterval(examState.timerInterval);
      examState.timerInterval = setInterval(() => {
        if (examState.paused) return;
        if (examState.section==='reading' && examState.readingTimer>0) {
          examState.readingTimer--;
          timerEl.innerText = `阅读部分: ${formatTime(examState.readingTimer)}`;
          if (examState.readingTimer<=0) { examState.section='writing'; examState.currentQuestionIndex=0; clearInterval(examState.timerInterval); startWritingTimer(); render(); }
        }
      }, 1000);
    }
    function startWritingTimer() {
      clearInterval(examState.timerInterval);
      examState.timerInterval = setInterval(() => {
        if (examState.paused) return;
        if (examState.section==='writing' && examState.writingTimer>0) {
          examState.writingTimer--;
          timerEl.innerText = `书写部分: ${formatTime(examState.writingTimer)}`;
          if (examState.writingTimer<=0) finishExam();
        }
      }, 1000);
    }

    function calculateScore() {
      let lc=0, rc=0, wc=0;
      for(let i=0; i<flatListening.length; i++) if(examState.answers[i]===flatListening[i].correct) lc++;
      for(let i=0; i<flatReading.length; i++) if(examState.answers[flatListening.length+i]===flatReading[i].correct) rc++;
      const writingPart1 = writingQuestions.filter(q=>q.type==='part1');
      for(let i=0; i<writingPart1.length; i++) if(examState.answers[flatListening.length+flatReading.length+i]===writingPart1[i].correct) wc++;
      const ls = Math.round(lc/flatListening.length*100), rs = Math.round(rc/flatReading.length*100), ws = Math.round(wc/writingPart1.length*100);
      return { ls, rs, ws, total: ls+rs+ws, passed: ls+rs+ws>=180 };
    }

    function finishExam() {
      clearInterval(examState.timerInterval);
      const s = calculateScore();
      examArea.classList.add('hidden'); resultArea.classList.remove('hidden');
      resultArea.innerHTML = `<div style="text-align:center;"><h2>考试完成</h2><div style="display:flex; justify-content:center; gap:2rem; margin:1rem 0;"><div>听力<br><strong>${s.ls}/100</strong></div><div>阅读<br><strong>${s.rs}/100</strong></div><div>书写<br><strong>${s.ws}/100</strong></div></div><p style="font-size:2rem;"><strong>总分: ${s.total}/300</strong></p><p style="font-size:1.5rem; color:${s.passed?'green':'red'};">${s.passed?'🎉 恭喜！通过HSK 5！':'😢 继续努力！'}</p><button id="restartBtn" class="control-btn">重新开始</button></div>`;
      document.getElementById('restartBtn').addEventListener('click', ()=>location.reload());
    }

    startBtn.addEventListener('click', ()=>{ startScreen.classList.add('hidden'); examArea.classList.remove('hidden'); examState.started = true; startListeningTimer(); render(); });
    prevBtn.addEventListener('click', ()=>{ if(examState.currentQuestionIndex>0) { examState.currentQuestionIndex--; render(); } });
    nextBtn.addEventListener('click', nextQuestion);
    pauseBtn.addEventListener('click', function(){ examState.paused = !examState.paused; this.innerHTML = examState.paused ? '<i class="fas fa-play"></i> 继续' : '<i class="fas fa-pause"></i> 暂停'; });

    const darkBtn = document.createElement('button'); darkBtn.innerHTML='<i class="fas fa-moon"></i>';
    darkBtn.style.cssText='position:fixed; bottom:20px; right:20px; background:var(--accent); color:white; border:none; border-radius:50%; width:50px; height:50px; cursor:pointer;';
    darkBtn.onclick = ()=>{ const is = document.body.classList.contains('dark'); if(is) { document.body.classList.remove('dark'); document.body.classList.add('light'); } else { document.body.classList.remove('light'); document.body.classList.add('dark'); } };
    document.body.appendChild(darkBtn);
  })();
</script>
</body>
</html>
